<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LEMATEC ERP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f18;--bg2:#121622;--bg3:#181d2e;--bg4:#1f2640;--border:#242a40;--border2:#2e3857;--blue:#4d8ef5;--green:#2ec48a;--yellow:#f5b942;--red:#f56565;--purple:#9b7ff5;--cyan:#42d4f5;--text:#dde4f0;--text2:#6b7a9e;--text3:#313d5a;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;font-size:14px;}
/* ── LOGIN ── */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;z-index:100;padding:16px;}
.brand{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);letter-spacing:4px;}
h1{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:400px;}
.card h2{font-size:13px;font-weight:700;margin-bottom:16px;color:var(--text2);}
.field{margin-bottom:12px;}
.field label{display:block;font-size:10px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.inp{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--blue);}
select.inp{cursor:pointer;}
.token-wrap{position:relative;}.token-wrap .inp{padding-right:60px;}
.show-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:10px;padding:3px 8px;border-radius:4px;}
.hint{font-size:10px;color:var(--text3);margin-top:4px;line-height:1.5;}.hint a{color:var(--blue);text-decoration:none;}
.btn-login{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}
.btn-login:disabled{background:var(--text3);cursor:not-allowed;}
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-top:10px;line-height:1.7;display:none;}.alert.show{display:block;}
.alert-err{background:rgba(245,101,101,.08);border:1px solid rgba(245,101,101,.2);color:var(--red);}
.debug-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:10px;font-size:10px;font-family:monospace;color:var(--text2);display:none;line-height:1.6;word-break:break-all;}.debug-box.show{display:block;}
/* ── APP ── */
.app{display:none;flex-direction:column;min-height:100vh;}
.topbar{height:50px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:50;}
.topbar-brand{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);letter-spacing:3px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
.role-badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.role-nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.role-nav::-webkit-scrollbar{display:none;}
.tab-btn{padding:10px 12px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;min-width:fit-content;}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);}
.content{flex:1;padding:12px;overflow-y:auto;}
/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
@media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr);}}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;}
.stat-n{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;line-height:1;margin-bottom:4px;}
.stat-l{font-size:10px;color:var(--text2);}
/* ── PANEL ── */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.panel-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.panel-title{font-size:12px;font-weight:700;}
/* ── TABLE ── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:500px;}
th{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);font-weight:700;padding:8px 12px;text-align:left;background:var(--bg3);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;}
th:hover{color:var(--text2);}th.th-asc,th.th-desc{color:var(--blue);}
td{padding:8px 12px;font-size:12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
/* ── MOBILE TABLE ── */
@media(max-width:600px){
  table{min-width:unset;}
  .hide-mobile{display:none;}
  td,th{padding:6px 8px;font-size:11px;}
}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.info-box{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:12px;line-height:1.6;}
.info-ok{background:rgba(46,196,138,.08);border:1px solid rgba(46,196,138,.2);color:var(--green);}
.info-warn{background:rgba(245,185,66,.08);border:1px solid rgba(245,185,66,.2);color:var(--yellow);}
.bar{width:44px;height:4px;background:var(--bg4);border-radius:2px;display:inline-block;vertical-align:middle;margin-right:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;}
/* ── TOAST ── */
.toast{position:fixed;top:60px;right:12px;left:12px;z-index:300;padding:10px 16px;border-radius:8px;font-size:12px;box-shadow:0 4px 20px rgba(0,0,0,.5);}
@media(min-width:480px){.toast{left:auto;min-width:280px;}}
/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);align-items:flex-end;justify-content:center;z-index:200;}
@media(min-width:600px){.modal-bg{align-items:center;}}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto;}
@media(min-width:600px){.modal{border-radius:14px;width:520px;max-height:85vh;}}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:400px){.form-row{grid-template-columns:1fr;}}
.form-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;}
/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px;touch-action:manipulation;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:disabled{background:var(--text3);cursor:not-allowed;}
.btn-green{background:rgba(46,196,138,.15);color:var(--green);border:1px solid rgba(46,196,138,.3);}
.btn-red{background:rgba(245,101,101,.1);color:var(--red);border:1px solid rgba(245,101,101,.25);}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-yellow{background:rgba(245,185,66,.1);color:var(--yellow);border:1px solid rgba(245,185,66,.25);}
.btn-cyan{background:rgba(66,212,245,.1);color:var(--cyan);border:1px solid rgba(66,212,245,.25);}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px;}
.loading-row{display:flex;align-items:center;justify-content:center;padding:28px;color:var(--text3);gap:8px;font-size:12px;}
.spin{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;}
/* ── PI ITEMS ── */
.pi-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;}
.pi-item:hover,.pi-item.selected{border-color:var(--blue);background:rgba(77,142,245,.08);}
.sn{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--blue);color:#fff;font-size:9px;font-weight:700;margin-right:4px;flex-shrink:0;}
/* ── QC SUBTAB ── */
.qc-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;}
.qc-tab{padding:8px 16px;font-size:12px;font-weight:600;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--text2);white-space:nowrap;}
.qc-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
/* ── PI ITEMS LIST in modal ── */
.pi-multi-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.pi-multi-item input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--blue);}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="brand">LEMATEC · ERP</div>
  <h1>製造管理系統</h1>
  <div class="card">
    <h2>🔐 輸入 Notion Token 登入</h2>
    <div class="field"><label>Integration Token</label><div class="token-wrap"><input class="inp" type="text" id="tokenInput" placeholder="ntn_xxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false"><button class="show-btn" onclick="clearToken()">清除</button></div><div class="hint">前往 <a href="https://notion.so/profile/integrations" target="_blank">notion.so/profile/integrations</a> 取得，格式 <span style="color:var(--blue)">ntn_</span> 開頭</div></div>
    <div class="field"><label>角色</label><select class="inp" id="roleSelect"><option value="manager">🏭 廠長</option><option value="sales">📋 業務</option><option value="production">⚙️ 生管</option><option value="warehouse">📦 倉管</option><option value="qc">✅ 品管</option><option value="purchase">🛒 採購</option></select></div>
    <button class="btn-login" id="loginBtn" onclick="login()">⚡ 進入系統</button>
    <div class="alert alert-err" id="loginAlert"></div>
    <div class="debug-box" id="debugBox"></div>
  </div>
</div>
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-brand">LEMATEC</div>
    <span style="color:var(--text3);font-size:11px">ERP</span>
    <div class="topbar-right">
      <span id="lowWarn" style="font-size:10px;color:var(--yellow);display:none"></span>
      <span class="role-badge" id="roleBadge"></span>
      <span class="conn-dot"></span>
      <button class="btn btn-ghost btn-sm" onclick="refreshAll()">🔄</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">登出</button>
    </div>
  </div>
  <div class="role-nav" id="roleNav"></div>
  <div class="content" id="mainContent"></div>
</div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal"><div id="modalInner"></div></div></div>

<script>
// ════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════
const DB={
  materials:'43d801b4-a787-4101-bd12-d8b8199385c7',
  bom:'6b67dc8d-bafb-49e8-9c39-bf66046a99fe',
  orders:'50b7ce68-437e-431f-9a4f-a0d0d65a7b25',
  pickMaster:'55552dd1-eb31-4d68-8127-63cc062a93f8',
  pickDetail:'267f16cf-e88a-41ed-8049-d39d618a1275',
  inbound:'cff100a4-ddcd-4bda-b8d7-57d44c4b3ce4',
  customers:'d7e6db27-5935-4aea-8dbf-ea48bca5a4b4',    // ERP 客戶主檔
  custMaster:'19fff6f4-24bb-80fe-b265-c62fa39c814c',   // 國外業務客戶總檔
};
const ROLES={
  manager:{label:'廠長',color:'#42d4f5',tabs:['dashboard','orders','picking','inventory','inbound','qc','customers']},
  sales:{label:'業務',color:'#4d8ef5',tabs:['dashboard','orders','customers']},
  production:{label:'生管',color:'#9b7ff5',tabs:['dashboard','orders','picking','inventory']},
  warehouse:{label:'倉管',color:'#2ec48a',tabs:['dashboard','inventory','picking','inbound']},
  qc:{label:'品管',color:'#f5b942',tabs:['dashboard','qc','inbound']},
  purchase:{label:'採購',color:'#2ec48a',tabs:['dashboard','inventory','inbound']},
};
const TAB_LABELS={dashboard:'📊 總覽',orders:'📋 訂單',customers:'🏢 客戶',picking:'🗂️ 領料',inventory:'📦 庫存',inbound:'📥 入料',qc:'✅ 品管'};
const PILL_MAP={
  '待排程':['rgba(245,185,66,.12)','#f5b942'],'生產中':['rgba(77,142,245,.12)','#4d8ef5'],
  '待出貨':['rgba(155,127,245,.12)','#9b7ff5'],'已完成':['rgba(46,196,138,.12)','#2ec48a'],
  '取消':['rgba(245,101,101,.12)','#f56565'],'已確認扣料':['rgba(46,196,138,.12)','#2ec48a'],
  '缺料待補':['rgba(245,101,101,.12)','#f56565'],'待品檢':['rgba(245,185,66,.12)','#f5b942'],
  '品檢通過':['rgba(46,196,138,.12)','#2ec48a'],'品檢不合格':['rgba(245,101,101,.12)','#f56565'],
  '已入庫':['rgba(46,196,138,.12)','#2ec48a'],'待入庫':['#1f2640','#313d5a'],
  '退回供應商':['rgba(245,101,101,.12)','#f56565'],'零件':['#1f2640','#313d5a'],
  '半成品':['rgba(155,127,245,.12)','#9b7ff5'],'成品':['rgba(46,196,138,.12)','#2ec48a'],
};

let TOKEN='',ROLE='',CURRENT_TAB='dashboard';
let mats=[],boms=[],orders=[],customers=[],picks=[],inbounds=[];
let QC_SUB='pending',QC_FILTER='all';
const SORT={};
const PROXY='https://green-wave-c22f.vic-e93.workers.dev';

// ════════════════════════════════════════════
// API
// ════════════════════════════════════════════
async function notionAPI(method,endpoint,body=null){
  const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:TOKEN,method,endpoint,body})});
  const text=await res.text();
  try{return JSON.parse(text);}catch{throw new Error('解析失敗：'+text.slice(0,200));}
}
async function dbQuery(dbId,cursor=null){
  const b={page_size:100};if(cursor)b.start_cursor=cursor;
  return notionAPI('POST',`databases/${dbId}/query`,b);
}
async function dbQueryAll(dbId){
  // 加速：先發第一頁，同時開始處理
  let all=[],cursor=null;
  do{const r=await dbQuery(dbId,cursor);all=all.concat(r.results||[]);cursor=r.has_more?r.next_cursor:null;}while(cursor);
  return all;
}
async function createPage(dbId,props){return notionAPI('POST','pages',{parent:{database_id:dbId},properties:props});}
async function updatePage(pageId,props){return notionAPI('PATCH',`pages/${pageId}`,{properties:props});}
async function getBlockChildren(blockId){return notionAPI('GET',`blocks/${blockId}/children?page_size=50`);}
async function getBlock(blockId){return notionAPI('GET',`blocks/${blockId}`);}
async function notionSearch(query){return notionAPI('POST','search',{query,filter:{property:'object',value:'page'},page_size:20});}
async function downloadViaProxy(fileUrl){
  const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:TOKEN,downloadUrl:fileUrl})});
  if(!res.ok)throw new Error(`下載失敗 HTTP ${res.status}`);
  return await res.arrayBuffer();
}

// ════════════════════════════════════════════
// 客戶編號解析 — 嚴格版
// 解決根本問題：Notion text 欄位在 API 回傳時
// 一律是 rich_text 陣列，需要多層防護解析
// ════════════════════════════════════════════
function parseCustomerCode(properties){
  // 客戶總檔用 '客戶編號'，ERP 主檔用 '客戶代號'
  const prop = properties?.['客戶編號'] || properties?.['客戶代號'];
  if(!prop) return '';
  // rich_text 陣列（最常見）
  if(Array.isArray(prop.rich_text) && prop.rich_text.length > 0){
    return (prop.rich_text[0]?.plain_text || prop.rich_text[0]?.text?.content || '').trim();
  }
  // text 陣列（舊格式）
  if(Array.isArray(prop.text) && prop.text.length > 0){
    return (prop.text[0]?.plain_text || prop.text[0]?.text?.content || '').trim();
  }
  // 直接字串
  if(typeof prop === 'string') return prop.trim();
  return '';
}

function parseTitle(properties, ...keys){
  for(const key of keys){
    const arr = properties?.[key]?.title;
    if(Array.isArray(arr) && arr.length > 0){
      return arr[0]?.plain_text || arr[0]?.text?.content || '';
    }
  }
  return '';
}

// ════════════════════════════════════════════
// LOGIN
// ════════════════════════════════════════════
function clearToken(){document.getElementById('tokenInput').value='';}
async function login(){
  const t=document.getElementById('tokenInput').value.trim().replace(/\s+/g,'');
  const r=document.getElementById('roleSelect').value;
  ['loginAlert','debugBox'].forEach(id=>document.getElementById(id).classList.remove('show'));
  if(!t){showLoginErr('請填入 Token');return;}
  if(!t.startsWith('ntn_')){showLoginErr(`Token 格式不對！前8字：<b>${t.slice(0,8)}</b>，需 <b>ntn_</b> 開頭`);return;}
  TOKEN=t;ROLE=r;
  const btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='連接中...';
  try{
    const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:t,method:'GET',endpoint:`databases/${DB.materials}`})});
    const text=await res.text();
    showDebug(`HTTP: ${res.status} | ${text.slice(0,150)}`);
    let data;try{data=JSON.parse(text);}catch{showLoginErr('回應無法解析');btn.disabled=false;btn.textContent='⚡ 進入系統';return;}
    if(data.id||data.object==='database'){
      localStorage.setItem('lematec_token',TOKEN);localStorage.setItem('lematec_role',ROLE);
      startApp();
    }else if(data.status===401||data.code==='unauthorized'){showLoginErr('Token 無效 (401)');}
    else if(data.status===404){showLoginErr('找不到資料庫 (404) — 確認頁面已連接此 Integration');}
    else{showLoginErr(`連接失敗：${data.message||data.code||JSON.stringify(data).slice(0,80)}`);}
  }catch(e){showLoginErr(`網路錯誤：${e.message}`);}
  btn.disabled=false;btn.textContent='⚡ 進入系統';
}
function showLoginErr(msg){const el=document.getElementById('loginAlert');el.innerHTML=msg;el.className='alert alert-err show';}
function showDebug(msg){const el=document.getElementById('debugBox');el.textContent=msg;el.className='debug-box show';}
function logout(){localStorage.removeItem('lematec_token');localStorage.removeItem('lematec_role');TOKEN='';ROLE='';
  document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';}

// ════════════════════════════════════════════
// APP START — 加速：平行載入資料
// ════════════════════════════════════════════
async function startApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  const ri=ROLES[ROLE];
  const badge=document.getElementById('roleBadge');
  badge.textContent=ri.label;
  badge.style.cssText=`padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:${ri.color}20;color:${ri.color}`;
  buildNav();
  showTab('dashboard');
  // 顯示 loading 後立刻開始載入，不等待
  document.getElementById('mainContent').innerHTML=`<div class="loading-row"><div class="spin"></div>載入資料中...</div>`;
  await refreshAll();
}

// ════════════════════════════════════════════
// DATA LOAD — 加速版：所有資料平行抓取
// ════════════════════════════════════════════
async function refreshAll(){
  try{
    // 全部平行抓取，不等待每個完成
    const [mR,bR,oR,cR,masterPages] = await Promise.all([
      dbQueryAll(DB.materials),
      dbQueryAll(DB.bom),
      dbQueryAll(DB.orders),
      dbQueryAll(DB.customers),
      dbQueryAll(DB.custMaster),
    ]);

    mats = mR.map(p=>({
      id:p.id,
      name:parseTitle(p.properties,'料件名稱'),
      code:parseCustomerCode(p.properties), // 料件主檔也可能有代號
      type:p.properties?.['類型']?.select?.name||'',
      unit:p.properties?.['單位']?.select?.name||'個',
      stock:p.properties?.['目前庫存']?.number??0,
      safe:p.properties?.['安全庫存']?.number??0,
    }));

    boms = bR.map(p=>({
      parentId:p.properties?.['母件']?.relation?.[0]?.id||'',
      childId:p.properties?.['子件']?.relation?.[0]?.id||'',
      qty:p.properties?.['每台用量']?.number??1,
    }));

    orders = oR.map(p=>({
      id:p.id,
      no:parseTitle(p.properties,'訂單號'),
      customer:p.properties?.['客戶名稱']?.select?.name||'',
      productId:p.properties?.['成品']?.relation?.[0]?.id||'',
      qty:p.properties?.['訂購數量']?.number??0,
      deadline:p.properties?.['交期']?.date?.start||'',
      status:p.properties?.['狀態']?.select?.name||'',
      note:p.properties?.['業務備註']?.rich_text?.[0]?.plain_text||'',
    }));

    // ERP 客戶主檔（欄位：客戶名稱 title, 客戶代號 rich_text）
    const erpCusts = cR.map(p=>({
      id:p.id,
      name:parseTitle(p.properties,'客戶名稱'),
      code:(p.properties?.['客戶代號']?.rich_text?.[0]?.plain_text||'').trim(),
      region:p.properties?.['地區']?.select?.name||'',
      source:'erp',
    })).filter(c=>c.name);

    // 國外業務客戶總檔（欄位：Name title, 客戶編號 text/rich_text）
    // ⚠️ 關鍵修正：使用嚴格解析函數，以 id 為唯一識別，code 僅用於比對
    const masterCusts = masterPages.map(p=>{
      const name = parseTitle(p.properties,'Name');
      const code = parseCustomerCode(p.properties);
      const region = p.properties?.['國家']?.select?.name||'';
      return {id:p.id, name, code, region, source:'master'};
    }).filter(c=>c.name);

    // ⚠️ 關鍵修正：合併邏輯
    // 1. ERP 主檔優先（業務自己建的）
    // 2. 客戶總檔補充（以 code 去重，code 相同的以 ERP 主檔為準）
    // 3. 使用 Map 以 code 為 key 確保唯一性，相同 code 只保留第一個（ERP優先）
    const byCode = new Map();
    // ERP 主檔先放
    erpCusts.forEach(c=>{
      if(c.code) byCode.set(c.code.toLowerCase(), c);
    });
    // 客戶總檔補充（code 已存在的跳過，沒有 code 的直接加）
    masterCusts.forEach(c=>{
      if(c.code){
        if(!byCode.has(c.code.toLowerCase())) byCode.set(c.code.toLowerCase(), c);
      }else{
        // 沒有 code 的，以 id 為 key
        byCode.set('__nocode__'+c.id, c);
      }
    });
    customers = Array.from(byCode.values());

    const low = mats.filter(m=>m.stock<=m.safe&&m.type!=='成品');
    const w = document.getElementById('lowWarn');
    if(low.length>0){w.style.display='';w.textContent=`⚠ ${low.length}項庫存不足`;}
    else w.style.display='none';

    if(CURRENT_TAB) renderTab(CURRENT_TAB);
  }catch(e){
    document.getElementById('mainContent').innerHTML=`<div class="info-box" style="background:rgba(245,101,101,.08);border:1px solid rgba(245,101,101,.2);color:var(--red);margin:12px">❌ 載入失敗：${e.message}</div>`;
  }
}

// ════════════════════════════════════════════
// BOM
// ════════════════════════════════════════════
function explodeBOM(productId,qty){
  const result={};const queue=[{pid:productId,mult:qty}];const visited=new Set();
  while(queue.length){
    const{pid,mult}=queue.shift();
    boms.filter(b=>b.parentId===pid).forEach(b=>{
      const mat=mats.find(m=>m.id===b.childId);if(!mat)return;
      const need=b.qty*mult;
      if(!result[b.childId])result[b.childId]={...mat,needed:0};
      result[b.childId].needed+=need;
      if(mat.type==='半成品'&&!visited.has(b.childId)){visited.add(b.childId);queue.push({pid:b.childId,mult:need});}
    });
  }
  return Object.values(result);
}

// ════════════════════════════════════════════
// SORT
// ════════════════════════════════════════════
function toggleSort(tid,col,type='str'){
  const s=SORT[tid]||{};SORT[tid]={col,dir:s.col===col&&s.dir==='asc'?'desc':'asc',type};
  renderTab(CURRENT_TAB);
}
function applySort(tid,data){
  const s=SORT[tid];if(!s)return data;
  return[...data].sort((a,b)=>{
    let va=a[s.col],vb=b[s.col];
    if(s.type==='num'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}
    else{va=String(va||'').toLowerCase();vb=String(vb||'').toLowerCase();}
    if(va<vb)return s.dir==='asc'?-1:1;if(va>vb)return s.dir==='asc'?1:-1;return 0;
  });
}
function TH(tid,col,label,type='str',cls=''){
  const s=SORT[tid]||{};const a=s.col===col;const arr=a?(s.dir==='asc'?'↑':'↓'):'↕';
  return`<th class="${a?'th-'+s.dir:''} ${cls}" onclick="toggleSort('${tid}','${col}','${type}')">${label}<span style="font-size:8px;opacity:${a?1:.3};margin-left:3px">${arr}</span></th>`;
}

function buildNav(){
  const nav=document.getElementById('roleNav');nav.innerHTML='';
  ROLES[ROLE].tabs.forEach(tab=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(tab===CURRENT_TAB?' active':'');
    btn.textContent=TAB_LABELS[tab];btn.onclick=()=>switchTab(tab);nav.appendChild(btn);
  });
}
function switchTab(tab){
  CURRENT_TAB=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.textContent===TAB_LABELS[tab]));
  renderTab(tab);
  if(tab==='picking')loadPicks().then(()=>renderTab('picking'));
  if(tab==='inbound'||tab==='qc')loadInbounds().then(()=>renderTab(tab));
}
function showTab(tab){CURRENT_TAB=tab;renderTab(tab);}
function pill(t){const[bg,c]=PILL_MAP[t]||['#1f2640','#6b7a9e'];return`<span class="pill" style="background:${bg};color:${c}">${t||'—'}</span>`;}
function renderTab(tab){
  const c=document.getElementById('mainContent');
  if(tab==='dashboard')c.innerHTML=renderDashboard();
  else if(tab==='orders')c.innerHTML=renderOrders();
  else if(tab==='customers')c.innerHTML=renderCustomers();
  else if(tab==='inventory')c.innerHTML=renderInventory();
  else if(tab==='picking')c.innerHTML=renderPicking();
  else if(tab==='inbound')c.innerHTML=renderInbound();
  else if(tab==='qc')c.innerHTML=renderQCTab();
}

  let filtered=history;
  if(QC_FILTER==='pass')filtered=history.filter(i=>i.qcStatus==='品檢通過');
  if(QC_FILTER==='fail')filtered=history.filter(i=>i.qcStatus==='品檢不合格');
  if(filtered.length===0)return tabs+filterBar+`<div class="panel"><div style="padding:28px;text-align:center;color:var(--text3);font-size:12px">尚無記錄</div></div>`;
  const byMonth={};filtered.forEach(i=>{const m=i.date?i.date.slice(0,7):'無日期';if(!byMonth[m])byMonth[m]=[];byMonth[m].push(i);});
  return tabs+filterBar+Object.keys(byMonth).sort().reverse().map(month=>{
    const rows=applySort('qc_h',byMonth[month]);
    const pc=rows.filter(i=>i.qcStatus==='品檢通過').length,fc=rows.filter(i=>i.qcStatus==='品檢不合格').length;
    return`<div class="panel" style="margin-bottom:10px">
      <div class="panel-hdr" style="cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">
        <span class="panel-title">📅 ${month}</span>
        <span style="font-size:11px;color:var(--text2)">共${rows.length}筆 <span style="color:var(--green)">✅${pc}</span> <span style="color:var(--red)">❌${fc}</span> ▼</span>
      </div>
      <div><div class="table-wrap"><table>
        <tr>${TH('qc_h','no','入料單號')}<th>料件</th>${TH('qc_h','qty','數量','num')}${TH('qc_h','date','日期','str','hide-mobile')}<th>結果</th><th>照片</th></tr>
        ${rows.map(i=>{const mat=mats.find(m=>m.id===i.matId);const ip=i.qcStatus==='品檢通過';return`<tr>
          <td style="font-family:monospace;color:var(--text);font-size:11px;font-weight:600">${i.no}</td>
          <td style="font-size:11px">${mat?.name||'—'}</td>
          <td style="font-family:monospace">${i.qty}</td>
          <td class="hide-mobile" style="font-family:monospace;font-size:11px">${i.date||'—'}</td>
          <td><span class="pill" style="background:${ip?'rgba(46,196,138,.12)':'rgba(245,101,101,.12)'};color:${ip?'var(--green)':'var(--red)'}">${i.qcStatus}</span></td>
          <td><a href="https://www.notion.so/${i.id.replace(/-/g,'')}" target="_blank" style="font-size:11px;color:var(--blue);text-decoration:none">📷</a></td>
        </tr>`;}).join('')}
      </table></div></div>
    </div>`;
  }).join('');
}

async function doPick(orderId){
  const o=orders.find(x=>x.id===orderId);const prod=mats.find(m=>m.id===o.productId);const items=explodeBOM(o.productId,o.qty);
  const ds=new Date().toISOString().slice(0,10);const no=`PK-${ds.replace(/-/g,'').slice(2)}-${Math.floor(Math.random()*900+100)}`;
  closeModal();showToast('處理中...','warn');
  try{
    const master=await createPage(DB.pickMaster,{'領料主單號':{title:[{text:{content:no}}]},'對應訂單':{relation:[{id:orderId}]},'成品品號':{rich_text:[{text:{content:prod?.name||''}}]},'生產數量':{number:o.qty},'狀態':{select:{name:'已確認扣料'}},'領料日期':{date:{start:ds}}});
    for(const item of items){
      await createPage(DB.pickDetail,{'料件名稱':{title:[{text:{content:item.name}}]},'領料主單':{relation:[{id:master.id}]},'料件':{relation:[{id:item.id}]},'類型':{select:{name:item.type}},'需求數量':{number:item.needed},'實領數量':{number:item.type==='半成品'?item.needed:Math.min(item.needed,item.stock)},'狀態':{select:{name:item.type==='半成品'?'半成品':item.stock>=item.needed?'足夠':'缺料'}}});
      if(item.type!=='半成品')await updatePage(item.id,{'目前庫存':{number:Math.max(0,item.stock-item.needed)}});
    }
    await updatePage(orderId,{'狀態':{select:{name:'生產中'}}});
    await refreshAll();await loadPicks();showToast(`✅ 領料單 ${no} 建立完成`,'ok');

}

async function approveQC(id,matId,qty){

  try{
    await updatePage(id,{'品管狀態':{select:{name:'品檢通過'}},'入庫狀態':{select:{name:'已入庫'}}});
    const mat=mats.find(m=>m.id===matId);

  }catch(e){showToast('錯誤：'+e.message,'err');}
}

// 客戶代號比對 — 嚴格版
// ════════════════════════════════════════════
let _mc=null; // 當前比對到的客戶

function matchCustomerByCode(code){
  if(!code) return null;
  const q=code.toLowerCase().trim();
  // 1. 完全精確比對（大小寫不分）
  let found=customers.find(c=>c.code&&c.code.toLowerCase()===q);
  // 2. 前綴比對（輸入不完整時）
  if(!found) found=customers.find(c=>c.code&&c.code.toLowerCase().startsWith(q));
  // 3. 包含比對
  if(!found&&q.length>=4) found=customers.find(c=>c.code&&c.code.toLowerCase().includes(q));
  return found||null;
}

function onCustCodeInput(code){
  const info=document.getElementById('custMatch');
  const btn=document.getElementById('fetchPIBtn');
  const notionList=document.getElementById('piFromNotionList');
  if(notionList) notionList.style.display='none';

  if(!code){info.textContent='';if(btn)btn.style.display='none';_mc=null;return;}

  const found=matchCustomerByCode(code);
  if(found){
    _mc=found;
    // 同步更新下拉選單
    const sel=document.getElementById('m_cust');
    if(sel){
      const opt=Array.from(sel.options).find(o=>o.dataset.id===found.id);
      if(opt) sel.value=opt.value;
    }
    info.innerHTML=`<span style="color:var(--green)">✅ ${found.name}（代號：${found.code}）</span>`;
    if(btn)btn.style.display='';
  }else{
    _mc=null;
    // 顯示相似的客戶供參考
    const q=code.toLowerCase();
    const similar=customers.filter(c=>c.code&&c.code.toLowerCase().startsWith(code.slice(0,4).toLowerCase())).slice(0,3);
    const hint=similar.length>0?` 相似：${similar.map(c=>c.code).join('、')}`:' 請確認代號是否正確';
    info.innerHTML=`<span style="color:var(--yellow)">⚠ 找不到「${code}」${hint}</span>`;
    if(btn)btn.style.display='none';
  }
}

async function fetchPIFromNotion(){
  if(!_mc)return;
  const btn=document.getElementById('fetchPIBtn');
  const listDiv=document.getElementById('piFromNotionList');
  btn.textContent='搜尋中...';btn.disabled=true;

  try{
    const r=await notionSearch(_mc.code);
    const pages=(r.results||[]).filter(p=>p.object==='page');
    // 嚴格過濾：標題以客戶代號開頭，且含 '-'（訂單編號格式）
    const orderPages=pages.filter(p=>{
      const title=p.properties?.title?.title?.[0]?.plain_text||p.properties?.Name?.title?.[0]?.plain_text||'';
      return title&&title.toUpperCase().startsWith(_mc.code.toUpperCase())&&title.includes('-');
    }).sort((a,b)=>{
      const ta=a.properties?.title?.title?.[0]?.plain_text||'';
      const tb=b.properties?.title?.title?.[0]?.plain_text||'';
      return tb.localeCompare(ta); // 最新的在前
    });

    if(orderPages.length===0){
      listDiv.innerHTML=`<div style="font-size:11px;color:var(--yellow);padding:8px">⚠ 找不到 ${_mc.code} 的訂單頁面，請改用下方直接上傳 Excel</div>`;
    }else{
      listDiv.innerHTML=`<div style="font-size:11px;color:var(--text2);margin-bottom:8px">找到 ${orderPages.length} 筆訂單，選擇後自動讀取 PI：</div>`+
      orderPages.map((p,i)=>{
        const title=p.properties?.title?.title?.[0]?.plain_text||p.properties?.Name?.title?.[0]?.plain_text||'';
        return`<div class="pi-item" id="pii_${i}" onclick="selectAndLoadPI('${p.id}','${title}',${i})">
          <span style="font-size:15px">📄</span>
          <div style="flex:1">
            <div style="font-size:12px;font-weight:700;color:var(--text)">${title}</div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px">點擊 → 自動讀取品項與數量</div>
          </div>
        </div>`;
      }).join('');
    }
  }catch(e){listDiv.innerHTML=`<div style="font-size:11px;color:var(--red);padding:8px">❌ 搜尋失敗：${e.message}</div>`;}
  btn.textContent='📂 從 Notion 抓取 PI';btn.disabled=false;
}

// ════════════════════════════════════════════
// 讀取 PI Excel（從 Notion block）
// ════════════════════════════════════════════
async function selectAndLoadPI(pageId,title,idx){
  document.querySelectorAll('.pi-item').forEach(e=>e.classList.remove('selected'));
  const el=document.getElementById('pii_'+idx);
  if(el){el.classList.add('selected');el.querySelector('div>div:last-child').textContent='⏳ 讀取中...';}

  try{
    // 取得頁面的 blocks
    const blocks=await getBlockChildren(pageId);
    const allBlocks=blocks.results||[];

    let fileUrl='',fileName='';

    // 搜尋所有 block 找 xlsx
    for(const b of allBlocks){
      const bType=b.type;
      if(!bType)continue;
      const bData=b[bType]||{};

      // file block 結構（最常見）：b.file.file.url 或 b.file.external.url
      if(bType==='file'){
        const name=(bData.name||'').toLowerCase();
        // 先找 file.url（直接URL），再找 file.file.url（嵌套結構），再找 external.url
        const url=bData.url||bData.file?.url||bData.external?.url||'';
        if((name.includes('.xlsx')||name.includes('.xls'))&&url){
          fileUrl=url;fileName=bData.name||title;break;
        }
      }
    }

    // 如果沒找到 file block，嘗試 child_page（有時附件存成子頁面）
    if(!fileUrl){
      const childPages=allBlocks.filter(b=>b.type==='child_page'&&
        (b.child_page?.title||'').toLowerCase().match(/\.xlsx?/));
      for(const cp of childPages){
        // 用 retrieve block 取得實際 signed URL
        const blockDetail=await getBlock(cp.id);
        if(blockDetail){
          const bd=blockDetail[blockDetail.type]||{};
          const url=bd.url||bd.file?.url||bd.external?.url||'';
          if(url){fileUrl=url;fileName=cp.child_page?.title||title;break;}
        }
      }
    }

    if(!fileUrl){
      if(el) el.querySelector('div>div:last-child').textContent='❌ 找不到 Excel，請直接上傳';
      showToast('此頁面沒有 Excel 附件，請改用直接上傳','warn');return;
    }

    if(el) el.querySelector('div>div:last-child').textContent=`⏳ 下載 ${fileName}...`;

    // 透過 Worker 代理下載
    const buf=await downloadViaProxy(fileUrl);
    const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:null});

    const items=parsePIRows(rows,title);
    if(el) el.querySelector('div>div:last-child').textContent=`✅ 成功讀取 ${items.length} 個品項`;
    showToast(`✅ PI ${title} 讀取成功`,'ok');

  }catch(e){
    if(el) el.querySelector('div>div:last-child').textContent=`❌ 失敗：${e.message.slice(0,40)}`;
    showToast('讀取失敗，請改用直接上傳','err');
    console.error('PI load error:',e);
  }
}

// ════════════════════════════════════════════
// PI 解析 — 支援多品項
// ════════════════════════════════════════════
function parsePIRows(rows,titleHint){
  // 解析 PI No
  const piNo=rows[6]&&rows[6][9]?String(rows[6][9]).trim():(titleHint||'');
  // 解析日期
  let piDate='';
  if(rows[7]&&rows[7][8]){piDate=String(rows[7][8]).replace(/Date:/i,'').trim().replace(/\./g,'-');}

  // 解析所有品項
  const items=[];
  for(let i=12;i<(rows.length||0)-1;i++){
    const row=rows[i];if(!row)continue;
    const col1=row[1]!=null?String(row[1]).trim():'';
    if(col1&&/^\d+\.?$/.test(col1)){
      const desc=row[2]!=null?String(row[2]).trim():'';
      const qty=row[6]!=null?parseInt(row[6])||0:0;
      const nextRow=rows[i+1]||[];
      const model=nextRow[2]!=null?String(nextRow[2]).trim():'';
      if(model&&qty>0)items.push({model,desc,qty});
      i++; // 跳過品號行
    }
  }

  // 填入備註
  const noteEl=document.getElementById('m_note');
  if(noteEl&&piNo) noteEl.value='PI No: '+piNo;

  // 填入交期
  if(piDate&&piDate.match(/^\d{4}-\d{2}-\d{2}$/)){
    const d=new Date(piDate);d.setDate(d.getDate()+30);
    const dateEl=document.getElementById('m_date');
    if(dateEl) dateEl.value=d.toISOString().slice(0,10);
  }

  const infoEl=document.getElementById('piInfo');

  if(items.length===0){
    if(infoEl) infoEl.textContent='⚠ 未能解析品項，請手動填入';
    return items;
  }

  if(items.length===1){
    // 單品項：直接填入
    const el=document.getElementById('m_prodCode');if(el) el.value=items[0].model;
    const qe=document.getElementById('m_qty');if(qe) qe.value=items[0].qty;
    matchProduct(items[0].model);
    if(infoEl) infoEl.innerHTML=`<span style="color:var(--green)">✅ PI No: ${piNo} | ${items[0].model} × ${items[0].qty}</span>`;
  }else{
    // 多品項：顯示選擇清單
    if(infoEl) infoEl.innerHTML=`<span style="color:var(--cyan)">📦 找到 ${items.length} 個品項，已列於下方 — 可勾選後一次建立多筆訂單</span>`;
    showMultiItemList(items,piNo,piDate);
  }

  return items;
}

  if(!listDiv)return;

  items.map((item,i)=>`
    <div class="pi-multi-item">

// 批次建立多筆訂單
async function submitMultiOrders(items,count,piNo){
  const cust=document.getElementById('m_cust').value;
  const date=document.getElementById('m_date').value;
  if(!cust){alert('請選擇客戶');return;}
  if(!date){alert('請填入交期');return;}

  // 收集勾選的品項
  const selected=[];
  for(let i=0;i<count;i++){
    const chk=document.getElementById('chk_'+i);
    const qtyEl=document.getElementById('qty_'+i);
    if(chk&&chk.checked&&qtyEl){
      selected.push({model:items[i].model,qty:parseInt(qtyEl.value)||items[i].qty});
    }
  }
  if(selected.length===0){alert('請至少勾選一個品項');return;}

  closeModal();
  showToast(`建立 ${selected.length} 筆訂單中...`,'warn');
  const d=new Date();const prefix=`ORD-${String(d.getFullYear()).slice(2)}${String(d.getMonth()+1).padStart(2,'0')}`;
  let ok=0,fail=0;

  for(const item of selected){
    try{
      // 找或建立品號
      let prodId='';
      const existing=mats.find(m=>m.name===item.model||m.code===item.model);
      if(existing){prodId=existing.id;}
      else{
        const newMat=await createPage(DB.materials,{
          '料件名稱':{title:[{text:{content:item.model}}]},
          '類型':{select:{name:'成品'}},
          '目前庫存':{number:1000},
          '安全庫存':{number:0},
        });
        prodId=newMat.id;
      }
      const no=`${prefix}-${Math.floor(Math.random()*900+100)}`;
      await createPage(DB.orders,{
        '訂單號':{title:[{text:{content:no}}]},
        '客戶名稱':{select:{name:cust}},
        '成品':{relation:[{id:prodId}]},
        '訂購數量':{number:item.qty},
        '交期':{date:{start:date}},
        '狀態':{select:{name:'待排程'}},
        '業務備註':{rich_text:[{text:{content:'PI No: '+piNo}}]},
      });
      ok++;
    }catch(e){fail++;console.error('批次建單失敗:',item.model,e);}
  }
  await refreshAll();
  showToast(`✅ 成功建立 ${ok} 筆訂單${fail>0?`，${fail} 筆失敗`:''}`, ok===selected.length?'ok':'warn');
}

function parsePIFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:null});
      parsePIRows(rows,file.name.replace(/\.xlsx?$/i,''));
    }catch(err){const el=document.getElementById('piInfo');if(el)el.textContent='❌ 解析失敗：'+err.message;}
  };
  reader.readAsArrayBuffer(file);
}

function matchProduct(code){
  if(!code){const el=document.getElementById('prodMatch');if(el)el.textContent='';return;}
  const found=mats.find(m=>m.name===code||m.code===code);
  const info=document.getElementById('prodMatch');if(!info)return;
  if(found){
    const s=document.getElementById('m_prod');if(s)s.value=found.id;
    info.textContent=`✅ 已建檔（庫存${found.stock}）`;info.style.color='var(--green)';
  }else{
    const s=document.getElementById('m_prod');if(s)s.value='';
    info.textContent='⚠ 未建檔，下單時自動新增（庫存預設1000）';info.style.color='var(--yellow)';
  }
}
function syncProdFromSelect(){
  const sel=document.getElementById('m_prod');
  if(sel&&sel.value){const mat=mats.find(m=>m.id===sel.value);if(mat){const el=document.getElementById('m_prodCode');if(el)el.value=mat.name;}}
}

// ════════════════════════════════════════════
// SUBMIT
// ════════════════════════════════════════════
async function submitOrder(){
  const cust=document.getElementById('m_cust').value;
  const qty=parseInt(document.getElementById('m_qty').value)||0;
  const date=document.getElementById('m_date').value;
  const note=document.getElementById('m_note').value;
  const prodCode=document.getElementById('m_prodCode').value.trim();
  let prodId=document.getElementById('m_prod').value;

  if(!cust){alert('請選擇客戶');return;}
  if(!qty&&!prodCode){alert('請填入數量與品號');return;}
  if(!date){alert('請填入交期');return;}

  if(prodCode&&!prodId){
    const existing=mats.find(m=>m.name===prodCode||m.code===prodCode);
    if(existing){prodId=existing.id;}
    else{
      showToast('品號未建檔，自動新增中...','warn');
      try{
        const nm=await createPage(DB.materials,{'料件名稱':{title:[{text:{content:prodCode}}]},'類型':{select:{name:'成品'}},'目前庫存':{number:1000},'安全庫存':{number:0}});
        prodId=nm.id;showToast(`✅ ${prodCode} 已建檔`,'ok');
      }catch(e){showToast('自動建檔失敗：'+e.message,'err');return;}
    }
  }
  if(!prodId){alert('請選擇或輸入成品品號');return;}
  const d=new Date();const no=`ORD-${String(d.getFullYear()).slice(2)}${String(d.getMonth()+1).padStart(2,'0')}-${Math.floor(Math.random()*900+100)}`;
  closeModal();
  try{
    await createPage(DB.orders,{'訂單號':{title:[{text:{content:no}}]},'客戶名稱':{select:{name:cust}},'成品':{relation:[{id:prodId}]},'訂購數量':{number:qty},'交期':{date:{start:date}},'狀態':{select:{name:'待排程'}},'業務備註':{rich_text:[{text:{content:note}}]}});
    await refreshAll();showToast(`✅ 訂單 ${no} 建立成功`,'ok');
  }catch(e){showToast('錯誤：'+e.message,'err');}
}

async function submitInbound(){
  const matId=document.getElementById('m_mat').value;
  const qty=parseInt(document.getElementById('m_iqty').value)||0;
  const date=document.getElementById('m_idate').value;
  const sup=document.getElementById('m_sup').value;
  const rec=document.getElementById('m_rec').value;
  if(!qty){alert('請填入數量');return;}
  const d=new Date();const no=`IN-${String(d.getFullYear()).slice(2)}${String(d.getMonth()+1).padStart(2,'0')}-${Math.floor(Math.random()*900+100)}`;
  closeModal();
  try{
    await createPage(DB.inbound,{'入料單號':{title:[{text:{content:no}}]},'料件':{relation:[{id:matId}]},'入料數量':{number:qty},'入料日期':{date:{start:date}},'供應商':{rich_text:[{text:{content:sup}}]},'驗收人員':{rich_text:[{text:{content:rec}}]},'品管狀態':{select:{name:'待品檢'}},'入庫狀態':{select:{name:'待入庫'}}});
    await loadInbounds();renderTab(CURRENT_TAB);showToast(`✅ 入料單 ${no} 建立`,'ok');
  }catch(e){showToast('錯誤：'+e.message,'err');}
}

// ⚠️ 關鍵：新增客戶同步寫入 ERP 客戶主檔
// 說明：客戶總檔（custMaster）欄位不同（Name vs 客戶名稱），
// 且業務客戶總檔是另一個部門在維護，不適合直接寫入
// 目前設計：寫入 ERP 客戶主檔，系統會在讀取時合併兩份
async function submitCustomer(){
 const name = document.getElementById('m_cname').value.trim();
  const code = document.getElementById('m_ccode').value.trim().toUpperCase();
  const region = document.getElementById('m_cregion').value.trim().toUpperCase();

  if(!name){ alert('請填入客戶名稱'); return; }
  if(!code){ alert('請填入客戶代號'); return; }

  // 重複檢查
  const dup = customers.find(c => c.code && c.code.toUpperCase() === code);
  if(dup){ alert(`客戶代號 ${code} 已存在（${dup.name}），請確認`); return; }

  closeModal();
  showToast('新增中，同步兩個資料庫...', 'warn');

  let erpOk = false, masterOk = false;

  // 1. 寫入 ERP 客戶主檔（欄位：客戶名稱 title, 客戶代號 rich_text, 地區 select）
  try {
    await createPage(DB.customers, {
      '客戶名稱': { title: [{ text: { content: name } }] },
      '客戶代號': { rich_text: [{ text: { content: code } }] },
      '地區': { select: { name: region || '海外' } },
    });
    erpOk = true;
  } catch(e) {
    console.error('ERP 主檔新增失敗:', e);
  }

  // 2. 同步寫入客戶總檔（欄位：Name title, 客戶編號 rich_text, 國家 select）
  // 國家 select 需要是已有的選項（國碼），若不存在會失敗，用 try-catch 保護
  try {
    const masterProps = {
      'Name': { title: [{ text: { content: name } }] },
      '客戶編號': { rich_text: [{ text: { content: code } }] },
    };
    // 只在有國家代碼時才填入（避免不存在的選項報錯）
    if(region) masterProps['國家'] = { select: { name: region } };

    await notionAPI('POST', 'pages', {
      parent: { database_id: DB.custMaster },
      properties: masterProps,
    });
    masterOk = true;
  } catch(e) {
    console.error('客戶總檔新增失敗:', e);
  }

  await refreshAll();

  if(erpOk && masterOk){
    showToast(`✅ ${name}（${code}）已同步新增至兩個資料庫`, 'ok');
  } else if(erpOk){
    showToast(`⚠ ERP 主檔新增成功，但客戶總檔同步失敗（國家代碼可能無效）`, 'warn');
  } else {
    showToast(`❌ 新增失敗，請檢查欄位`, 'err');
  }
}

function openStatusModal(orderId,currentStatus){
  const statuses=['待排程','生產中','待出貨','已完成','取消'];
  document.getElementById('modalInner').innerHTML=`<h3>📋 更新訂單狀態</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
    ${statuses.map(s=>`<button class="btn ${s===currentStatus?'btn-blue':'btn-ghost'}" style="justify-content:center" onclick="doUpdateStatus('${orderId}','${s}')">${s}</button>`).join('')}
    </div>
    <div style="display:flex;justify-content:flex-end"><button class="btn btn-ghost" onclick="closeModal()">取消</button></div>`;
  openModal();
}
async function doUpdateStatus(orderId,newStatus){
  closeModal();
  try{await updatePage(orderId,{'狀態':{select:{name:newStatus}}});await refreshAll();showToast(`✅ 狀態→「${newStatus}」`,'ok');}
  catch(e){showToast('錯誤：'+e.message,'err');}
}

function openEditStock(matId,matName,currentStock){
  document.getElementById('modalInner').innerHTML=`<h3>✏️ 修改庫存 — ${matName}</h3>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px">目前：<b style="color:var(--text);font-size:18px">${currentStock}</b> 個</div>
    <input class="inp" type="number" id="newStockVal" value="${currentStock}" min="0" style="margin-bottom:12px">

      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-blue" onclick="doEditStock('${matId}')">確認修改</button>

async function doEditStock(matId){
  const v=parseInt(document.getElementById('newStockVal').value)||0;closeModal();
  try{await updatePage(matId,{'目前庫存':{number:v}});await refreshAll();showToast(`✅ 庫存→${v}`,'ok');}
  catch(e){showToast('錯誤：'+e.message,'err');}
}

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
function showToast(msg,type){
  const c={ok:['rgba(46,196,138,.12)','rgba(46,196,138,.3)','#2ec48a'],warn:['rgba(245,185,66,.1)','rgba(245,185,66,.25)','#f5b942'],err:['rgba(245,101,101,.1)','rgba(245,101,101,.25)','#f56565']};
  const[bg,border,color]=c[type]||c.ok;
  const t=document.createElement('div');t.className='toast';
  t.style.cssText=`background:${bg};border:1px solid ${border};color:${color}`;
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},3500);
}
