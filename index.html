<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LEMATEC ERP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#0c0f18;--bg2:#121622;--bg3:#181d2e;--bg4:#1f2640;
  --border:#242a40;--border2:#2e3857;
  --blue:#4d8ef5;--green:#2ec48a;--yellow:#f5b942;--red:#f56565;--purple:#9b7ff5;--cyan:#42d4f5;
  --text:#dde4f0;--text2:#6b7a9e;--text3:#313d5a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}

/* ── INPUT FIX (搜尋框文字顯示修正) ── */
.inp{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;
  color:var(--text)!important;-webkit-text-fill-color:var(--text)!important;
  font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--blue);}
.inp::placeholder{color:var(--text3);-webkit-text-fill-color:var(--text3);}
select.inp option{background:var(--bg3);color:var(--text);}

/* ── LOGIN ── */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;z-index:100;padding:16px;}
.brand{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);letter-spacing:4px;}
h1{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:400px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:10px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.token-wrap{position:relative;}.token-wrap .inp{padding-right:60px;}
.show-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:10px;padding:3px 8px;border-radius:4px;}
.hint{font-size:10px;color:var(--text3);margin-top:4px;line-height:1.5;}.hint a{color:var(--blue);text-decoration:none;}
.btn-login{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}
.btn-login:disabled{background:var(--text3);cursor:not-allowed;}
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-top:10px;display:none;}.alert.show{display:block;}
.alert-err{background:rgba(245,101,101,.08);border:1px solid rgba(245,101,101,.2);color:var(--red);}
.debug-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:10px;font-size:10px;font-family:monospace;color:var(--text2);display:none;word-break:break-all;}.debug-box.show{display:block;}

/* ── APP ── */
.app{display:none;flex-direction:column;min-height:100vh;}
.topbar{height:50px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:50;}
.topbar-brand{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);letter-spacing:3px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
.role-badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.role-nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 8px;overflow-x:auto;scrollbar-width:none;}
.role-nav::-webkit-scrollbar{display:none;}
.tab-btn{padding:10px 12px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);}
.content{flex:1;padding:12px;overflow-y:auto;}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
@media(max-width:500px){.stats{grid-template-columns:1fr 1fr;}}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:border-color .15s;}
.stat:hover{border-color:var(--blue);}
.stat-n{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;line-height:1;margin-bottom:4px;}
.stat-l{font-size:10px;color:var(--text2);}

/* ── PANEL & TABLE ── */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.panel-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.panel-title{font-size:12px;font-weight:700;}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:420px;}
th{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);font-weight:700;padding:7px 12px;text-align:left;background:var(--bg3);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;}
th:hover{color:var(--text2);}th.th-asc,th.th-desc{color:var(--blue);}
td{padding:8px 12px;font-size:12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}tr:hover td{background:rgba(255,255,255,.015);}
@media(max-width:600px){.hide-m{display:none!important;}table{min-width:300px;}td,th{padding:6px 8px;font-size:11px;}}

/* ── MISC ── */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.info-box{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:12px;line-height:1.6;}
.info-ok{background:rgba(46,196,138,.08);border:1px solid rgba(46,196,138,.2);color:var(--green);}
.info-warn{background:rgba(245,185,66,.08);border:1px solid rgba(245,185,66,.2);color:var(--yellow);}
.help-box{background:rgba(66,212,245,.05);border:1px solid rgba(66,212,245,.15);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--cyan);margin-bottom:10px;line-height:1.7;}
.bar{width:40px;height:4px;background:var(--bg4);border-radius:2px;display:inline-block;vertical-align:middle;margin-right:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;}
.toast{position:fixed;top:58px;right:12px;left:12px;z-index:300;padding:10px 14px;border-radius:8px;font-size:12px;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity .3s;}
@media(min-width:480px){.toast{left:auto;min-width:260px;max-width:420px;}}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);align-items:flex-end;justify-content:center;z-index:200;}
@media(min-width:600px){.modal-bg{align-items:center;}}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto;}
@media(min-width:600px){.modal{border-radius:14px;width:540px;max-height:88vh;}}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:420px){.form-row{grid-template-columns:1fr;}}
.form-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;flex-wrap:wrap;}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px;touch-action:manipulation;}
.btn-blue{background:var(--blue);color:#fff;}.btn-blue:disabled{background:var(--text3);cursor:not-allowed;}
.btn-green{background:rgba(46,196,138,.15);color:var(--green);border:1px solid rgba(46,196,138,.3);}
.btn-red{background:rgba(245,101,101,.1);color:var(--red);border:1px solid rgba(245,101,101,.25);}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-yellow{background:rgba(245,185,66,.1);color:var(--yellow);border:1px solid rgba(245,185,66,.25);}
.btn-cyan{background:rgba(66,212,245,.1);color:var(--cyan);border:1px solid rgba(66,212,245,.25);}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px;}

.loading-row{display:flex;align-items:center;justify-content:center;padding:24px;color:var(--text3);gap:8px;font-size:12px;}
.spin{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;flex-shrink:0;}
.pi-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border-color .15s;}
.pi-item:hover,.pi-item.selected{border-color:var(--blue);background:rgba(77,142,245,.07);}
.sn{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--blue);color:#fff;font-size:9px;font-weight:700;margin-right:4px;flex-shrink:0;vertical-align:middle;}
.qc-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;}
.qc-tab{padding:8px 16px;font-size:12px;font-weight:600;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--text2);}
.qc-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.badge{background:rgba(77,142,245,.15);color:var(--blue);border-radius:10px;padding:1px 7px;font-size:10px;margin-left:4px;font-weight:700;}
.badge-warn{background:rgba(245,185,66,.15);color:var(--yellow);}
.badge-ok{background:rgba(46,196,138,.1);color:var(--green);}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="brand">LEMATEC · ERP</div>
  <h1>製造管理系統</h1>
  <div class="card">
    <div class="field"><label>Notion Integration Token</label>
      <div class="token-wrap"><input class="inp" type="text" id="tokenInput" placeholder="ntn_xxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false"><button class="show-btn" onclick="document.getElementById('tokenInput').value=''">清除</button></div>
      <div class="hint">前往 <a href="https://notion.so/profile/integrations" target="_blank">notion.so/profile/integrations</a> 取得</div>
    </div>
    <div class="field"><label>角色</label>
      <select class="inp" id="roleSelect">
        <option value="manager">🏭 廠長（全功能）</option>
        <option value="sales">📋 業務</option>
        <option value="production">⚙️ 生管</option>
        <option value="warehouse">📦 倉管</option>
        <option value="qc">✅ 品管</option>
        <option value="purchase">🛒 採購</option>
      </select>
    </div>
    <button class="btn-login" id="loginBtn" onclick="login()">⚡ 進入系統</button>
    <div class="alert alert-err" id="loginAlert"></div>
    <div class="debug-box" id="debugBox"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-brand">LEMATEC</div>
    <span style="color:var(--text3);font-size:10px">ERP</span>
    <div class="topbar-right">
      <span id="syncStatus" style="font-size:10px;color:var(--text3)"></span>
      <span id="lowWarn" style="font-size:10px;color:var(--yellow);display:none"></span>
      <span class="role-badge" id="roleBadge"></span>
      <span class="conn-dot"></span>
      <button class="btn btn-ghost btn-sm" onclick="refreshAll(true)" title="重新整理">🔄</button>
      <button class="btn btn-ghost btn-sm" onclick="openModal('help')" title="使用說明">❓</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">登出</button>
    </div>
  </div>
  <div class="role-nav" id="roleNav"></div>
  <div class="content" id="mainContent"></div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal"><div id="modalInner"></div></div>
</div>

<script>
// ══════════════════════════════════════════════
// NOTION 資料庫對應（完整版）
// 📊 總覽     → 彙整
// 📋 訂單     → DB.orders    客戶訂單
// 🏢 客戶     → DB.customers ERP客戶主檔 + DB.custMaster 國外業務客戶總檔
// 📦 庫存     → DB.materials 料件主檔
// 🗂️ 領料     → DB.pickMaster 領料主單
// 📥 入料     → DB.inbound   入料單
// ✅ 品管     → DB.inbound   (品管篩選)
//
// 客戶編號格式: YY(年) + SS(出貨狀態:01未出貨/02已出貨) + 國碼 + 流水號
// 例: 2602AU016 = 2026年 + 已出貨 + AU + 016
// ⚠️ 每次登入必須重新從 Notion 讀取，因為出貨狀態改變時編號也會變
// ══════════════════════════════════════════════
const DB={
  materials:'43d801b4-a787-4101-bd12-d8b8199385c7',
  bom:'6b67dc8d-bafb-49e8-9c39-bf66046a99fe',
  orders:'50b7ce68-437e-431f-9a4f-a0d0d65a7b25',
  pickMaster:'55552dd1-eb31-4d68-8127-63cc062a93f8',
  pickDetail:'267f16cf-e88a-41ed-8049-d39d618a1275',
  inbound:'cff100a4-ddcd-4bda-b8d7-57d44c4b3ce4',
  customers:'d7e6db27-5935-4aea-8dbf-ea48bca5a4b4',
  custMaster:'19fff6f4-24bb-80fe-b265-c62fa39c814c',
};
const ROLES={
  manager:{label:'廠長',color:'#42d4f5',tabs:['dashboard','orders','picking','inventory','inbound','qc','customers']},
  sales:{label:'業務',color:'#4d8ef5',tabs:['dashboard','orders','customers']},
  production:{label:'生管',color:'#9b7ff5',tabs:['dashboard','orders','picking','inventory']},
  warehouse:{label:'倉管',color:'#2ec48a',tabs:['dashboard','inventory','picking','inbound']},
  qc:{label:'品管',color:'#f5b942',tabs:['dashboard','qc','inbound']},
  purchase:{label:'採購',color:'#2ec48a',tabs:['dashboard','inventory','inbound']},
};
const TAB_LABELS={dashboard:'📊 總覽',orders:'📋 訂單',customers:'🏢 客戶',picking:'🗂️ 領料',inventory:'📦 庫存',inbound:'📥 入料',qc:'✅ 品管'};
const PILL={
  '待排程':['rgba(245,185,66,.12)','#f5b942'],'生產中':['rgba(77,142,245,.12)','#4d8ef5'],
  '待出貨':['rgba(155,127,245,.12)','#9b7ff5'],'已完成':['rgba(46,196,138,.12)','#2ec48a'],
  '取消':['rgba(245,101,101,.12)','#f56565'],'已確認扣料':['rgba(46,196,138,.12)','#2ec48a'],
  '缺料待補':['rgba(245,101,101,.12)','#f56565'],
  '待品檢':['rgba(245,185,66,.12)','#f5b942'],'品檢通過':['rgba(46,196,138,.12)','#2ec48a'],
  '品檢不合格':['rgba(245,101,101,.12)','#f56565'],'已入庫':['rgba(46,196,138,.12)','#2ec48a'],
  '待入庫':['#1f2640','#313d5a'],'退回供應商':['rgba(245,101,101,.12)','#f56565'],
  '零件':['#1f2640','#6b7a9e'],'半成品':['rgba(155,127,245,.12)','#9b7ff5'],'成品':['rgba(46,196,138,.12)','#2ec48a'],
};

let TOKEN='',ROLE='',CURRENT_TAB='dashboard';
let mats=[],boms=[],orders=[],customers=[],picks=[],inbounds=[];
let QC_SUB='pending',QC_FILTER='all';
const SORT={};
const PROXY='https://green-wave-c22f.vic-e93.workers.dev';

// ══════════════════════════════════════════════
// API
// ══════════════════════════════════════════════
async function notionAPI(method,endpoint,body=null){
  const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:TOKEN,method,endpoint,body})});
  const text=await res.text();
  try{return JSON.parse(text);}catch{throw new Error('解析失敗: '+text.slice(0,120));}
}
async function dbQueryAll(dbId){
  let all=[],c=null;
  do{
    const b={page_size:100};if(c)b.start_cursor=c;
    const r=await notionAPI('POST',`databases/${dbId}/query`,b);
    all=all.concat(r.results||[]);c=r.has_more?r.next_cursor:null;
  }while(c);
  return all;
}
const createPage=(dbId,props)=>notionAPI('POST','pages',{parent:{database_id:dbId},properties:props});
const updatePage=(id,props)=>notionAPI('PATCH',`pages/${id}`,{properties:props});
const getBlockChildren=id=>notionAPI('GET',`blocks/${id}/children?page_size=100`);
const getBlock=id=>notionAPI('GET',`blocks/${id}`);
const notionSearch=q=>notionAPI('POST','search',{query:q,filter:{property:'object',value:'page'},page_size:20});
async function downloadViaProxy(url){
  const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:TOKEN,downloadUrl:url})});
  if(!res.ok)throw new Error(`下載失敗 HTTP ${res.status}`);
  return res.arrayBuffer();
}

// 解析工具
function getTitle(props,...keys){for(const k of keys){const a=props?.[k]?.title;if(Array.isArray(a)&&a.length)return a[0]?.plain_text||a[0]?.text?.content||'';}return '';}
function getRichText(props,...keys){for(const k of keys){const p=props?.[k];if(!p)continue;const a=p.rich_text||p.text||[];if(Array.isArray(a)&&a.length)return(a[0]?.plain_text||a[0]?.text?.content||'').trim();}return '';}

// ══════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════
async function login(){
  const t=document.getElementById('tokenInput').value.trim().replace(/\s+/g,'');
  const r=document.getElementById('roleSelect').value;
  document.getElementById('loginAlert').classList.remove('show');
  if(!t){showLoginErr('請填入 Token');return;}
  if(!t.startsWith('ntn_')){showLoginErr('Token 需 <b>ntn_</b> 開頭');return;}
  TOKEN=t;ROLE=r;
  const btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='驗證中...';
  try{
    const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:t,method:'GET',endpoint:`databases/${DB.materials}`})});
    const data=await res.json();
    document.getElementById('debugBox').textContent=`HTTP ${res.status}`;
    document.getElementById('debugBox').className='debug-box show';
    if(data.id||data.object==='database'){
      localStorage.setItem('lematec_token',t);localStorage.setItem('lematec_role',r);startApp();
    }else if(data.status===401||data.code==='unauthorized'){showLoginErr('Token 無效 (401)');}
    else{showLoginErr(`連接失敗: ${data.message||data.code||'未知'}`);}
  }catch(e){showLoginErr(`網路錯誤: ${e.message}`);}
  btn.disabled=false;btn.textContent='⚡ 進入系統';
}
function showLoginErr(msg){const el=document.getElementById('loginAlert');el.innerHTML=msg;el.className='alert alert-err show';}
function logout(){
  localStorage.removeItem('lematec_token');localStorage.removeItem('lematec_role');
  TOKEN='';ROLE='';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
}

// ══════════════════════════════════════════════
// START — 先顯示 UI，背景平行載入
// ══════════════════════════════════════════════
async function startApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  const ri=ROLES[ROLE];
  const badge=document.getElementById('roleBadge');
  badge.textContent=ri.label;
  badge.style.cssText=`padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:${ri.color}20;color:${ri.color}`;
  buildNav();showTab('dashboard');
  // 立即顯示 loading，不阻塞 UI
  document.getElementById('mainContent').innerHTML=
    `<div class="loading-row"><div class="spin"></div>資料載入中（首次約 10-20 秒）...</div>`;
  await refreshAll();
}

// ══════════════════════════════════════════════
// 資料載入 — 全部平行抓取（加速關鍵）
// 客戶每次都從 Notion 重新讀取，因為編號會動態變
// ══════════════════════════════════════════════
async function refreshAll(manual=false){
  const syncEl=document.getElementById('syncStatus');
  if(syncEl)syncEl.textContent='⟳ 同步中...';
  try{
    // 全部平行：5個資料庫同時請求，不依序等待
    const [mR,bR,oR,cR,masterR]=await Promise.all([
      dbQueryAll(DB.materials),
      dbQueryAll(DB.bom),
      dbQueryAll(DB.orders),
      dbQueryAll(DB.customers),
      dbQueryAll(DB.custMaster),  // 每次都重新抓，因為客戶編號會隨出貨狀態改變
    ]);

    mats=mR.map(p=>({
      id:p.id,
      name:getTitle(p.properties,'料件名稱'),
      code:getRichText(p.properties,'料件編號'),
      type:p.properties?.['類型']?.select?.name||'',
      unit:p.properties?.['單位']?.select?.name||'個',
      stock:p.properties?.['目前庫存']?.number??0,
      safe:p.properties?.['安全庫存']?.number??0,
    }));

    boms=bR.map(p=>({
      parentId:p.properties?.['母件']?.relation?.[0]?.id||'',
      childId:p.properties?.['子件']?.relation?.[0]?.id||'',
      qty:p.properties?.['每台用量']?.number??1,
    }));

    orders=oR.map(p=>({
      id:p.id,
      no:getTitle(p.properties,'訂單號'),
      customer:p.properties?.['客戶名稱']?.select?.name||'',
      productId:p.properties?.['成品']?.relation?.[0]?.id||'',
      qty:p.properties?.['訂購數量']?.number??0,
      deadline:p.properties?.['交期']?.date?.start||'',
      status:p.properties?.['狀態']?.select?.name||'',
      note:p.properties?.['業務備註']?.rich_text?.[0]?.plain_text||'',
      created:p.created_time?.slice(0,10)||'',  // 建立日期
    }));

    // 客戶合併：ERP主檔 + 業務客戶總檔
    // ⚠️ 關鍵：客戶編號(2602AU015)是業務總檔的動態欄位，每次重新讀取
    const erpCusts=cR.map(p=>({
      id:p.id,
      name:getTitle(p.properties,'客戶名稱'),
      code:getRichText(p.properties,'客戶代號'),
      region:p.properties?.['地區']?.select?.name||'',
      source:'erp',
    })).filter(c=>c.name);

    const masterCusts=masterR.map(p=>({
      id:p.id,
      name:getTitle(p.properties,'Name'),
      code:getRichText(p.properties,'客戶編號'),  // 動態，每次重新讀
      region:p.properties?.['國家']?.select?.name||'',
      email:p.properties?.['Email']?.rich_text?.[0]?.plain_text||
             p.properties?.['Email']?.email||'',
      shipped:p.properties?.['出貨']?.select?.name||'',
      source:'master',
    })).filter(c=>c.name);

    // 合併：以 code 為唯一鍵，ERP 主檔優先
    const byCode=new Map();
    erpCusts.forEach(c=>{if(c.code)byCode.set(c.code.toLowerCase(),c);});
    masterCusts.forEach(c=>{
      if(c.code){if(!byCode.has(c.code.toLowerCase()))byCode.set(c.code.toLowerCase(),c);}
      else byCode.set('_noc_'+c.id,c);
    });
    customers=Array.from(byCode.values());

    const low=mats.filter(m=>m.stock<=m.safe&&m.type!=='成品');
    const w=document.getElementById('lowWarn');
    if(low.length){w.style.display='';w.textContent=`⚠ ${low.length}項庫存不足`;}else w.style.display='none';

    const now=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    if(syncEl)syncEl.textContent=`✓ ${now}`;

    renderTab(CURRENT_TAB);
    if(manual)showToast('✅ 資料已同步','ok');
  }catch(e){
    if(syncEl)syncEl.textContent='❌ 同步失敗';
    document.getElementById('mainContent').innerHTML=
      `<div class="info-box" style="background:rgba(245,101,101,.08);border:1px solid rgba(245,101,101,.2);color:var(--red);margin:8px">
        ❌ 載入失敗: ${e.message}<br>
        <button class="btn btn-ghost btn-sm" onclick="refreshAll()" style="margin-top:8px">重試</button>
      </div>`;
  }
}

// BOM 展開
function explodeBOM(pid,qty){
  const res={};const q=[{pid,mult:qty}];const seen=new Set();
  while(q.length){
    const{pid:p,mult:m}=q.shift();
    boms.filter(b=>b.parentId===p).forEach(b=>{
      const mat=mats.find(x=>x.id===b.childId);if(!mat)return;
      const n=b.qty*m;if(!res[b.childId])res[b.childId]={...mat,needed:0};
      res[b.childId].needed+=n;
      if(mat.type==='半成品'&&!seen.has(b.childId)){seen.add(b.childId);q.push({pid:b.childId,mult:n});}
    });
  }
  return Object.values(res);
}

// SORT & FILTER
// ══════════════════════════════════════════════
function toggleSort(tid,col,type='str'){
  const s=SORT[tid]||{};
  SORT[tid]={col,dir:s.col===col&&s.dir==='asc'?'desc':'asc',type};
  renderTab(CURRENT_TAB);
}
function applySort(tid,data){
  const s=SORT[tid];if(!s)return data;
  return[...data].sort((a,b)=>{
    let va=a[s.col],vb=b[s.col];
    if(s.type==='num'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}
    else{va=String(va||'').toLowerCase();vb=String(vb||'').toLowerCase();}
    if(va<vb)return s.dir==='asc'?-1:1;if(va>vb)return s.dir==='asc'?1:-1;return 0;
  });
}
function TH(tid,col,label,type='str',cls=''){
  const s=SORT[tid]||{};const a=s.col===col;
  return`<th class="${a?'th-'+s.dir:''} ${cls}" onclick="toggleSort('${tid}','${col}','${type}')">${label}<span style="font-size:8px;opacity:${a?1:.3};margin-left:2px">${a?(s.dir==='asc'?'↑':'↓'):'↕'}</span></th>`;
}

// 日期篩選（介面過濾，Notion 資料不刪）
function applyDateFilter(filterId,data,dateKey='deadline'){
  const sel=document.getElementById(filterId+'DateFilter');
  const m=sel?parseInt(sel.value):6;
  if(!m)return data;
  const cutoff=new Date();cutoff.setMonth(cutoff.getMonth()-m);
  const cs=cutoff.toISOString().slice(0,10);
  return data.filter(item=>{
    const d=item[dateKey]||item.date||item.created||'';
    return!d||d>=cs;
  });
}

function buildNav(){
  const nav=document.getElementById('roleNav');nav.innerHTML='';
  ROLES[ROLE].tabs.forEach(tab=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(tab===CURRENT_TAB?' active':'');
    btn.textContent=TAB_LABELS[tab];
    btn.onclick=()=>switchTab(tab);
    nav.appendChild(btn);
  });
}
function switchTab(tab){
  CURRENT_TAB=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.textContent===TAB_LABELS[tab]));
  renderTab(tab);
  if(tab==='picking')loadPicks().then(()=>renderTab('picking'));
  if(tab==='inbound'||tab==='qc')loadInbounds().then(()=>renderTab(tab));
}
function showTab(tab){CURRENT_TAB=tab;renderTab(tab);}
function pill(t){const[bg,c]=PILL[t]||['#1f2640','#6b7a9e'];return`<span class="pill" style="background:${bg};color:${c}">${t||'—'}</span>`;}
function renderTab(tab){
  const c=document.getElementById('mainContent');
  if(tab==='dashboard')c.innerHTML=renderDashboard();
  else if(tab==='orders')c.innerHTML=renderOrders();
  else if(tab==='customers')c.innerHTML=renderCustomers();
  else if(tab==='inventory')c.innerHTML=renderInventory();
  else if(tab==='picking')c.innerHTML=renderPicking();
  else if(tab==='inbound')c.innerHTML=renderInbound();
  else if(tab==='qc')c.innerHTML=renderQCTab();
}

async function doPick(orderId){
  const o=orders.find(x=>x.id===orderId);
  const prod=mats.find(m=>m.id===o.productId);
  const items=explodeBOM(o.productId,o.qty);
  const ds=new Date().toISOString().slice(0,10);
  const no=`PK-${ds.slice(2).replace(/-/g,'')}-${Math.floor(Math.random()*900+100)}`;
  closeModal();showToast('建立領料單中...','warn');
  try{
    const master=await createPage(DB.pickMaster,{
      '領料主單號':{title:[{text:{content:no}}]},
      '對應訂單':{relation:[{id:orderId}]},
      '成品品號':{rich_text:[{text:{content:prod?.name||''}}]},
      '生產數量':{number:o.qty},
      '狀態':{select:{name:'已確認扣料'}},
      '領料日期':{date:{start:ds}},
    });
    for(const item of items){
      await createPage(DB.pickDetail,{
        '料件名稱':{title:[{text:{content:item.name}}]},
        '領料主單':{relation:[{id:master.id}]},
        '料件':{relation:[{id:item.id}]},
        '類型':{select:{name:item.type}},
        '需求數量':{number:item.needed},
        '實領數量':{number:item.type==='半成品'?item.needed:Math.min(item.needed,item.stock)},
        '狀態':{select:{name:item.type==='半成品'?'半成品':item.stock>=item.needed?'足夠':'缺料'}},
      });
      if(item.type!=='半成品')await updatePage(item.id,{'目前庫存':{number:Math.max(0,item.stock-item.needed)}});
    }
    await updatePage(orderId,{'狀態':{select:{name:'生產中'}}});
    await refreshAll();await loadPicks();
    showToast(`✅ 領料單 ${no} 建立完成`,'ok');
  }catch(e){showToast('錯誤：'+e.message,'err');}
}

async function approveQC(id,matId,qty){
  if(!confirm(`確認品檢通過？將增加 ${qty} 個庫存`))return;
  try{
    await updatePage(id,{'品管狀態':{select:{name:'品檢通過'}},'入庫狀態':{select:{name:'已入庫'}}});
    const mat=mats.find(m=>m.id===matId);

    await refreshAll();await loadInbounds();renderTab(CURRENT_TAB);
    showToast(`✅ 品檢通過！${mat?.name} 庫存更新`,'ok');
  }catch(e){showToast('錯誤：'+e.message,'err');}
}
async function rejectQC(id){
  if(!confirm('確認不合格？將標記退回'))return;
  try{
    await updatePage(id,{'品管狀態':{select:{name:'品檢不合格'}},'入庫狀態':{select:{name:'退回供應商'}}});

    showToast('已標記不合格','warn');

}

let _mc=null;
function matchCustomer(v){
  if(!v)return null;const q=v.toLowerCase().trim();
  return customers.find(c=>c.code&&c.code.toLowerCase()===q)||
         customers.find(c=>c.code&&c.code.toLowerCase().startsWith(q))||
         (q.length>=4?customers.find(c=>c.code&&c.code.toLowerCase().includes(q)):null)||null;
}
function onCustCodeInput(v){
  const info=document.getElementById('custMatch');
  const btn=document.getElementById('fetchPIBtn');
  const list=document.getElementById('piNotionList');
  if(list)list.style.display='none';
  if(!v){info.textContent='';if(btn)btn.style.display='none';_mc=null;return;}
  _mc=matchCustomer(v);
  if(_mc){
    const sel=document.getElementById('m_cust');
    if(sel){const opt=Array.from(sel.options).find(o=>o.dataset.code===_mc.code||o.value===_mc.name);if(opt)sel.value=opt.value;}
    info.innerHTML=`<span style="color:var(--green)">✅ ${_mc.name}（${_mc.code}）</span>`;
    if(btn)btn.style.display='';
  }else{
    const sim=customers.filter(c=>c.code&&v.length>=2&&c.code.toLowerCase().startsWith(v.slice(0,4).toLowerCase())).slice(0,3);
    info.innerHTML=`<span style="color:var(--yellow)">⚠ 找不到「${v}」${sim.length?' 相似：'+sim.map(c=>c.code).join('、'):'，請確認代號'}</span>`;
    if(btn)btn.style.display='none';
  }
}

// ══════════════════════════════════════════════
// PI — 讀取 Excel 附件
// Notion file block: b.file.file.url 或 b.file.external.url
// ══════════════════════════════════════════════
async function selectAndLoadPI(pageId,title,idx){
  document.querySelectorAll('.pi-item').forEach(e=>e.classList.remove('selected'));
  const el=document.getElementById('pii_'+idx);if(el)el.classList.add('selected');
  const setStatus=msg=>{const d=el?.querySelector('.pi-status');if(d)d.textContent=msg;};
  setStatus('⏳ 讀取 block 列表...');
  try{
    const blocks=await getBlockChildren(pageId);
    const all=blocks.results||[];
    let fileUrl='',fileName='',pdfUrl='';

    for(const b of all){
      if(b.type!=='file')continue;
      const fd=b.file||{};
      const name=(fd.name||'').toLowerCase();
      const url=fd.file?.url||fd.external?.url||'';
      if(!url)continue;
      if((name.endsWith('.xlsx')||name.endsWith('.xls'))&&!fileUrl){fileUrl=url;fileName=fd.name;}
      if(name.endsWith('.pdf')&&!pdfUrl)pdfUrl=url;
    }

    // 找不到時嘗試 child_page 標題含 xlsx
    if(!fileUrl){
      for(const b of all){
        if(b.type!=='child_page')continue;
        const t=(b.child_page?.title||'').toLowerCase();
        if(t.endsWith('.xlsx')||t.endsWith('.xls')){
          try{const bd=await getBlock(b.id);const bfd=bd[bd.type]||{};const u=bfd.file?.url||bfd.external?.url||'';if(u){fileUrl=u;fileName=b.child_page.title;break;}}catch{}
        }
      }
    }

    // 只有 PDF
    if(!fileUrl&&pdfUrl){
      setStatus('📄 只有 PDF（無法自動解析）');
      const el2=document.getElementById('piInfo');
      if(el2)el2.innerHTML=`<span style="color:var(--yellow)">⚠ 此訂單只有 PDF，無法自動解析。<a href="${pdfUrl}" target="_blank" style="color:var(--blue)">點此開啟 PDF</a>，請手動填入。</span>`;
      showToast('只有 PDF 附件，請手動填入','warn');return;
    }
    if(!fileUrl){setStatus('❌ 找不到 Excel');showToast('找不到 Excel 附件，請直接上傳','warn');return;}

    setStatus(`⏳ 下載中...`);
    const buf=await downloadViaProxy(fileUrl);
    const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:null});
    const orderNo=title.replace(/\s*\(.*?\)\s*/g,'').trim();
    const items=parsePIRows(rows,orderNo);
    setStatus(`✅ 讀取 ${items.length} 個品項`);
    showToast(`✅ PI「${title}」讀取成功`,'ok');
  }catch(e){setStatus(`❌ ${e.message.slice(0,50)}`);showToast('讀取失敗，請直接上傳','err');console.error(e);}
}

// ══════════════════════════════════════════════
// PI 解析 — 支援多品項，訂單號優先用頁面標題
// ══════════════════════════════════════════════
function parsePIRows(rows,titleHint){
  const piNoRaw=rows[6]&&rows[6][9]?String(rows[6][9]).trim():'';
  const piNo=titleHint||piNoRaw;
  let piDate='';
  if(rows[7]&&rows[7][8])piDate=String(rows[7][8]).replace(/Date:/i,'').trim().replace(/\./g,'-');

  const items=[];
  for(let i=12;i<(rows.length||0)-1;i++){
    const row=rows[i];if(!row)continue;
    const col1=row[1]!=null?String(row[1]).trim():'';
    if(col1&&/^\d+\.?$/.test(col1)){
      const desc=row[2]!=null?String(row[2]).trim():'';
      const qty=row[6]!=null?parseInt(row[6])||0:0;
      const model=(rows[i+1]||[])[2]!=null?String((rows[i+1]||[])[2]).trim():'';
      if(model&&qty>0)items.push({model,desc,qty});
      i++;
    }
  }

  // 填入備註
  const noteEl=document.getElementById('m_note');if(noteEl&&piNo)noteEl.value='PI No: '+piNo;
  // 填入交期 (+30天)
  if(piDate.match(/^\d{4}-\d{2}-\d{2}$/)){
    const d=new Date(piDate);d.setDate(d.getDate()+30);
    const dateEl=document.getElementById('m_date');if(dateEl)dateEl.value=d.toISOString().slice(0,10);
  }

  const infoEl=document.getElementById('piInfo');
  if(!items.length){if(infoEl)infoEl.textContent='⚠ 未能解析品項，請手動填入';return items;}

  if(items.length===1){
    const pc=document.getElementById('m_prodCode');if(pc)pc.value=items[0].model;
    const qe=document.getElementById('m_qty');if(qe)qe.value=items[0].qty;
    matchProduct(items[0].model);
    if(infoEl)infoEl.innerHTML=`<span style="color:var(--green)">✅ ${piNo} | ${items[0].model} × ${items[0].qty}</span>`;
  }else{
    if(infoEl)infoEl.innerHTML=`<span style="color:var(--cyan)">📦 共 ${items.length} 個品項，請在下方勾選後批次建立</span>`;
    showMultiItems(items,piNo);
  }
  return items;
}

function showMultiItems(items,piNo){
  const div=document.getElementById('piMultiList');if(!div)return;
  div.style.display='';
  div.innerHTML=`<div style="font-size:11px;color:var(--text2);margin-bottom:6px">📦 PI 品項（勾選後批次建立）：</div>`+
  items.map((item,i)=>`<div style="background:var(--bg4);border-radius:6px;padding:8px 10px;margin-bottom:4px;display:flex;align-items:center;gap:8px">
    <input type="checkbox" id="chk_${i}" checked style="accent-color:var(--blue);width:16px;height:16px;flex-shrink:0">
    <div style="flex:1;min-width:0">
      <span style="font-family:monospace;font-weight:700;color:var(--text);font-size:12px">${item.model}</span>
      ${item.desc?`<span style="color:var(--text2);font-size:10px;margin-left:6px">${item.desc}</span>`:''}
    </div>
    <input class="inp" type="number" id="qty_${i}" value="${item.qty}" min="1" style="width:70px;padding:4px 8px;font-size:12px;flex-shrink:0">
  </div>`).join('')+
  `<button class="btn btn-blue" style="width:100%;justify-content:center;margin-top:8px"
    onclick="submitMultiOrders(${JSON.stringify(items).replace(/</g,'\\u003c').replace(/>/g,'\\u003e').replace(/&/g,'\\u0026')},${items.length},'${piNo.replace(/'/g,"\\'")}')">
    📋 批次建立所有勾選的訂單
  </button>`;
}

// 批次建立訂單 — 不 closeModal，在 modal 內顯示進度
// ══════════════════════════════════════════════
async function submitMultiOrders(items,count,piNo){
  const cust=document.getElementById('m_cust')?.value;
  const date=document.getElementById('m_date')?.value;
  if(!cust){alert('請選擇客戶');return;}
  if(!date){alert('請填入交期');return;}

  const selected=[];
  for(let i=0;i<count;i++){
    const chk=document.getElementById('chk_'+i);
    const qtyEl=document.getElementById('qty_'+i);
    if(chk?.checked&&qtyEl)selected.push({model:items[i].model,qty:parseInt(qtyEl.value)||items[i].qty});
  }
  if(!selected.length){alert('請至少勾選一個品項');return;}

  const div=document.getElementById('piMultiList');
  if(div)div.innerHTML=`<div style="padding:10px;font-size:12px;color:var(--cyan)"><div class="spin" style="margin-right:6px"></div>建立 ${selected.length} 筆訂單中，請勿關閉...</div>`;

  const prefix=`ORD-${new Date().toISOString().slice(2,7).replace('-','')}`;
  let ok=0,fail=0,failDetails=[];

  for(const item of selected){
    try{
      let prodId='';
      const ex=mats.find(m=>m.name===item.model||m.code===item.model);
      if(ex){prodId=ex.id;}else{
        const nm=await createPage(DB.materials,{
          '料件名稱':{title:[{text:{content:item.model}}]},
          '類型':{select:{name:'成品'}},
          '目前庫存':{number:1000},
          '安全庫存':{number:0},
        });
        prodId=nm.id;
      }
      const no=`${prefix}-${String(ok+fail+1).padStart(3,'0')}`;
      await createPage(DB.orders,{
        '訂單號':{title:[{text:{content:no}}]},
        '客戶名稱':{select:{name:cust}},
        '成品':{relation:[{id:prodId}]},
        '訂購數量':{number:item.qty},
        '交期':{date:{start:date}},
        '狀態':{select:{name:'待排程'}},
        '業務備註':{rich_text:[{text:{content:'PI No: '+piNo}}]},
      });
      ok++;
    }catch(e){fail++;failDetails.push(item.model);console.error(item.model,e);}
  }

  await refreshAll();
  if(div)div.innerHTML=`<div style="padding:10px;font-size:12px;color:${ok===selected.length?'var(--green)':'var(--yellow)'}">
    ✅ 成功 ${ok} 筆${fail?`，失敗 ${fail} 筆（${failDetails.join('、')}）`:''}
    <br><button class="btn btn-ghost btn-sm" onclick="closeModal()" style="margin-top:8px">關閉</button>
  </div>`;
  showToast(`${ok===selected.length?'✅':'⚠'} 建立 ${ok}/${selected.length} 筆訂單`,ok===selected.length?'ok':'warn');
}

function parsePIFile(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});parsePIRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:null}),file.name.replace(/\.xlsx?$/i,''));}catch(err){const el=document.getElementById('piInfo');if(el)el.textContent='❌ 解析失敗：'+err.message;}};
  r.readAsArrayBuffer(file);
}
function matchProduct(code){
  if(!code){const el=document.getElementById('prodMatch');if(el)el.textContent='';return;}
  const f=mats.find(m=>m.name===code||m.code===code);
  const info=document.getElementById('prodMatch');if(!info)return;
  if(f){const s=document.getElementById('m_prod');if(s)s.value=f.id;info.textContent=`✅ 已建檔（庫存${f.stock}）`;info.style.color='var(--green)';}
  else{const s=document.getElementById('m_prod');if(s)s.value='';info.textContent='⚠ 未建檔，下單時自動新增';info.style.color='var(--yellow)';}
}
function syncProdFromSelect(){
  const sel=document.getElementById('m_prod');
  if(sel?.value){const m=mats.find(x=>x.id===sel.value);if(m){const el=document.getElementById('m_prodCode');if(el)el.value=m.name;}}
}

async function submitOrder(){
  const cust=document.getElementById('m_cust').value;
  const qty=parseInt(document.getElementById('m_qty').value)||0;
  const date=document.getElementById('m_date').value;
  const note=document.getElementById('m_note').value;
  const prodCode=document.getElementById('m_prodCode').value.trim();
  let prodId=document.getElementById('m_prod').value;
  if(!cust){alert('請選擇客戶');return;}
  if(!qty||!date){alert('請填入數量與交期');return;}
  if(prodCode&&!prodId){
    const ex=mats.find(m=>m.name===prodCode||m.code===prodCode);
    if(ex){prodId=ex.id;}
    else{
      showToast('自動新增品號中...','warn');
      try{const nm=await createPage(DB.materials,{'料件名稱':{title:[{text:{content:prodCode}}]},'類型':{select:{name:'成品'}},'目前庫存':{number:1000},'安全庫存':{number:0}});prodId=nm.id;}
      catch(e){showToast('建檔失敗：'+e.message,'err');return;}
    }
  }
  if(!prodId){alert('請選擇或輸入成品品號');return;}
  const no=`ORD-${new Date().toISOString().slice(2,7).replace('-','')}-${Math.floor(Math.random()*900+100)}`;
  closeModal();
  try{
    await createPage(DB.orders,{
      '訂單號':{title:[{text:{content:no}}]},
      '客戶名稱':{select:{name:cust}},
      '成品':{relation:[{id:prodId}]},
      '訂購數量':{number:qty},
      '交期':{date:{start:date}},
      '狀態':{select:{name:'待排程'}},
      '業務備註':{rich_text:[{text:{content:note}}]},
    });
    await refreshAll();showToast(`✅ 訂單 ${no} 建立成功`,'ok');
  }catch(e){showToast('錯誤：'+e.message,'err');}
}

// 雙向同步新增客戶
async function submitCustomer(){
  const name=document.getElementById('m_cname').value.trim();
  const code=document.getElementById('m_ccode').value.trim().toUpperCase();
  const region=document.getElementById('m_cregion').value.trim().toUpperCase();
  if(!name){alert('請填入客戶名稱');return;}
  if(!code){alert('請填入客戶代號');return;}
  const dup=customers.find(c=>c.code&&c.code.toUpperCase()===code);
  if(dup){alert(`客戶代號 ${code} 已存在（${dup.name}）`);return;}
  closeModal();showToast('新增中，同步兩個資料庫...','warn');
  let erpOk=false,masterOk=false;
  try{
    await createPage(DB.customers,{'客戶名稱':{title:[{text:{content:name}}]},'客戶代號':{rich_text:[{text:{content:code}}]},'地區':{select:{name:region||'海外'}}});
    erpOk=true;
  }catch(e){console.error('ERP主檔:',e);}
  try{
    const mp={'Name':{title:[{text:{content:name}}]},'客戶編號':{rich_text:[{text:{content:code}}]}};
    if(region)mp['國家']={select:{name:region}};
    await notionAPI('POST','pages',{parent:{database_id:DB.custMaster},properties:mp});
    masterOk=true;
  }catch(e){console.error('客戶總檔:',e);}
  await refreshAll();
  if(erpOk&&masterOk)showToast(`✅ ${name}（${code}）已同步新增至兩個資料庫`,'ok');
  else if(erpOk)showToast(`⚠ ERP 主檔成功，客戶總檔失敗（國家代碼「${region}」可能不在清單中）`,'warn');
  else showToast('❌ 新增失敗','err');
}

function showToast(msg,type){
  const c={ok:['rgba(46,196,138,.12)','rgba(46,196,138,.3)','#2ec48a'],warn:['rgba(245,185,66,.1)','rgba(245,185,66,.25)','#f5b942'],err:['rgba(245,101,101,.1)','rgba(245,101,101,.25)','#f56565']};
  const[bg,border,color]=c[type]||c.ok;
  const t=document.createElement('div');t.className='toast';
  t.style.cssText=`background:${bg};border:1px solid ${border};color:${color}`;
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},3500);
}

window.onload=()=>{
  const t=localStorage.getItem('lematec_token');
  const r=localStorage.getItem('lematec_role');
  if(t&&r){TOKEN=t;ROLE=r;document.getElementById('tokenInput').value=t;document.getElementById('roleSelect').value=r;startApp();}
};
</script>
</body>
</html>
