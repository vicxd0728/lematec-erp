<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEMATEC ERP 系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg:#0c0f18;--bg2:#121622;--bg3:#181d2e;--bg4:#1f2640;
  --border:#242a40;--border2:#2e3857;
  --blue:#4d8ef5;--green:#2ec48a;--yellow:#f5b942;--red:#f56565;--purple:#9b7ff5;--cyan:#42d4f5;
  --text:#dde4f0;--text2:#6b7a9e;--text3:#313d5a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}

.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:28px;z-index:100;}
.login-logo .brand{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);letter-spacing:4px;text-align:center;margin-bottom:8px;}
.login-logo h1{font-size:32px;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:380px;}
.login-card h2{font-size:14px;font-weight:700;margin-bottom:18px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;color:var(--text2);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
.inp{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--blue);}
select.inp{cursor:pointer;}

.btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:hover{background:#6aa3ff;}
.btn-blue:disabled{background:var(--text3);cursor:not-allowed;}
.btn-green{background:rgba(46,196,138,.15);color:var(--green);border:1px solid rgba(46,196,138,.3);}
.btn-green:hover{background:rgba(46,196,138,.25);}
.btn-red{background:rgba(245,101,101,.1);color:var(--red);border:1px solid rgba(245,101,101,.25);}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);}
.btn-sm{padding:4px 12px;font-size:11px;border-radius:6px;}
.btn-full{width:100%;justify-content:center;padding:11px;}

.app{display:none;flex-direction:column;min-height:100vh;}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:50;}
.topbar-brand{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);letter-spacing:3px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);}
.role-badge{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;}

.role-nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 24px;overflow-x:auto;}
.tab-btn{padding:10px 16px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);}

.content{flex:1;padding:22px;overflow-y:auto;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.stat-n{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;line-height:1;margin-bottom:4px;}
.stat-l{font-size:10px;color:var(--text2);}

.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;}
.panel-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:12px;font-weight:700;}

table{width:100%;border-collapse:collapse;}
th{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:700;padding:8px 14px;text-align:left;background:var(--bg3);border-bottom:1px solid var(--border);}
td{padding:9px 14px;font-size:12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.01);}

.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}

.alert-box{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;line-height:1.6;}
.alert-ok{background:rgba(46,196,138,.08);border:1px solid rgba(46,196,138,.2);color:var(--green);}
.alert-warn{background:rgba(245,185,66,.08);border:1px solid rgba(245,185,66,.2);color:var(--yellow);}
.alert-err{background:rgba(245,101,101,.08);border:1px solid rgba(245,101,101,.2);color:var(--red);}

.toast{position:fixed;top:64px;right:16px;z-index:300;padding:10px 16px;border-radius:8px;font-size:12px;min-width:260px;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity .3s;}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);align-items:center;justify-content:center;z-index:200;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:15px;font-weight:700;margin-bottom:18px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}

.loading{display:flex;align-items:center;justify-content:center;padding:32px;color:var(--text3);gap:8px;font-size:12px;}
.spin{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.bar{width:50px;height:4px;background:var(--bg4);border-radius:2px;display:inline-block;vertical-align:middle;margin-right:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;}

.hint{font-size:10px;color:var(--text3);margin-top:4px;}

@media(max-width:768px){
  .stats{grid-template-columns:1fr 1fr;}
  .form-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-logo">
    <div class="brand">LEMATEC · ERP</div>
    <h1>製造管理系統</h1>
  </div>
  <div class="login-card">
    <h2>🔐 登入系統</h2>
    <div class="field">
      <label>Notion Integration Token</label>
      <div style="position:relative;">
        <input class="inp" type="password" id="tokenInput" placeholder="ntn_xxxxxxxxxxxxxxxx" style="padding-right:60px;">
        <button onclick="toggleToken()" id="toggleBtn" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer;font-size:11px;padding:2px 6px;">顯示</button>
      </div>
      <div class="hint">前往 notion.so/profile/integrations 取得 · 確認以 ntn_ 開頭</div>
    </div>
    <div class="field">
      <label>角色</label>
      <select class="inp" id="roleSelect">
        <option value="manager">🏭 廠長（全功能）</option>
        <option value="sales">📋 業務</option>
        <option value="production">⚙️ 生管</option>
        <option value="warehouse">📦 倉管</option>
        <option value="qc">✅ 品管</option>
        <option value="purchase">🛒 採購</option>
      </select>
    </div>
    <div id="loginAlert"></div>
    <button class="btn btn-blue btn-full" id="loginBtn" onclick="login()">⚡ 進入系統</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-brand">LEMATEC</div>
    <span style="color:var(--text3)">|</span>
    <span style="font-size:13px;font-weight:700;">ERP 系統</span>
    <div class="topbar-right">
      <span id="lowStockWarn" style="font-size:11px;color:var(--yellow);display:none;"></span>
      <span class="role-badge" id="roleBadge"></span>
      <span class="conn-dot"></span>
      <button class="btn btn-ghost btn-sm" onclick="refreshAll()">🔄</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">登出</button>
    </div>
  </div>
  <div class="role-nav" id="roleNav"></div>
  <div class="content" id="mainContent"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal"><div id="modalInner"></div></div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const DB = {
  materials:  '4c562d2c-24a5-44b4-8fd3-90948db7b74f',
  bom:        'd406ed90-785a-4835-a14e-319401742f62',
  orders:     'bf774ae7-f7a8-4748-978f-2b3da11bd8b1',
  pickMaster: 'dacb02a5-541a-4299-928f-919597c5b227',
  pickDetail: '2e00aa39-5027-4a36-86ab-117002ce583d',
  inbound:    '6168195f-c5d5-42ee-975d-2e4631a3c961',
  customers:  'b36ba244-db3c-4fa5-bb8f-435719306521',
};

const ROLES = {
  manager:    { label:'廠長', color:'#42d4f5', tabs:['dashboard','orders','picking','inventory','inbound','qc','customers'] },
  sales:      { label:'業務', color:'#4d8ef5', tabs:['dashboard','orders','customers'] },
  production: { label:'生管', color:'#9b7ff5', tabs:['dashboard','orders','picking','inventory'] },
  warehouse:  { label:'倉管', color:'#2ec48a', tabs:['dashboard','inventory','picking','inbound'] },
  qc:         { label:'品管', color:'#f5b942', tabs:['dashboard','qc','inbound'] },
  purchase:   { label:'採購', color:'#2ec48a', tabs:['dashboard','inventory','inbound'] },
};

const TAB_LABELS = {
  dashboard:'📊 總覽', orders:'📋 訂單', customers:'🏢 客戶',
  picking:'🗂️ 領料', inventory:'📦 庫存', inbound:'📥 入料', qc:'✅ 品管',
};

const PILL_MAP = {
  '待排程':['rgba(245,185,66,.12)','#f5b942'],
  '生產中':['rgba(77,142,245,.12)','#4d8ef5'],
  '待出貨':['rgba(155,127,245,.12)','#9b7ff5'],
  '已完成':['rgba(46,196,138,.12)','#2ec48a'],
  '取消':['rgba(245,101,101,.12)','#f56565'],
  '待確認':['rgba(245,185,66,.12)','#f5b942'],
  '已確認扣料':['rgba(46,196,138,.12)','#2ec48a'],
  '缺料待補':['rgba(245,101,101,.12)','#f56565'],
  '待品檢':['rgba(245,185,66,.12)','#f5b942'],
  '品檢通過':['rgba(46,196,138,.12)','#2ec48a'],
  '品檢不合格':['rgba(245,101,101,.12)','#f56565'],
  '已入庫':['rgba(46,196,138,.12)','#2ec48a'],
  '待入庫':['#1f2640','#313d5a'],
  '退回供應商':['rgba(245,101,101,.12)','#f56565'],
  '零件':['#1f2640','#313d5a'],
  '半成品':['rgba(155,127,245,.12)','#9b7ff5'],
  '成品':['rgba(46,196,138,.12)','#2ec48a'],
};

let TOKEN = '', ROLE = '', CURRENT_TAB = 'dashboard';
let mats = [], boms = [], orders = [], customers = [], picks = [], inbounds = [];

// ============================================================
// API — 透過 Netlify Function Proxy
// ============================================================
// Netlify Function URL
const PROXY_URL = window.location.hostname.includes("netlify.app")
  ? "/.netlify/functions/notion"
  : "https://dainty-bonbon-ef98ff.netlify.app/.netlify/functions/notion";

async function notionAPI(method, endpoint, body = null) {
  const res = await fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: TOKEN, method, endpoint, body }),
  });
  return res.json();
}

async function dbQuery(dbId) {
  return notionAPI('POST', `databases/${dbId}/query`, { page_size: 100 });
}

async function createPage(dbId, props) {
  return notionAPI('POST', 'pages', { parent: { database_id: dbId }, properties: props });
}

async function updatePage(pageId, props) {
  return notionAPI('PATCH', `pages/${pageId}`, { properties: props });
}

// ============================================================
// LOGIN / LOGOUT
// ============================================================
function toggleToken() {
  const inp = document.getElementById('tokenInput');
  const btn = document.getElementById('toggleBtn');
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.textContent = '隱藏';
  } else {
    inp.type = 'password';
    btn.textContent = '顯示';
  }
}

async function login() {
  const raw = document.getElementById('tokenInput').value;
  const t = raw.trim(); // 去除前後空格
  const r = document.getElementById('roleSelect').value;

  if (!t) { showLoginAlert('請填入 Token'); return; }
  if (!t.startsWith('ntn_')) {
    showLoginAlert(`Token 格式不對，應以 ntn_ 開頭，你輸入的開頭是：「${t.slice(0,6)}...」`);
    return;
  }

  TOKEN = t; ROLE = r;
  setLoginLoading(true);
  try {
    const res = await notionAPI('GET', `databases/${DB.materials}`);
    if (res.id || res.object === 'database') {
      localStorage.setItem('lematec_token', TOKEN);
      localStorage.setItem('lematec_role', ROLE);
      startApp();
    } else {
      const errMsg = res.message || res.code || JSON.stringify(res);
      showLoginAlert(`連接失敗：${errMsg}<br><br>請確認：<br>① Token 是否正確（目前：${t.slice(0,8)}...）<br>② 「工廠 ERP」主頁面是否已連接此 Integration`);
      setLoginLoading(false);
    }
  } catch(e) {
    showLoginAlert('網路錯誤：' + e.message + '<br>請確認 Netlify Function 是否正常運作');
    setLoginLoading(false);
  }
}

function logout() {
  localStorage.removeItem('lematec_token');
  localStorage.removeItem('lematec_role');
  TOKEN = ''; ROLE = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function setLoginLoading(v) {
  const btn = document.getElementById('loginBtn');
  btn.disabled = v;
  btn.textContent = v ? '連接中...' : '⚡ 進入系統';
}

function showLoginAlert(msg) {
  document.getElementById('loginAlert').innerHTML = `<div class="alert-box alert-err" style="margin-bottom:12px;">${msg}</div>`;
}

async function startApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const ri = ROLES[ROLE];
  const badge = document.getElementById('roleBadge');
  badge.textContent = ri.label;
  badge.style.cssText = `padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;background:${ri.color}20;color:${ri.color}`;
  buildNav();
  await refreshAll();
  showTab('dashboard');
}

// ============================================================
// DATA
// ============================================================
async function refreshAll() {
  const [mRes, bRes, oRes, cRes] = await Promise.all([
    dbQuery(DB.materials), dbQuery(DB.bom),
    dbQuery(DB.orders), dbQuery(DB.customers),
  ]);
  mats      = parseMats(mRes.results || []);
  boms      = parseBOM(bRes.results || []);
  orders    = parseOrders(oRes.results || []);
  customers = parseCusts(cRes.results || []);

  const low = mats.filter(m => m.stock <= m.safe && m.type !== '成品');
  const warn = document.getElementById('lowStockWarn');
  if (low.length > 0) { warn.style.display = ''; warn.textContent = `⚠ ${low.length} 項庫存不足`; }
  else warn.style.display = 'none';

  if (CURRENT_TAB) renderTab(CURRENT_TAB);
}

async function loadPicks() {
  const res = await dbQuery(DB.pickMaster);
  picks = (res.results || []).map(p => ({
    id: p.id,
    no: p.properties?.['領料主單號']?.title?.[0]?.plain_text || '',
    orderId: p.properties?.['對應訂單']?.relation?.[0]?.id || '',
    product: p.properties?.['成品品號']?.rich_text?.[0]?.plain_text || '',
    qty: p.properties?.['生產數量']?.number ?? 0,
    date: p.properties?.['領料日期']?.date?.start || '',
    status: p.properties?.['狀態']?.select?.name || '',
  }));
}

async function loadInbounds() {
  const res = await dbQuery(DB.inbound);
  inbounds = (res.results || []).map(p => ({
    id: p.id,
    no: p.properties?.['入料單號']?.title?.[0]?.plain_text || '',
    matId: p.properties?.['料件']?.relation?.[0]?.id || '',
    qty: p.properties?.['入料數量']?.number ?? 0,
    date: p.properties?.['入料日期']?.date?.start || '',
    supplier: p.properties?.['供應商']?.rich_text?.[0]?.plain_text || '',
    qcStatus: p.properties?.['品管狀態']?.select?.name || '待品檢',
    stStatus: p.properties?.['入庫狀態']?.select?.name || '待入庫',
  }));
}

function parseMats(rows) {
  return rows.map(p => ({
    id: p.id,
    name:  p.properties?.['料件名稱']?.title?.[0]?.plain_text || '',
    code:  p.properties?.['料件編號']?.rich_text?.[0]?.plain_text || '',
    type:  p.properties?.['類型']?.select?.name || '',
    unit:  p.properties?.['單位']?.select?.name || '個',
    stock: p.properties?.['目前庫存']?.number ?? 0,
    safe:  p.properties?.['安全庫存']?.number ?? 0,
  }));
}
function parseBOM(rows) {
  return rows.map(p => ({
    parentId: p.properties?.['母件']?.relation?.[0]?.id || '',
    childId:  p.properties?.['子件']?.relation?.[0]?.id || '',
    qty:      p.properties?.['每台用量']?.number ?? 1,
  }));
}
function parseOrders(rows) {
  return rows.map(p => ({
    id:        p.id,
    no:        p.properties?.['訂單號']?.title?.[0]?.plain_text || '',
    customer:  p.properties?.['客戶名稱']?.select?.name || '',
    productId: p.properties?.['成品']?.relation?.[0]?.id || '',
    qty:       p.properties?.['訂購數量']?.number ?? 0,
    deadline:  p.properties?.['交期']?.date?.start || '',
    status:    p.properties?.['狀態']?.select?.name || '',
  }));
}
function parseCusts(rows) {
  return rows.map(p => ({
    id:     p.id,
    name:   p.properties?.['客戶名稱']?.title?.[0]?.plain_text || '',
    code:   p.properties?.['客戶代號']?.rich_text?.[0]?.plain_text || '',
    region: p.properties?.['地區']?.select?.name || '',
  }));
}

// ============================================================
// BOM
// ============================================================
function explodeBOM(productId, qty) {
  const result = {};
  const queue = [{ pid: productId, mult: qty }];
  const visited = new Set();
  while (queue.length) {
    const { pid, mult } = queue.shift();
    boms.filter(b => b.parentId === pid).forEach(b => {
      const mat = mats.find(m => m.id === b.childId);
      if (!mat) return;
      const need = b.qty * mult;
      if (!result[b.childId]) result[b.childId] = { ...mat, needed: 0 };
      result[b.childId].needed += need;
      if (mat.type === '半成品' && !visited.has(b.childId)) {
        visited.add(b.childId);
        queue.push({ pid: b.childId, mult: need });
      }
    });
  }
  return Object.values(result);
}

// ============================================================
// NAV
// ============================================================
function buildNav() {
  const nav = document.getElementById('roleNav');
  nav.innerHTML = '';
  ROLES[ROLE].tabs.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (tab === CURRENT_TAB ? ' active' : '');
    btn.textContent = TAB_LABELS[tab];
    btn.onclick = () => switchTab(tab);
    nav.appendChild(btn);
  });
}

function switchTab(tab) {
  CURRENT_TAB = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent === TAB_LABELS[tab]));
  renderTab(tab);
  if (tab === 'picking') loadPicks().then(() => renderTab('picking'));
  if (tab === 'inbound' || tab === 'qc') loadInbounds().then(() => renderTab(tab));
}

// ============================================================
// RENDER
// ============================================================
function showTab(tab) { CURRENT_TAB = tab; renderTab(tab); }

function renderTab(tab) {
  const c = document.getElementById('mainContent');
  switch(tab) {
    case 'dashboard': c.innerHTML = renderDashboard(); break;
    case 'orders':    c.innerHTML = renderOrders(); break;
    case 'customers': c.innerHTML = renderCustomers(); break;
    case 'inventory': c.innerHTML = renderInventory(); break;
    case 'picking':   c.innerHTML = renderPicking(); break;
    case 'inbound':   c.innerHTML = renderInbound(false); break;
    case 'qc':        c.innerHTML = renderInbound(true); break;
  }
}

function pill(text) {
  const [bg, color] = PILL_MAP[text] || ['#1f2640', '#6b7a9e'];
  return `<span class="pill" style="background:${bg};color:${color}">${text || '—'}</span>`;
}

// ── INVENTORY ──
function renderInventory() {
  const low = mats.filter(m => m.stock <= m.safe);
  return `
  ${low.length > 0
    ? `<div class="alert-box alert-warn">⚠ 需補料：${low.map(m=>`<b>${m.name}</b>`).join('、')}</div>`
    : `<div class="alert-box alert-ok">✅ 物料全部正常</div>`}

    <span class="panel-title">料件主檔</span>
    <input class="inp" style="width:150px;padding:5px 10px;font-size:11px" placeholder="搜尋..." oninput="filterMats(this.value)">
  </div>
  <table id="matsTable"><tr><th>料件名稱</th><th>類型</th><th>庫存</th><th>安全庫存</th><th>狀態</th></tr>
  ${mats.map(m => {
    const pct = m.safe > 0 ? Math.min(100, (m.stock/(m.safe*2))*100) : (m.stock > 0 ? 80 : 0);
    const fill = m.stock <= 0 ? 'var(--red)' : m.stock <= m.safe ? 'var(--yellow)' : 'var(--green)';
    const status = m.stock <= 0 ? '❌ 無庫存' : m.stock <= m.safe ? '⚠ 偏低' : '✓ 正常';
    const sColor = m.stock <= 0 ? 'var(--red)' : m.stock <= m.safe ? 'var(--yellow)' : 'var(--green)';
    return `<tr data-name="${m.name}">
      <td style="color:var(--text);font-weight:600">${m.name}</td>
      <td>${pill(m.type)}</td>
      <td><div class="bar"><div class="bar-fill" style="width:${pct}%;background:${fill}"></div></div><span style="font-family:monospace;font-size:12px">${m.stock} ${m.unit}</span></td>
      <td style="font-family:monospace;color:var(--text3)">${m.safe}</td>
      <td style="color:${sColor};font-size:11px;font-weight:700">${status}</td>
    </tr>`;
  }).join('')}
  </table></div>`;
}

function filterMats(q) {
  document.querySelectorAll('#matsTable tr[data-name]').forEach(tr => {
    tr.style.display = tr.dataset.name.includes(q) ? '' : 'none';
  });
}

// 產出領料單預覽
function openPickingPreview(orderId) {
  const order = orders.find(o => o.id === orderId);
  const prod = mats.find(m => m.id === order.productId);
  const items = explodeBOM(order.productId, order.qty);
  const shortages = items.filter(i => i.type !== '半成品' && i.stock < i.needed);
  document.getElementById('modalInner').innerHTML = `
    <h3>🗂️ 產出領料單 — ${order.no}</h3>
    <div style="background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:14px;font-size:12px">
      <div style="color:var(--text2)">客戶：<b style="color:var(--text)">${order.customer}</b></div>
      <div style="color:var(--text2)">成品：<b style="color:var(--text)">${prod?.name}</b> × <span style="color:var(--yellow);font-weight:700">${order.qty}</span> 台</div>
    </div>
    ${shortages.length > 0
      ? `<div class="alert-box alert-warn">⚠ 缺料：${shortages.map(s=>`${s.name} 差${s.needed-s.stock}個`).join('、')}</div>`
      : `<div class="alert-box alert-ok">✅ 所有料件庫存充足，可以確認產出</div>`}
    <table style="margin-bottom:14px"><tr><th>料件</th><th>類型</th><th>需求</th><th>現有庫存</th></tr>
    ${items.map(i => `<tr>
      <td style="color:var(--text)">${i.name}</td>
      <td>${pill(i.type)}</td>
      <td style="font-family:monospace;color:var(--yellow)">${i.needed}</td>
      <td style="font-family:monospace;color:${i.type!=='半成品'&&i.stock<i.needed?'var(--red)':'var(--green)'}">${i.stock}</td>
    </tr>`).join('')}
    </table>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-blue" onclick="doGeneratePicking('${orderId}')">✓ 確認產出並扣料</button>
    </div>`;
  openModal();
}

async function doGeneratePicking(orderId) {
  const order = orders.find(o => o.id === orderId);
  const prod = mats.find(m => m.id === order.productId);
  const items = explodeBOM(order.productId, order.qty);
  const ds = new Date().toISOString().slice(0,10);
  const no = `PK-${ds.replace(/-/g,'').slice(2)}-${Math.floor(Math.random()*900+100)}`;
  closeModal();
  showToast('處理中，請稍候...', 'warn');
  try {
    const master = await createPage(DB.pickMaster, {
      '領料主單號': { title:[{text:{content:no}}] },
      '對應訂單':   { relation:[{id:orderId}] },
      '成品品號':   { rich_text:[{text:{content:prod?.name||''}}] },
      '生產數量':   { number: order.qty },
      '狀態':       { select:{name:'已確認扣料'} },
      '領料日期':   { date:{start:ds} },
    });
    for (const item of items) {
      await createPage(DB.pickDetail, {
        '料件名稱': { title:[{text:{content:item.name}}] },
        '領料主單': { relation:[{id:master.id}] },
        '料件':     { relation:[{id:item.id}] },
        '類型':     { select:{name:item.type} },
        '需求數量': { number:item.needed },
        '實領數量': { number:item.type==='半成品'?item.needed:Math.min(item.needed,item.stock) },
        '狀態':     { select:{name:item.type==='半成品'?'半成品':item.stock>=item.needed?'足夠':'缺料'} },
      });
      if (item.type !== '半成品') {
        await updatePage(item.id, { '目前庫存':{number:Math.max(0,item.stock-item.needed)} });
      }
    }
    await updatePage(orderId, { '狀態':{select:{name:'生產中'}} });
    await refreshAll();
    showToast(`✅ 領料單 ${no} 建立完成，庫存已扣減`, 'ok');
  } catch(e) { showToast('錯誤：'+e.message, 'err'); }
}

// 品檢通過
async function approveQC(inboundId, matId, qty) {
  if (!confirm(`確認品檢通過？將自動增加 ${qty} 個庫存`)) return;
  try {
    await updatePage(inboundId, {
      '品管狀態': {select:{name:'品檢通過'}},
      '入庫狀態': {select:{name:'已入庫'}},
    });
    const mat = mats.find(m => m.id === matId);
    const newStock = (mat?.stock||0) + parseInt(qty);
    await updatePage(matId, { '目前庫存':{number:newStock} });
    await refreshAll();
    await loadInbounds();
    renderTab(CURRENT_TAB);
    showToast(`✅ 品檢通過！${mat?.name} 庫存更新為 ${newStock}`, 'ok');
  } catch(e) { showToast('錯誤：'+e.message, 'err'); }
}

async function rejectQC(inboundId) {
  if (!confirm('確認品檢不合格？將標記退回供應商')) return;
  try {
    await updatePage(inboundId, {
      '品管狀態': {select:{name:'品檢不合格'}},
      '入庫狀態': {select:{name:'退回供應商'}},
    });
    await loadInbounds();
    renderTab(CURRENT_TAB);
    showToast('已標記為不合格，退回供應商', 'warn');
  } catch(e) { showToast('錯誤：'+e.message, 'err'); }
}

function showToast(msg, type) {
  const colors = { ok:['rgba(46,196,138,.12)','rgba(46,196,138,.3)','#2ec48a'], warn:['rgba(245,185,66,.1)','rgba(245,185,66,.25)','#f5b942'], err:['rgba(245,101,101,.1)','rgba(245,101,101,.25)','#f56565'] };
  const [bg, border, color] = colors[type]||colors.ok;
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.cssText = `background:${bg};border:1px solid ${border};color:${color}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(()=>t.remove(), 300); }, 3500);
}

window.onload = () => {
  const t = localStorage.getItem('lematec_token');
  const r = localStorage.getItem('lematec_role');
  if (t && r) {
    TOKEN = t; ROLE = r;
    document.getElementById('tokenInput').value = t;
    document.getElementById('roleSelect').value = r;
    startApp();
  }
};
