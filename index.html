<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEMATEC ERP 系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f18;--bg2:#121622;--bg3:#181d2e;--bg4:#1f2640;--border:#242a40;--border2:#2e3857;--blue:#4d8ef5;--green:#2ec48a;--yellow:#f5b942;--red:#f56565;--purple:#9b7ff5;--cyan:#42d4f5;--text:#dde4f0;--text2:#6b7a9e;--text3:#313d5a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}
/* LOGIN */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;z-index:100;padding:20px;}
.brand{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);letter-spacing:4px;text-align:center;}
h1{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:420px;}
.card h2{font-size:13px;font-weight:700;margin-bottom:18px;color:var(--text2);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;color:var(--text2);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
.inp{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--blue);}
select.inp{cursor:pointer;}
.hint{font-size:10px;color:var(--text3);margin-top:5px;line-height:1.5;}
.hint a{color:var(--blue);text-decoration:none;}
.btn-login{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;}
.btn-login:hover{background:#6aa3ff;}
.btn-login:disabled{background:var(--text3);cursor:not-allowed;}
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-top:12px;line-height:1.7;display:none;}
.alert.show{display:block;}
.alert-err{background:rgba(245,101,101,.08);border:1px solid rgba(245,101,101,.2);color:var(--red);}
.debug-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:10px;font-size:10px;font-family:monospace;color:var(--text2);display:none;word-break:break-all;line-height:1.6;}
.debug-box.show{display:block;}
/* APP */
.app{display:none;flex-direction:column;min-height:100vh;}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:50;}
.topbar-brand{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);letter-spacing:3px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);}
.role-badge{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.role-nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 20px;overflow-x:auto;}
.tab-btn{padding:10px 14px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);}
.content{flex:1;padding:20px;overflow-y:auto;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.stat-n{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;line-height:1;margin-bottom:4px;}
.stat-l{font-size:10px;color:var(--text2);}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.panel-hdr{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:12px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:700;padding:8px 14px;text-align:left;background:var(--bg3);border-bottom:1px solid var(--border);}
td{padding:9px 14px;font-size:12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.01);}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.info-box{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;line-height:1.6;}
.info-ok{background:rgba(46,196,138,.08);border:1px solid rgba(46,196,138,.2);color:var(--green);}
.info-warn{background:rgba(245,185,66,.08);border:1px solid rgba(245,185,66,.2);color:var(--yellow);}
.info-err{background:rgba(245,101,101,.08);border:1px solid rgba(245,101,101,.2);color:var(--red);}
.bar{width:50px;height:4px;background:var(--bg4);border-radius:2px;display:inline-block;vertical-align:middle;margin-right:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;}
.toast{position:fixed;top:64px;right:16px;z-index:300;padding:10px 16px;border-radius:8px;font-size:12px;min-width:260px;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity .3s;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);align-items:center;justify-content:center;z-index:200;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:15px;font-weight:700;margin-bottom:18px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;display:inline-flex;align-items:center;gap:6px;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:hover{background:#6aa3ff;}
.btn-blue:disabled{background:var(--text3);cursor:not-allowed;}
.btn-green{background:rgba(46,196,138,.15);color:var(--green);border:1px solid rgba(46,196,138,.3);}
.btn-red{background:rgba(245,101,101,.1);color:var(--red);border:1px solid rgba(245,101,101,.25);}
.btn-yellow{background:rgba(245,185,66,.1);color:var(--yellow);border:1px solid rgba(245,185,66,.25);}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-sm{padding:3px 10px;font-size:11px;border-radius:6px;}
.loading-row{display:flex;align-items:center;justify-content:center;padding:32px;color:var(--text3);gap:8px;font-size:12px;}
.spin{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.field-sm{margin-bottom:10px;}
.field-sm label{display:block;font-size:10px;color:var(--text2);margin-bottom:4px;}
@media(max-width:700px){.stats{grid-template-columns:1fr 1fr;}.form-row{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="brand">LEMATEC · ERP</div>
  <h1>製造管理系統</h1>
  <div class="card">
    <h2>🔐 登入系統</h2>
    <div class="field">
      <label>Notion Integration Token</label>
      <input class="inp" type="text" id="tokenInput" placeholder="ntn_xxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false">
      <div class="hint">前往 <a href="https://notion.so/profile/integrations" target="_blank">notion.so/profile/integrations</a> 取得</div>
    </div>
    <div class="field">
      <label>角色</label>
      <select class="inp" id="roleSelect">
        <option value="manager">🏭 廠長（全功能）</option>
        <option value="sales">📋 業務</option>
        <option value="production">⚙️ 生管</option>
        <option value="warehouse">📦 倉管</option>
        <option value="qc">✅ 品管</option>
        <option value="purchase">🛒 採購</option>
      </select>
    </div>
    <button class="btn-login" id="loginBtn" onclick="login()">⚡ 進入系統</button>
    <div class="alert alert-err" id="loginAlert"></div>
    <div class="debug-box" id="debugBox"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-brand">LEMATEC</div>
    <span style="color:var(--text3)">|</span>
    <span style="font-size:13px;font-weight:700">ERP 系統</span>
    <div class="topbar-right">
      <span id="lowWarn" style="font-size:11px;color:var(--yellow);display:none"></span>
      <span class="role-badge" id="roleBadge"></span>
      <span class="conn-dot"></span>
      <button class="btn btn-ghost btn-sm" onclick="refreshAll()">🔄 同步</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">登出</button>
    </div>
  </div>
  <div class="role-nav" id="roleNav"></div>
  <div class="content" id="mainContent"></div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal"><div id="modalInner"></div></div>
</div>

<script>
// ============================================================
// CONFIG — 使用 collection ID（Notion API 查詢用這個）
// ============================================================
const DB = {
  materials:  '4c562d2c-24a5-44b4-8fd3-90948db7b74f',  // 料件主檔 collection
  bom:        'd406ed90-785a-4835-a14e-319401742f62',  // BOM清單 collection
  orders:     'bf774ae7-f7a8-4748-978f-2b3da11bd8b1',  // 客戶訂單 collection
  pickMaster: 'dacb02a5-541a-4299-928f-919597c5b227',  // 領料主單 collection
  pickDetail: '2e00aa39-5027-4a36-86ab-117002ce583d',  // 領料明細 collection
  inbound:    '6168195f-c5d5-42ee-975d-2e4631a3c961',  // 入料單 collection
  qc:         '764a1dac-616f-4377-b5fa-dc9cc3040d09',  // 品檢單 collection
  customers:  'b36ba244-db3c-4fa5-bb8f-435719306521',  // 客戶主檔 collection
};

const ROLES = {
  manager:    { label:'廠長',  color:'#42d4f5', tabs:['dashboard','orders','picking','inventory','inbound','qc','customers'] },
  sales:      { label:'業務',  color:'#4d8ef5', tabs:['dashboard','orders','customers'] },
  production: { label:'生管',  color:'#9b7ff5', tabs:['dashboard','orders','picking','inventory'] },
  warehouse:  { label:'倉管',  color:'#2ec48a', tabs:['dashboard','inventory','picking','inbound'] },
  qc:         { label:'品管',  color:'#f5b942', tabs:['dashboard','qc','inbound'] },
  purchase:   { label:'採購',  color:'#2ec48a', tabs:['dashboard','inventory','inbound'] },
};

const TAB_LABELS = {
  dashboard:'📊 總覽', orders:'📋 訂單', customers:'🏢 客戶',
  picking:'🗂️ 領料', inventory:'📦 庫存', inbound:'📥 入料', qc:'✅ 品管',
};

const PILL_MAP = {
  '待排程':['rgba(245,185,66,.12)','#f5b942'],'生產中':['rgba(77,142,245,.12)','#4d8ef5'],
  '待出貨':['rgba(155,127,245,.12)','#9b7ff5'],'已完成':['rgba(46,196,138,.12)','#2ec48a'],
  '取消':['rgba(245,101,101,.12)','#f56565'],'待確認':['rgba(245,185,66,.12)','#f5b942'],
  '已確認扣料':['rgba(46,196,138,.12)','#2ec48a'],'缺料待補':['rgba(245,101,101,.12)','#f56565'],
  '待品檢':['rgba(245,185,66,.12)','#f5b942'],'品檢通過':['rgba(46,196,138,.12)','#2ec48a'],
  '品檢不合格':['rgba(245,101,101,.12)','#f56565'],'已入庫':['rgba(46,196,138,.12)','#2ec48a'],
  '待入庫':['#1f2640','#313d5a'],'退回供應商':['rgba(245,101,101,.12)','#f56565'],
  '零件':['#1f2640','#313d5a'],'半成品':['rgba(155,127,245,.12)','#9b7ff5'],'成品':['rgba(46,196,138,.12)','#2ec48a'],
  '足夠':['rgba(46,196,138,.12)','#2ec48a'],'缺料':['rgba(245,101,101,.12)','#f56565'],
  '待領料':['rgba(245,185,66,.12)','#f5b942'],'已領料':['rgba(46,196,138,.12)','#2ec48a'],
};

let TOKEN='', ROLE='', CURRENT_TAB='dashboard';
let mats=[], boms=[], orders=[], customers=[], picks=[], inbounds=[];

// ============================================================
// API — Netlify Function Proxy
// ============================================================
const PROXY = '/.netlify/functions/notion';

async function notionAPI(method, endpoint, body=null) {
  const res = await fetch(PROXY, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({token:TOKEN, method, endpoint, body}),
  });
  const text = await res.text();
  try { return JSON.parse(text); }
  catch { throw new Error('回應解析失敗: '+text.slice(0,100)); }
}

async function dbQuery(collectionId, filter=null) {
  const body = {page_size:100};
  if(filter) body.filter = filter;
  return notionAPI('POST', `databases/${collectionId}/query`, body);
}

async function createPage(collectionId, props) {
  return notionAPI('POST', 'pages', {parent:{database_id:collectionId}, properties:props});
}

async function updatePage(pageId, props) {
  return notionAPI('PATCH', `pages/${pageId}`, {properties:props});
}

// ============================================================
// LOGIN
// ============================================================
async function login() {
  const t = document.getElementById('tokenInput').value.trim().replace(/\s+/g,'');
  const r = document.getElementById('roleSelect').value;
  document.getElementById('loginAlert').classList.remove('show');
  document.getElementById('debugBox').classList.remove('show');
  if(!t){showLoginErr('請填入 Token');return;}
  if(!t.startsWith('ntn_')){showLoginErr(`格式不對，應為 ntn_ 開頭，你的是：${t.slice(0,8)}...`);return;}
  TOKEN=t; ROLE=r;
  const btn=document.getElementById('loginBtn');
  btn.disabled=true; btn.textContent='連接中...';
  try {
    const data = await notionAPI('POST', `databases/${DB.materials}/query`, {page_size:1});
    document.getElementById('debugBox').textContent = `結果：${JSON.stringify(data).slice(0,200)}`;
    document.getElementById('debugBox').classList.add('show');
    if(data.results !== undefined) {
      localStorage.setItem('lematec_token',TOKEN); localStorage.setItem('lematec_role',ROLE);
      startApp();
    } else if(data.status===401||data.code==='unauthorized') {
      showLoginErr('Token 無效 (401)，請確認複製的是「內部整合密鑰」');
    } else if(data.status===404) {
      showLoginErr('找不到資料庫 (404)，請確認頁面已連接 Integration');
    } else {
      showLoginErr(`失敗：${data.message||data.code||JSON.stringify(data).slice(0,100)}`);
    }
  } catch(e) { showLoginErr('網路錯誤：'+e.message); }
  btn.disabled=false; btn.textContent='⚡ 進入系統';
}

function showLoginErr(msg){const e=document.getElementById('loginAlert');e.innerHTML=msg;e.classList.add('show');}
function logout(){localStorage.removeItem('lematec_token');localStorage.removeItem('lematec_role');TOKEN='';ROLE='';document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';}

// ============================================================
// APP START
// ============================================================
async function startApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  const ri=ROLES[ROLE];
  const badge=document.getElementById('roleBadge');
  badge.textContent=ri.label;
  badge.style.cssText=`padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;background:${ri.color}20;color:${ri.color}`;
  buildNav();
  await refreshAll();
  showTab('dashboard');
}

// ============================================================
// DATA LOADING
// ============================================================
async function refreshAll(){
  const [mR,bR,oR,cR]=await Promise.all([dbQuery(DB.materials),dbQuery(DB.bom),dbQuery(DB.orders),dbQuery(DB.customers)]);
  mats=(mR.results||[]).map(parseMat);
  boms=(bR.results||[]).map(parseBOM);
  orders=(oR.results||[]).map(parseOrder);
  customers=(cR.results||[]).map(parseCust);
  const low=mats.filter(m=>m.stock<=m.safe&&m.type!=='成品');
  const w=document.getElementById('lowWarn');
  if(low.length>0){w.style.display='';w.textContent=`⚠ ${low.length}項庫存不足`;}else w.style.display='none';
  if(CURRENT_TAB)renderTab(CURRENT_TAB);
}

function parseMat(p){return{id:p.id,name:p.properties?.['料件名稱']?.title?.[0]?.plain_text||'',code:p.properties?.['料件編號']?.rich_text?.[0]?.plain_text||'',type:p.properties?.['類型']?.select?.name||'',unit:p.properties?.['單位']?.select?.name||'個',stock:p.properties?.['目前庫存']?.number??0,safe:p.properties?.['安全庫存']?.number??0};}
function parseBOM(p){return{id:p.id,parentId:p.properties?.['母件']?.relation?.[0]?.id||'',childId:p.properties?.['子件']?.relation?.[0]?.id||'',qty:p.properties?.['每台用量']?.number??1};}
function parseOrder(p){return{id:p.id,no:p.properties?.['訂單號']?.title?.[0]?.plain_text||'',customer:p.properties?.['客戶名稱']?.select?.name||'',productId:p.properties?.['成品']?.relation?.[0]?.id||'',qty:p.properties?.['訂購數量']?.number??0,deadline:p.properties?.['交期']?.date?.start||'',status:p.properties?.['狀態']?.select?.name||'',note:p.properties?.['業務備註']?.rich_text?.[0]?.plain_text||''};}
function parseCust(p){return{id:p.id,name:p.properties?.['客戶名稱']?.title?.[0]?.plain_text||'',code:p.properties?.['客戶代號']?.rich_text?.[0]?.plain_text||'',region:p.properties?.['地區']?.select?.name||''};}

async function loadPicks(){
  const r=await dbQuery(DB.pickMaster);
  picks=(r.results||[]).map(p=>({id:p.id,no:p.properties?.['領料主單號']?.title?.[0]?.plain_text||'',orderId:p.properties?.['對應訂單']?.relation?.[0]?.id||'',product:p.properties?.['成品品號']?.rich_text?.[0]?.plain_text||'',qty:p.properties?.['生產數量']?.number??0,date:p.properties?.['領料日期']?.date?.start||'',status:p.properties?.['狀態']?.select?.name||''}));
}

async function loadInbounds(){
  const r=await dbQuery(DB.inbound);
  inbounds=(r.results||[]).map(p=>({id:p.id,no:p.properties?.['入料單號']?.title?.[0]?.plain_text||'',matId:p.properties?.['料件']?.relation?.[0]?.id||'',qty:p.properties?.['入料數量']?.number??0,date:p.properties?.['入料日期']?.date?.start||'',supplier:p.properties?.['供應商']?.rich_text?.[0]?.plain_text||'',qcStatus:p.properties?.['品管狀態']?.select?.name||'待品檢',stStatus:p.properties?.['入庫狀態']?.select?.name||'待入庫'}));
}

// ============================================================
// BOM EXPLOSION
// ============================================================
function explodeBOM(productId, qty){
  const result={};const queue=[{pid:productId,mult:qty}];const visited=new Set();
  while(queue.length){
    const{pid,mult}=queue.shift();
    boms.filter(b=>b.parentId===pid).forEach(b=>{
      const mat=mats.find(m=>m.id===b.childId);if(!mat)return;
      const need=b.qty*mult;
      if(!result[b.childId])result[b.childId]={...mat,needed:0};
      result[b.childId].needed+=need;
      if(mat.type==='半成品'&&!visited.has(b.childId)){visited.add(b.childId);queue.push({pid:b.childId,mult:need});}
    });
  }
  return Object.values(result);
}

// ============================================================
// NAV & TABS
// ============================================================
function buildNav(){
  const nav=document.getElementById('roleNav');nav.innerHTML='';
  ROLES[ROLE].tabs.forEach(tab=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(tab===CURRENT_TAB?' active':'');
    btn.textContent=TAB_LABELS[tab];
    btn.onclick=()=>switchTab(tab);
    nav.appendChild(btn);
  });
}

function switchTab(tab){
  CURRENT_TAB=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.textContent===TAB_LABELS[tab]));
  renderTab(tab);
  if(tab==='picking')loadPicks().then(()=>renderTab('picking'));
  if(tab==='inbound'||tab==='qc')loadInbounds().then(()=>renderTab(tab));
}

function showTab(tab){CURRENT_TAB=tab;renderTab(tab);}

function renderTab(tab){
  const c=document.getElementById('mainContent');
  if(tab==='dashboard')c.innerHTML=renderDashboard();
  else if(tab==='orders')c.innerHTML=renderOrders();
  else if(tab==='customers')c.innerHTML=renderCustomers();
  else if(tab==='inventory')c.innerHTML=renderInventory();
  else if(tab==='picking')c.innerHTML=renderPicking();

}

      const after=i.type==='半成品'?'—':(i.stock-i.needed);
      const afterColor=i.type!=='半成品'&&after<0?'var(--red)':'var(--green)';
      return`<tr>
        <td style="color:var(--text)">${i.name}</td>
        <td>${pill(i.type)}</td>
        <td style="font-family:monospace;color:var(--yellow)">${i.needed}</td>

      </tr>`;
    }).join('')}
    </table>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-blue" onclick="doPick('${orderId}')">✓ 確認產出並扣料</button>
    </div>`;
  openModal();
}

async function doPick(orderId){
  const o=orders.find(x=>x.id===orderId);
  const prod=mats.find(m=>m.id===o.productId);
  const items=explodeBOM(o.productId,o.qty);
  const ds=new Date().toISOString().slice(0,10);
  const no=`PK-${ds.replace(/-/g,'').slice(2)}-${String(Math.floor(Math.random()*900+100))}`;
  closeModal();
  showToast('處理中，請稍候...','warn');
  try{
    // 1. 建立領料主單
    const master=await createPage(DB.pickMaster,{
      '領料主單號':{title:[{text:{content:no}}]},
      '對應訂單':{relation:[{id:orderId}]},
      '成品品號':{rich_text:[{text:{content:prod?.name||''}}]},
      '生產數量':{number:o.qty},
      '狀態':{select:{name:'已確認扣料'}},
      '領料日期':{date:{start:ds}},
    });
    if(!master.id) throw new Error('建立領料主單失敗：'+JSON.stringify(master));

    // 2. 建立明細 + 扣庫存（依序執行確保庫存正確）
    for(const item of items){
      await createPage(DB.pickDetail,{
        '料件名稱':{title:[{text:{content:item.name}}]},
        '領料主單':{relation:[{id:master.id}]},
        '料件':{relation:[{id:item.id}]},
        '類型':{select:{name:item.type}},
        '需求數量':{number:item.needed},
        '實領數量':{number:item.type==='半成品'?item.needed:Math.min(item.needed,item.stock)},
        '狀態':{select:{name:item.type==='半成品'?'半成品':item.stock>=item.needed?'足夠':'缺料'}},
      });
      // 只扣零件庫存，半成品不扣
      if(item.type!=='半成品'){
        const newStock=Math.max(0, item.stock-item.needed);
        const upRes=await updatePage(item.id,{'目前庫存':{number:newStock}});
        if(upRes.id) {
          // 更新本地快取讓後續計算正確
          const m=mats.find(x=>x.id===item.id);
          if(m) m.stock=newStock;
        }
      }
    }

    // 3. 更新訂單狀態為生產中
    await updatePage(orderId,{'狀態':{select:{name:'生產中'}}});

    await refreshAll();
    await loadPicks();
    showToast(`✅ 領料單 ${no} 建立完成，庫存已扣減`,'ok');
    switchTab('picking');
  }catch(e){
    showToast('❌ 錯誤：'+e.message,'err');
    console.error(e);
  }
}

async function approveQC(inboundId, matId, qty){
  if(!confirm(`確認品檢通過？將自動新增 ${qty} 個到庫存`))return;
  try{
    // 1. 更新入料單狀態
    await updatePage(inboundId,{
      '品管狀態':{select:{name:'品檢通過'}},
      '入庫狀態':{select:{name:'已入庫'}},
    });
    // 2. 增加庫存
    const mat=mats.find(m=>m.id===matId);
    const newStock=(mat?.stock||0)+parseInt(qty);
    await updatePage(matId,{'目前庫存':{number:newStock}});
    await refreshAll();
    await loadInbounds();
    renderTab(CURRENT_TAB);
    showToast(`✅ 品檢通過！${mat?.name} 庫存 ${mat?.stock} → ${newStock}`,'ok');
  }catch(e){showToast('錯誤：'+e.message,'err');}
}

async function rejectQC(inboundId){
  if(!confirm('確認品檢不合格？將標記退回供應商'))return;
  try{
    await updatePage(inboundId,{
      '品管狀態':{select:{name:'品檢不合格'}},
      '入庫狀態':{select:{name:'退回供應商'}},
    });
    await loadInbounds();
    renderTab(CURRENT_TAB);
    showToast('已標記不合格，退回供應商','warn');
  }catch(e){showToast('錯誤：'+e.message,'err');}
}

        ${fld('地區',`<select class="inp" id="m_cregion"><option>台灣</option><option>海外</option><option>中國</option></select>`)}
      </div>
      <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-blue" onclick="submitCustomer()">新增</button></div>`;}
  }
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){document.getElementById('modalBg').classList.remove('open');}

async function submitOrder(){
  const cust=document.getElementById('m_cust').value;
  const prodId=document.getElementById('m_prod').value;
  const qty=parseInt(document.getElementById('m_qty').value)||0;
  const date=document.getElementById('m_date').value;
  const note=document.getElementById('m_note').value;
  if(!qty||!date){alert('請填入數量與交期');return;}
  const d=new Date();
  const no=`ORD-${String(d.getFullYear()).slice(2)}${String(d.getMonth()+1).padStart(2,'0')}-${Math.floor(Math.random()*900+100)}`;
  closeModal();
  try{
    await createPage(DB.orders,{
      '訂單號':{title:[{text:{content:no}}]},
      '客戶名稱':{select:{name:cust}},
      '成品':{relation:[{id:prodId}]},
      '訂購數量':{number:qty},
      '交期':{date:{start:date}},
      '狀態':{select:{name:'待排程'}},
      '業務備註':{rich_text:[{text:{content:note}}]},
    });
    await refreshAll();
    showToast(`✅ 訂單 ${no} 建立成功`,'ok');
  }catch(e){showToast('錯誤：'+e.message,'err');}
}

async function submitInbound(){
  const matId=document.getElementById('m_mat').value;
  const qty=parseInt(document.getElementById('m_iqty').value)||0;
  const date=document.getElementById('m_idate').value;
  const sup=document.getElementById('m_sup').value;
  const rec=document.getElementById('m_rec').value;
  if(!qty){alert('請填入數量');return;}
  const d=new Date();
  const no=`IN-${String(d.getFullYear()).slice(2)}${String(d.getMonth()+1).padStart(2,'0')}-${Math.floor(Math.random()*900+100)}`;
  closeModal();
  try{
    await createPage(DB.inbound,{
      '入料單號':{title:[{text:{content:no}}]},
      '料件':{relation:[{id:matId}]},
      '入料數量':{number:qty},
      '入料日期':{date:{start:date}},
      '供應商':{rich_text:[{text:{content:sup}}]},
      '驗收人員':{rich_text:[{text:{content:rec}}]},
      '品管狀態':{select:{name:'待品檢'}},
      '入庫狀態':{select:{name:'待入庫'}},
    });
    await loadInbounds();
    renderTab(CURRENT_TAB);
    showToast(`✅ 入料單 ${no} 建立，請至品管頁面確認`,'ok');
  }catch(e){showToast('錯誤：'+e.message,'err');}
}

async function submitCustomer(){
  const name=document.getElementById('m_cname').value.trim();
  const code=document.getElementById('m_ccode').value.trim();
  const region=document.getElementById('m_cregion').value;
  if(!name){alert('請填入客戶名稱');return;}
  closeModal();
  try{
    await createPage(DB.customers,{
      '客戶名稱':{title:[{text:{content:name}}]},
      '客戶代號':{rich_text:[{text:{content:code}}]},
      '地區':{select:{name:region}},
    });
    await refreshAll();
    showToast(`✅ 客戶 ${name} 新增成功`,'ok');
  }catch(e){showToast('錯誤：'+e.message,'err');}
}

// ============================================================
// TOAST & INIT
// ============================================================
function showToast(msg,type){
  const c={ok:['rgba(46,196,138,.12)','rgba(46,196,138,.3)','#2ec48a'],warn:['rgba(245,185,66,.1)','rgba(245,185,66,.25)','#f5b942'],err:['rgba(245,101,101,.1)','rgba(245,101,101,.25)','#f56565']};
  const[bg,border,color]=c[type]||c.ok;
  const t=document.createElement('div');t.className='toast';
  t.style.cssText=`background:${bg};border:1px solid ${border};color:${color}`;
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},4000);
}

window.onload=()=>{
  const t=localStorage.getItem('lematec_token');
  const r=localStorage.getItem('lematec_role');
  if(t&&r){TOKEN=t;ROLE=r;document.getElementById('tokenInput').value=t;document.getElementById('roleSelect').value=r;startApp();}
};
