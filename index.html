:root{
–bg:#05080f;–bg2:#0a0f1e;–bg3:#0f1628;–bg4:#151d35;–bg5:#1c2640;
–border:#1a2438;–border2:#243352;–border3:#2d4068;
–brand:#9c1b2c;–brand2:#c5243e;
–blue:#3b82f6;–blue2:#60a5fa;–cyan:#06b6d4;–cyan2:#22d3ee;
–green:#10b981;–green2:#34d399;–yellow:#f59e0b;–amber:#fbbf24;
–red:#ef4444;–red2:#f87171;–purple:#8b5cf6;
–text:#f0f4ff;–text2:#94a3b8;–text3:#475569;–text4:#1e293b;
–f-ui:‘Outfit’,‘Noto Sans TC’,system-ui,sans-serif;
–f-mono:‘DM Mono’,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:15px;}
body{
background:var(–bg);color:var(–text);font-family:var(–f-ui);
font-size:1rem;line-height:1.55;min-height:100vh;
background-image:
radial-gradient(ellipse 100% 50% at 50% 0%,rgba(59,130,246,.08) 0%,transparent 60%),
radial-gradient(ellipse 50% 30% at 0% 100%,rgba(6,182,212,.04) 0%,transparent 50%),
radial-gradient(ellipse 40% 30% at 100% 50%,rgba(156,27,44,.04) 0%,transparent 50%);
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(–border3);border-radius:2px;}

.inp{width:100%;background:var(–bg4);border:1px solid var(–border2);border-radius:8px;padding:10px 14px;color:var(–text)!important;-webkit-text-fill-color:var(–text)!important;font-family:var(–f-ui);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;}
.inp:focus{border-color:var(–blue);box-shadow:0 0 0 3px rgba(59,130,246,.18);}
.inp::placeholder{color:var(–text3)!important;-webkit-text-fill-color:var(–text3)!important;}
select.inp>option{background:var(–bg3);color:var(–text);}
textarea.inp{resize:vertical;min-height:80px;line-height:1.6;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:8px;border:none;font-family:var(–f-ui);font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;touch-action:manipulation;-webkit-user-select:none;user-select:none;white-space:nowrap;letter-spacing:.2px;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-primary{background:linear-gradient(135deg,var(–brand),var(–brand2));color:#fff;box-shadow:0 4px 16px rgba(156,27,44,.35);}
.btn-blue{background:var(–blue);color:#fff;box-shadow:0 4px 14px rgba(59,130,246,.3);}
.btn-blue:hover{background:#2563eb;box-shadow:0 6px 22px rgba(59,130,246,.45);}
.btn-blue:disabled{background:var(–text3);box-shadow:none;}
.btn-green{background:rgba(16,185,129,.15);color:var(–green2);border:1px solid rgba(16,185,129,.3);}
.btn-red{background:rgba(239,68,68,.12);color:var(–red2);border:1px solid rgba(239,68,68,.25);}
.btn-yellow{background:rgba(245,158,11,.12);color:var(–amber);border:1px solid rgba(245,158,11,.25);}
.btn-ghost{background:var(–bg4);color:var(–text2);border:1px solid var(–border2);}
.btn-ghost:hover{background:var(–bg5);color:var(–text);border-color:var(–border3);}
.btn-cyan{background:rgba(6,182,212,.12);color:var(–cyan2);border:1px solid rgba(6,182,212,.25);}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:7px;}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:6px;}
.btn-full{width:100%;justify-content:center;}

/* LOGIN */
.login-page{position:fixed;inset:0;background:var(–bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:20px;z-index:999;}
.login-logo{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(–bg3),var(–bg4));border:1px solid var(–border2);display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 0 40px rgba(59,130,246,.15);}
.login-logo img{width:56px;height:56px;object-fit:contain;}
.login-brand{font-family:var(–f-mono);font-size:26px;font-weight:500;letter-spacing:8px;color:var(–text);text-shadow:0 0 30px rgba(59,130,246,.4);}
.login-sub{font-size:11px;color:var(–text3);letter-spacing:4px;margin-top:-18px;}
.login-card{background:var(–bg2);border:1px solid var(–border2);border-radius:16px;padding:28px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.7);}
.login-card .label{display:block;font-size:10px;color:var(–text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600;}
.pw-wrap{position:relative;}.pw-wrap .inp{padding-right:60px;}
.pw-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(–bg5);border:1px solid var(–border2);border-radius:5px;color:var(–text3);font-size:10px;padding:3px 8px;cursor:pointer;}
.login-hint{font-size:11px;color:var(–text3);margin-top:5px;line-height:1.5;}
.login-hint a{color:var(–blue);text-decoration:none;}
.login-err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(–red2);border-radius:8px;padding:10px 14px;font-size:12px;margin-top:12px;display:none;}
.login-err.show{display:block;}

/* APP */
.app{display:none;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{height:54px;flex-shrink:0;background:rgba(5,8,15,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(–border);display:flex;align-items:center;padding:0 18px;gap:12px;position:sticky;top:0;z-index:50;}
.topbar::after{content:’’;position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,var(–blue) 35%,var(–cyan) 65%,transparent 95%);opacity:.5;}
.topbar-logo{width:30px;height:30px;border-radius:50%;overflow:hidden;background:var(–bg3);border:1px solid var(–border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.topbar-logo img{width:24px;height:24px;object-fit:contain;}
.topbar-brand{font-family:var(–f-mono);font-size:13px;font-weight:500;letter-spacing:4px;color:var(–text);}
.topbar-divider{color:var(–border3);font-size:12px;margin:0 2px;}
.topbar-sub{font-size:11px;color:var(–text3);letter-spacing:1px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(–green);box-shadow:0 0 10px rgba(16,185,129,.5);flex-shrink:0;animation:pulse-dot 2.5s infinite;}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 8px rgba(16,185,129,.4);}50%{box-shadow:0 0 18px rgba(16,185,129,.7),0 0 28px rgba(16,185,129,.2);}}
.role-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px;}
.sync-time{font-size:10px;color:var(–text3);font-family:var(–f-mono);}

.nav-bar{flex-shrink:0;height:44px;background:rgba(5,8,15,.95);border-bottom:1px solid var(–border);display:flex;overflow-x:scroll;-webkit-overflow-scrolling:touch;scrollbar-width:none;-m
