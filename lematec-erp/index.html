<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

:root{
  --bg:#05080f;--bg2:#0a0f1e;--bg3:#0f1628;--bg4:#151d35;--bg5:#1c2640;
  --border:#1a2438;--border2:#243352;--border3:#2d4068;
  --brand:#9c1b2c;--brand2:#c5243e;
  --blue:#3b82f6;--blue2:#60a5fa;--cyan:#06b6d4;--cyan2:#22d3ee;
  --green:#10b981;--green2:#34d399;--yellow:#f59e0b;--amber:#fbbf24;
  --red:#ef4444;--red2:#f87171;--purple:#8b5cf6;
  --text:#f0f4ff;--text2:#94a3b8;--text3:#475569;
  --f-ui:'Outfit','Noto Sans TC',system-ui,sans-serif;
  --f-mono:'DM Mono',monospace;
}

/* ── Reset ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:15px;}
body{background:var(--bg);color:var(--text);font-family:var(--f-ui);font-size:1rem;line-height:1.5;min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px;}

/* ── Input ── */
.inp{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text)!important;-webkit-text-fill-color:var(--text)!important;font-family:var(--f-ui);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.18);}
.inp::placeholder{color:var(--text3)!important;-webkit-text-fill-color:var(--text3)!important;}
select.inp>option{background:var(--bg3);color:var(--text);}
textarea.inp{resize:vertical;min-height:80px;line-height:1.6;}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:8px;border:none;font-family:var(--f-ui);font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;touch-action:manipulation;-webkit-user-select:none;user-select:none;white-space:nowrap;letter-spacing:.2px;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;box-shadow:0 4px 16px rgba(156,27,44,.35);}
.btn-primary:hover{box-shadow:0 6px 24px rgba(156,27,44,.5);}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(59,130,246,.3);}
.btn-blue:hover{background:#2563eb;box-shadow:0 6px 22px rgba(59,130,246,.45);}
.btn-blue:disabled{background:var(--text3);box-shadow:none;}
.btn-green{background:rgba(16,185,129,.15);color:var(--green2);border:1px solid rgba(16,185,129,.3);}
.btn-green:hover{background:rgba(16,185,129,.25);}
.btn-red{background:rgba(239,68,68,.12);color:var(--red2);border:1px solid rgba(239,68,68,.25);}
.btn-yellow{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.25);}
.btn-ghost{background:var(--bg4);color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--bg5);color:var(--text);border-color:var(--border3);}
.btn-cyan{background:rgba(6,182,212,.12);color:var(--cyan2);border:1px solid rgba(6,182,212,.25);}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:7px;}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:6px;}
.btn-full{width:100%;justify-content:center;}

/* ══════════════════════════════════════
   LOGIN PAGE
══════════════════════════════════════ */
.login-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:20px;z-index:100;padding:16px;
}
.brand{font-family:var(--f-mono);font-size:12px;font-weight:400;letter-spacing:5px;color:var(--text3);}
.login-screen h1{font-family:var(--f-ui);font-size:26px;font-weight:800;color:var(--text);letter-spacing:.3px;margin-top:-8px;text-align:center;}

/* Login card */
.card{
  background:var(--bg2);border:1px solid var(--border2);border-radius:16px;
  padding:24px;width:100%;max-width:400px;
  box-shadow:0 24px 60px rgba(0,0,0,.6);
}
.card .field{margin-bottom:14px;}
.card .field>label{display:block;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;font-weight:600;}

/* Token input + 清除按鈕 */
.token-wrap{position:relative;}
.token-wrap .inp{padding-right:54px;}
.show-btn{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:var(--bg4);border:1px solid var(--border2);border-radius:5px;
  color:var(--text3);cursor:pointer;font-size:10px;padding:3px 8px;
  font-family:var(--f-ui);white-space:nowrap;
}
.show-btn:hover{color:var(--text);}

/* Hint text */
.hint{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5;}
.hint a{color:var(--blue);text-decoration:none;}

/* Login button */
.btn-login{
  width:100%;padding:13px;margin-top:4px;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  color:#fff;border:none;border-radius:9px;
  font-size:15px;font-weight:700;cursor:pointer;
  font-family:var(--f-ui);letter-spacing:.5px;
  box-shadow:0 4px 20px rgba(156,27,44,.4);transition:all .2s;
}
.btn-login:hover{box-shadow:0 6px 28px rgba(156,27,44,.6);transform:translateY(-1px);}
.btn-login:disabled{background:var(--text3);cursor:not-allowed;box-shadow:none;transform:none;}

/* Alert */
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-top:10px;display:none;}
.alert.show{display:block;}
.alert-err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red2);}

/* ══════════════════════════════════════
   APP LAYOUT
══════════════════════════════════════ */
.app{display:none;flex-direction:column;height:100vh;overflow:hidden;}

/* Topbar */
.topbar{height:52px;flex-shrink:0;background:rgba(5,8,15,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:50;}
.topbar::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,var(--blue) 35%,var(--cyan) 65%,transparent 95%);opacity:.4;}
.topbar-logo{width:28px;height:28px;border-radius:50%;overflow:hidden;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.topbar-logo img{width:22px;height:22px;object-fit:contain;}
.topbar-brand{font-family:var(--f-mono);font-size:12px;font-weight:400;letter-spacing:4px;color:var(--text);}
.topbar-sep{color:var(--border3);font-size:12px;margin:0 2px;}
.topbar-sub{font-size:11px;color:var(--text3);letter-spacing:1px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:7px;}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(16,185,129,.6);flex-shrink:0;}
.role-badge{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
#syncStatus{font-size:10px;color:var(--text3);font-family:var(--f-mono);}

/* Nav */
.role-nav{flex-shrink:0;background:rgba(5,8,15,.95);border-bottom:1px solid var(--border);display:flex;padding:0 8px;overflow-x:scroll;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none;}
.role-nav::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:11px 15px;font-size:13px;font-weight:600;color:var(--text3);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .2s,border-color .2s;font-family:var(--f-ui);}
.tab-btn:hover{color:var(--text2);}
.tab-btn.active{color:var(--cyan2);border-bottom-color:var(--cyan2);}

/* Content */
.content{flex:1;padding:14px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#mainContent{flex:1;padding:14px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* ══════════════════════════════════════
   PANELS & TABLES
══════════════════════════════════════ */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;position:relative;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.2),rgba(6,182,212,.15),transparent);}
.panel-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:rgba(10,15,30,.5);}
.panel-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px;}
.badge{background:rgba(59,130,246,.15);color:var(--blue2);border-radius:12px;padding:2px 8px;font-size:10px;font-weight:700;border:1px solid rgba(59,130,246,.18);}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.table-wrap::-webkit-scrollbar{height:3px;}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border2);}
table{width:100%;border-collapse:collapse;min-width:480px;}
th{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);font-weight:700;padding:10px 14px;text-align:left;background:rgba(5,8,15,.7);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;transition:color .15s;}
th:hover{color:var(--text2);}
th.th-asc,th.th-desc{color:var(--cyan2);}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;line-height:1.4;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(59,130,246,.04);}
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;letter-spacing:.3px;}

/* ══════════════════════════════════════
   DASHBOARD
══════════════════════════════════════ */
.dash-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 20px;cursor:pointer;position:relative;overflow:hidden;transition:transform .2s,border-color .2s,box-shadow .2s;}
.kpi-card:hover{transform:translateY(-3px);}
.kpi-glow{position:absolute;width:130px;height:130px;border-radius:50%;top:-30px;right:-20px;opacity:.1;filter:blur(50px);pointer-events:none;}
.kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:12px;}
.kpi-num{font-family:var(--f-mono);font-size:40px;font-weight:500;line-height:1;margin-bottom:4px;letter-spacing:-2px;}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.kpi-bar{height:3px;border-radius:2px;background:var(--border);margin-top:12px;overflow:hidden;}
.kpi-bar-fill{height:100%;border-radius:2px;}
.kpi-blue{border-color:rgba(59,130,246,.2);}.kpi-blue:hover{border-color:rgba(59,130,246,.4);box-shadow:0 8px 32px rgba(59,130,246,.1);}.kpi-blue .kpi-glow{background:var(--blue);}.kpi-blue .kpi-num{color:var(--blue2);}.kpi-blue .kpi-bar-fill{background:linear-gradient(90deg,var(--blue),var(--cyan2));}
.kpi-green{border-color:rgba(16,185,129,.2);}.kpi-green:hover{border-color:rgba(16,185,129,.4);box-shadow:0 8px 32px rgba(16,185,129,.1);}.kpi-green .kpi-glow{background:var(--green);}.kpi-green .kpi-num{color:var(--green2);}.kpi-green .kpi-bar-fill{background:linear-gradient(90deg,var(--green),var(--cyan2));}
.kpi-amber{border-color:rgba(245,158,11,.2);}.kpi-amber:hover{border-color:rgba(245,158,11,.4);}.kpi-amber .kpi-glow{background:var(--yellow);}.kpi-amber .kpi-num{color:var(--amber);}.kpi-amber .kpi-bar-fill{background:linear-gradient(90deg,var(--yellow),var(--amber));}
.kpi-red{border-color:rgba(239,68,68,.2);}.kpi-red:hover{border-color:rgba(239,68,68,.4);box-shadow:0 8px 32px rgba(239,68,68,.08);}.kpi-red .kpi-glow{background:var(--red);}.kpi-red .kpi-num{color:var(--red2);}.kpi-red .kpi-bar-fill{background:linear-gradient(90deg,var(--red),#ff7171);}
.kpi-cyan{border-color:rgba(6,182,212,.2);}.kpi-cyan:hover{border-color:rgba(6,182,212,.4);box-shadow:0 8px 32px rgba(6,182,212,.08);}.kpi-cyan .kpi-glow{background:var(--cyan);}.kpi-cyan .kpi-num{color:var(--cyan2);}.kpi-cyan .kpi-bar-fill{background:linear-gradient(90deg,var(--cyan),var(--blue2));}

/* Stats (Dashboard fallback) */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:transform .15s,border-color .2s;}
.stat:hover{transform:translateY(-2px);}
.stat-n{font-family:var(--f-mono);font-size:30px;font-weight:700;line-height:1;margin-bottom:3px;}
.stat-l{font-size:11px;color:var(--text3);}

/* ══════════════════════════════════════
   INFO BOXES
══════════════════════════════════════ */
.info-box{padding:10px 14px;border-radius:9px;font-size:13px;margin-bottom:12px;line-height:1.6;}
.info-ok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);color:var(--green2);}
.info-warn{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);color:var(--amber);}
.info-tip{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.2);color:var(--cyan2);font-size:12px;}
.help-box{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.18);border-radius:9px;padding:10px 14px;font-size:12px;color:var(--cyan2);margin-bottom:12px;line-height:1.7;}

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(6px);}
.modal-bg.open{display:flex;}
@media(min-width:600px){.modal-bg{align-items:center;}.modal{border-radius:16px!important;width:560px!important;max-height:88vh!important;}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:22px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(0,0,0,.6);}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--text);}

/* Modal overlay (new) */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(6px);}
.modal-overlay.open{display:flex;}
@media(min-width:600px){.modal-overlay{align-items:center;}.modal-box{border-radius:16px!important;width:580px!important;max-height:88vh!important;}}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:22px;width:100%;max-height:93vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(0,0,0,.7);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--text);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;flex-wrap:wrap;}
.field-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px;font-weight:600;}

/* ══════════════════════════════════════
   ANNOUNCEMENT
══════════════════════════════════════ */
.ann-item{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:15px 16px 15px 20px;margin-bottom:9px;position:relative;overflow:hidden;transition:border-color .2s;}
.ann-item:hover{border-color:var(--border2);}
.ann-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(to bottom,var(--blue),var(--cyan));border-radius:4px 0 0 4px;}
.ann-pinned::before{background:linear-gradient(to bottom,var(--yellow),var(--amber));}

/* ══════════════════════════════════════
   ITEM ROWS (Order items)
══════════════════════════════════════ */
.item-row{background:var(--bg4);border:1px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:5px;display:flex;align-items:flex-start;gap:8px;}
.item-row:last-child{margin-bottom:0;}
.item-check{width:16px;height:16px;accent-color:var(--blue);flex-shrink:0;margin-top:4px;cursor:pointer;}
.item-body{flex:1;min-width:0;}
.item-model-wrap{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.item-model{flex:1;background:var(--bg5)!important;border:1px solid var(--border2);border-radius:6px;padding:6px 9px;color:var(--text)!important;-webkit-text-fill-color:var(--text)!important;font-size:13px;font-family:var(--f-mono);outline:none;min-width:0;}
.item-model:focus{border-color:var(--blue);}
.item-model::placeholder{color:var(--text3)!important;-webkit-text-fill-color:var(--text3)!important;}
.item-qty{width:68px;flex-shrink:0;background:var(--bg5)!important;border:1px solid var(--border2);border-radius:6px;padding:6px 8px;color:var(--text)!important;-webkit-text-fill-color:var(--text)!important;font-size:13px;font-family:var(--f-mono);text-align:center;outline:none;}
.item-qty:focus{border-color:var(--blue);}
.item-del{flex-shrink:0;width:28px;height:28px;border-radius:6px;cursor:pointer;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;padding:0;}
.item-hint{font-size:10px;color:var(--text3);min-height:14px;margin-top:2px;}

/* ══════════════════════════════════════
   PROGRESS / STOCK BAR / SN / etc.
══════════════════════════════════════ */
.prog-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:12px;margin-top:10px;}
.prog-text{font-size:12px;color:var(--text2);margin-bottom:7px;}
.prog-track{background:var(--bg5);border-radius:4px;height:5px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:4px;transition:width .3s;}
.sbar{width:44px;height:4px;background:var(--bg5);border-radius:2px;display:inline-block;vertical-align:middle;margin-right:5px;overflow:hidden;}
.sbar-fill{height:100%;border-radius:2px;}
.bar{width:44px;height:4px;background:var(--bg5);border-radius:2px;display:inline-block;vertical-align:middle;margin-right:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;}
.sn{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;font-size:9px;font-weight:700;flex-shrink:0;vertical-align:middle;margin-right:4px;}
.loading-row{display:flex;align-items:center;justify-content:center;padding:28px;color:var(--text3);gap:8px;font-size:13px;}
.pi-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:5px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border-color .15s;}
.pi-item:hover,.pi-item.selected{border-color:var(--blue);}

/* ══════════════════════════════════════
   QC TABS
══════════════════════════════════════ */
.qc-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;}
.qc-tab{padding:9px 16px;font-size:13px;font-weight:600;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--text3);transition:color .15s;flex-shrink:0;}
.qc-tab.active{color:var(--cyan2);border-bottom-color:var(--cyan2);}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
#toastZone{position:fixed;top:62px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast{min-width:230px;max-width:370px;padding:11px 15px;border-radius:10px;font-size:13px;font-weight:500;line-height:1.4;box-shadow:0 6px 24px rgba(0,0,0,.5);opacity:0;transform:translateX(16px);transition:opacity .25s,transform .25s;pointer-events:none;}
.toast.in{opacity:1;transform:translateX(0);}

/* ══════════════════════════════════════
   ANIMATIONS & SPIN
══════════════════════════════════════ */
@keyframes spin{to{transform:rotate(360deg);}}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.15);border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.kpi-card{animation:fadeUp .3s ease both;}
.panel{animation:fadeUp .25s ease both;}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media(max-width:600px){
  html{font-size:14px;}
  .content,#mainContent{padding:9px;}
  .dash-kpi-grid{grid-template-columns:1fr 1fr!important;gap:9px!important;}
  .stats{grid-template-columns:1fr 1fr;}
  .kpi-num{font-size:32px!important;}
  .stat-n{font-size:24px;}
  td,th{padding:9px 10px!important;font-size:12px!important;}
  .form-row{grid-template-columns:1fr!important;}
  .hide-m{display:none!important;}
  .modal-box,.modal{padding:18px;}
  .topbar{padding:0 10px;}
  .tab-btn{padding:10px 12px;font-size:12px;}
  .kpi-card{padding:15px 16px;}
  .card{max-width:100%;}
}
@media(max-width:380px){
  .kpi-num{font-size:28px!important;}
}

async function notionAPI(method,endpoint,body=null){
  const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:TOKEN,method,endpoint,body})});
  const text=await res.text();
  try{return JSON.parse(text);}catch{throw new Error('解析失敗: '+text.slice(0,100));}
}
async function dbQueryAll(dbId){
  let all=[],c=null,tries=0;
  do{
    const b={page_size:100};if(c)b.start_cursor=c;
    const r=await notionAPI('POST',`databases/${dbId}/query`,b);
    if(r.object==='error'){
      if(r.status===429&&tries<2){await new Promise(res=>setTimeout(res,1200*(tries+1)));tries++;continue;}
      throw new Error('DB查詢失敗: '+r.message);
    }
    all=all.concat(r.results||[]);c=r.has_more?r.next_cursor:null;tries=0;
  }while(c);
  return all;
}
const createPage=(dbId,props)=>notionAPI('POST','pages',{parent:{database_id:dbId},properties:props});
async function updatePage(id,props){
  for(let i=0;i<3;i++){
    const r=await notionAPI('PATCH',`pages/${id}`,{properties:props});
    if(r.object!=='error') return r;
    if(r.status===429) await new Promise(res=>setTimeout(res,1000*(i+1)));
    else throw new Error(r.message||JSON.stringify(r));
  }
}
const archivePage=id=>notionAPI('PATCH',`pages/${id}`,{archived:true});
const getBlockChildren=id=>notionAPI('GET',`blocks/${id}/children?page_size=100`);
const getBlock=id=>notionAPI('GET',`blocks/${id}`);
const notionSearch=q=>notionAPI('POST','search',{query:q,filter:{property:'object',value:'page'},page_size:20});
async function downloadViaProxy(url){
  const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:TOKEN,downloadUrl:url})});
  if(!res.ok)throw new Error(`下載失敗 HTTP ${res.status}`);
  return res.arrayBuffer();
}

function getTitle(props,...keys){for(const k of keys){const a=props?.[k]?.title;if(Array.isArray(a)&&a.length)return a[0]?.plain_text||a[0]?.text?.content||'';}return '';}
function getRichText(props,...keys){for(const k of keys){const p=props?.[k];if(!p)continue;const a=p.rich_text||p.text||[];if(Array.isArray(a)&&a.length)return(a[0]?.plain_text||a[0]?.text?.content||'').trim();}return '';}

async function login(){
  const t=document.getElementById('tokenInput').value.trim().replace(/\s+/g,'');
  const r=document.getElementById('roleSelect').value;
  document.getElementById('loginAlert').classList.remove('show');
  if(!t){showLoginErr('請填入 Token');return;}
  if(!t.startsWith('ntn_')){showLoginErr('Token 需 <b>ntn_</b> 開頭');return;}
  TOKEN=t;ROLE=r;
  const btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='驗證中...';
  try{
    const data=await notionAPI('GET',`databases/${DB.materials}`);
    if(data.id||data.object==='database'){
      localStorage.setItem('lt',t);localStorage.setItem('lr',r);startApp();
    }else if(data.status===401||data.code==='unauthorized'){showLoginErr('Token 無效 (401)');}
    else{showLoginErr(`連接失敗: ${data.message||data.code||'未知'}`);}
  }catch(e){showLoginErr(`網路錯誤: ${e.message}`);}
  btn.disabled=false;btn.textContent='⚡ 進入系統';
}
function showLoginErr(msg){const el=document.getElementById('loginAlert');el.innerHTML=msg;el.className='alert alert-err show';}
function logout(){localStorage.removeItem('lu');localStorage.removeItem('lr');localStorage.removeItem('ldn');TOKEN='';ROLE='';document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';}

async function startApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  const ri=ROLES[ROLE];
  const badge=document.getElementById('roleBadge');
  badge.textContent=ri.label;
  badge.style.cssText=`padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:${ri.color}20;color:${ri.color}`;
  buildNav();showTab('dashboard');initOnlineTracking();

  const mc = document.getElementById('mainContent');
  mc.innerHTML=`<div class="loading-row"><div class="spin"></div>載入資料中，請稍候...</div>`;

  // 直接呼叫 refreshAll，確保所有資料完整載入後才渲染
  await refreshAll();
}

let _refreshTimer=null,_refreshing=false;
function scheduleRefresh(ms=800){clearTimeout(_refreshTimer);_refreshTimer=setTimeout(()=>refreshAll(),ms);}

async function refreshAll(manual=false){
  if(_refreshing&&!manual){scheduleRefresh(1500);return;}
  _refreshing=true;
  // 防連續重複觸發：3秒內自動觸發跳過
  const now=Date.now();
  if(!manual&&window._lastRefresh&&(now-window._lastRefresh)<3000){
    _refreshing=false;return;
  }
  window._lastRefresh=now;
  const syncEl=document.getElementById('syncStatus');
  if(syncEl)syncEl.textContent='⟳ 同步中...';
  try{
    const [mR,bR,oR,masterR,annR,leaveR]=await Promise.all([
      dbQueryAll(DB.materials),
      dbQueryAll(DB.bom),
      dbQueryAll(DB.orders),
      dbQueryAll(DB.custMaster), // 唯一客戶來源，每次重新讀取
      dbQueryAll(DB.announce),
      dbQueryAll(DB.leave),
    ]);

    mats=mR.map(p=>({
      id:p.id,
      name:getTitle(p.properties,'料件名稱'),
      code:getRichText(p.properties,'料件編號'),
      type:p.properties?.['類型']?.select?.name||'',
      unit:p.properties?.['單位']?.select?.name||'個',
      stock:p.properties?.['目前庫存']?.number??0,
      safe:p.properties?.['安全庫存']?.number??0,
    }));

    boms=bR.map(p=>({
      parentId:p.properties?.['母件']?.relation?.[0]?.id||'',
      childId:p.properties?.['子件']?.relation?.[0]?.id||'',
      qty:p.properties?.['每台用量']?.number??1,
    }));

    orders=oR.map(p=>({
      id:p.id,
      no:getTitle(p.properties,'訂單號'),
      customer:p.properties?.['客戶名稱']?.select?.name||'',
      productId:p.properties?.['成品']?.relation?.[0]?.id||'',
      qty:p.properties?.['訂購數量']?.number??0,
      deadline:p.properties?.['交期']?.date?.start||'',
      status:p.properties?.['狀態']?.select?.name||'',
      note:p.properties?.['業務備註']?.rich_text?.[0]?.plain_text||'',
      created:p.created_time?.slice(0,10)||'',
    }));

    // 國外客戶
    const overseasCustomers = masterR.map(p=>({
      id:p.id,
      name:getTitle(p.properties,'Name'),
      code:getRichText(p.properties,'客戶編號'),
      region:p.properties?.['國家']?.select?.name||'',
      shipped:p.properties?.['出貨']?.select?.name||'',
      type:'overseas',
    })).filter(c=>c.name);

    // 同步載入國內客戶
    let domesticCustomers=[];
    try{
      const domR=await dbQueryAll(DB.custDomestic);
      domesticCustomers=domR.map(p=>({
        id:p.id,
        name:getTitle(p.properties,'客戶名稱'),
        code:getRichText(p.properties,'客戶編號'),
        region:p.properties?.['地區']?.select?.name||'',
        shipped:p.properties?.['出貨記錄']?.select?.name||'',
        grade:p.properties?.['客戶等級']?.select?.name||'',
        area:p.properties?.['地區']?.select?.name||'',
        type:'domestic',
      })).filter(c=>c.name);
    }catch(e){console.warn('國內客戶載入失敗:',e);}

    customers=[...overseasCustomers,...domesticCustomers];

    // ★ 請假解析
    leaves=(leaveR||[]).map(p=>({
      id:p.id,
      name:getTitle(p.properties,'申請人姓名'),
      title:getRichText(p.properties,'職稱'),
      dateFrom:p.properties?.['請假日期起']?.date?.start||'',
      dateTo:p.properties?.['請假日期迄']?.date?.start||'',
      days:p.properties?.['請假天數']?.number||0,
      type:p.properties?.['假別']?.select?.name||'',
      reason:getRichText(p.properties,'請假原因'),
      proxy:getRichText(p.properties,'職務代理人'),
      status:p.properties?.['審核狀態']?.select?.name||'待審核',
      rejectReason:getRichText(p.properties,'不通過原因'),
      reviewer:getRichText(p.properties,'審核人'),
      applyDate:p.properties?.['申請日期']?.date?.start||p.created_time?.slice(0,10)||'',
    }));
    // ★ 公告解析：'內容' 是 text 型欄位，Notion API 回傳為 rich_text 陣列
    announces=(annR||[]).map(p=>({
      id:p.id,
      title:getTitle(p.properties,'標題'),
      content:(p.properties?.['內容']?.rich_text||p.properties?.['內容']?.text||[]).map(r=>r.plain_text||r.text?.content||'').join(''),
      date:p.properties?.['發佈日期']?.date?.start||'',
      status:p.properties?.['狀態']?.select?.name||'草稿',
      pinned:p.properties?.['置頂']?.checkbox||false,
      order:p.properties?.['顯示順序']?.number||99,
    }));

    const low=mats.filter(m=>m.stock<=m.safe);
    const w=document.getElementById('lowWarn');
    if(low.length){w.style.display='';w.textContent=`⚠ ${low.length}項庫存不足`;}else w.style.display='none';

    const now=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    if(syncEl)syncEl.textContent=`✓ ${now}`;

    renderTab(CURRENT_TAB);
    if(manual)showToast('✅ 資料已同步最新','ok');
  }catch(e){
    if(syncEl)syncEl.textContent='❌ 失敗';
    document.getElementById('mainContent').innerHTML=
      `<div class="info-box" style="background:rgba(245,101,101,.08);border:1px solid rgba(245,101,101,.2);color:var(--red);margin:8px">
        ❌ 載入失敗: ${e.message}
        <br><button class="btn btn-ghost btn-sm" onclick="refreshAll()" style="margin-top:8px">重試</button>
      </div>`;
  } finally {
    _refreshing=false;
  }
}

function explodeBOM(pid,qty){
  const res={};const q=[{pid,mult:qty}];const seen=new Set();
  while(q.length){const{pid:p,mult:m}=q.shift();boms.filter(b=>b.parentId===p).forEach(b=>{const mat=mats.find(x=>x.id===b.childId);if(!mat)return;const n=b.qty*m;if(!res[b.childId])res[b.childId]={...mat,needed:0};res[b.childId].needed+=n;if(mat.type==='半成品'&&!seen.has(b.childId)){seen.add(b.childId);q.push({pid:b.childId,mult:n});}});}
  return Object.values(res);
}

function toggleSort(tid,col,type='str'){const s=SORT[tid]||{};SORT[tid]={col,dir:s.col===col&&s.dir==='asc'?'desc':'asc',type};renderTab(CURRENT_TAB);}
function applySort(tid,data){const s=SORT[tid];if(!s)return data;return[...data].sort((a,b)=>{let va=a[s.col],vb=b[s.col];if(s.type==='num'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}else{va=String(va||'').toLowerCase();vb=String(vb||'').toLowerCase();}if(va<vb)return s.dir==='asc'?-1:1;if(va>vb)return s.dir==='asc'?1:-1;return 0;});}
function TH(tid,col,label,type='str',cls=''){const s=SORT[tid]||{};const a=s.col===col;return`<th class="${a?'th-'+s.dir:''} ${cls}" onclick="toggleSort('${tid}','${col}','${type}')">${label}<span style="font-size:8px;opacity:${a?1:.3};margin-left:2px">${a?(s.dir==='asc'?'↑':'↓'):'↕'}</span></th>`;}
function applyDateFilter(filterId,data,dateKey='deadline'){
  const sel=document.getElementById(filterId+'DateFilter');
  const val=sel?sel.value:'6';
  if(!val||val==='0') return data; // 全部

  const today=new Date();
  let cutoff;

  if(val==='7d'){
    // 近7天
    cutoff=new Date();
    cutoff.setDate(cutoff.getDate()-7);
  } else if(val==='month'){
    // 當月：本月1日
    cutoff=new Date(today.getFullYear(),today.getMonth(),1);
  } else {
    // 近N個月
    cutoff=new Date();
    cutoff.setMonth(cutoff.getMonth()-parseInt(val));
  }

  const cs=cutoff.toISOString().slice(0,10);
  return data.filter(item=>{
    const d=item[dateKey]||item.date||item.created||'';
    return !d||d>=cs;
  });
}

let stockLogs = [];

async function loadStockLog(){
  try{
    const r = await dbQueryAll(DB.stockLog);
    stockLogs = r.map(p=>({
      id: p.id,
      title: getTitle(p.properties,'異動項目'),
      matName: getRichText(p.properties,'料件名稱'),
      matCode: getRichText(p.properties,'料件編號'),
      type: p.properties?.['異動類型']?.select?.name||'',
      qty: p.properties?.['異動數量']?.number??0,
      before: p.properties?.['異動前庫存']?.number??0,
      after: p.properties?.['異動後庫存']?.number??0,
      date: p.properties?.['異動日期']?.date?.start||'',
      ref: getRichText(p.properties,'關聯單號'),
      operator: getRichText(p.properties,'操作人員'),
    })).sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  }catch(e){
    console.warn('loadStockLog error:',e);
    stockLogs=[];
  }
}

function renderStockLog(){
  const dateVal=document.getElementById('slDateFilter')?.value||'month';
  const typeVal=document.getElementById('slTypeFilter')?.value||'all';
  const qVal=(document.getElementById('slSearch')?.value||'').toLowerCase().trim();

  let data=[...stockLogs];

  // 日期篩選
  if(dateVal!=='0'){
    const today=new Date();
    let cutoff;
    if(dateVal==='7d'){ cutoff=new Date(); cutoff.setDate(cutoff.getDate()-7); }
    else if(dateVal==='month'){ cutoff=new Date(today.getFullYear(),today.getMonth(),1); }
    else { cutoff=new Date(); cutoff.setMonth(cutoff.getMonth()-parseInt(dateVal)); }
    const cs=cutoff.toISOString().slice(0,10);
    data=data.filter(s=>!s.date||s.date>=cs);
  }

  // 類型篩選
  if(typeVal!=='all') data=data.filter(s=>s.type===typeVal);

  // 關鍵字
  if(qVal) data=data.filter(s=>
    s.matName.toLowerCase().includes(qVal)||
    (s.matCode&&s.matCode.toLowerCase().includes(qVal))||
    (s.ref&&s.ref.toLowerCase().includes(qVal))

let schedules = [];

async function loadSchedule(){
  try{
    const r = await dbQueryAll(DB.schedule);
    schedules = r.map(p=>({
      id: p.id,
      name: getTitle(p.properties,'排程名稱'),
      type: p.properties?.['類型']?.select?.name||'',
      person: getRichText(p.properties,'負責人'),
      startDate: p.properties?.['開始日期']?.date?.start||'',
      endDate: p.properties?.['結束日期']?.date?.start||'',
      orderRef: getRichText(p.properties,'關聯訂單號'),
      priority: p.properties?.['優先級']?.select?.name||'',
      status: p.properties?.['狀態']?.select?.name||'待開始',
      note: getRichText(p.properties,'備註'),
    })).sort((a,b)=>a.startDate.localeCompare(b.startDate));
  }catch(e){ console.warn('loadSchedule:',e); schedules=[]; }
}

function renderSchedule(){
  const canEdit = ROLE==='manager'||ROLE==='warehouse';
  const today = new Date().toISOString().slice(0,10);
  const viewVal = document.getElementById('schView')?.value||'list';
  const typeVal = document.getElementById('schType')?.value||'all';
  const statusVal = document.getElementById('schStatus')?.value||'all';

  let data = [...schedules];
  if(typeVal!=='all') data=data.filter(s=>s.type===typeVal);
  if(statusVal!=='all') data=data.filter(s=>s.status===statusVal);

  // 統計
  const urgent = schedules.filter(s=>s.priority==='🔴 緊急'&&s.status!=='已完成').length;
  const overdue = schedules.filter(s=>s.endDate&&s.endDate<today&&s.status!=='已完成').length;
  const inProgress = schedules.filter(s=>s.status==='進行中').length;
  const thisWeek = schedules.filter(s=>{
    const d=new Date(); d.setDate(d.getDate()+7);
    return s.startDate<=d.toISOString().slice(0,10)&&s.startDate>=today&&s.status!=='已完成';
  }).length;

  const typeColors={'生產':'var(--blue)','交貨':'var(--green)','採購入料':'var(--amber)','品管':'var(--yellow)','維護':'var(--text3)','其他':'var(--purple)'};
  const statusColors={'待開始':'var(--text3)','進行中':'var(--blue)','已完成':'var(--green)','延期':'var(--red)'};
  const priorityIcon={'🔴 緊急':'🔴','🟡 一般':'🟡','🟢 低優先':'🟢'};

  // 月曆生成
  function renderCalendar(){
    const now=new Date();
    const yr=now.getFullYear(), mo=now.getMonth();
    const firstDay=new Date(yr,mo,1).getDay();
    const daysInMonth=new Date(yr,mo+1,0).getDate();
    const monthStr=`${yr}-${String(mo+1).padStart(2,'0')}`;
    const days=['日','一','二','三','四','五','六'];
    let cal=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden">
      <div style="padding:14px 16px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <span style="font-weight:700;font-size:15px">${yr}年${mo+1}月</span>
        <span style="font-size:11px;color:var(--text3)">${data.filter(s=>s.startDate.startsWith(monthStr)).length} 項排程</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr)">
        ${days.map(d=>`<div style="text-align:center;padding:8px;font-size:11px;font-weight:700;color:var(--text3);border-bottom:1px solid var(--border)">${d}</div>`).join('')}`;
    let cellIdx=0;
    for(let i=0;i<firstDay;i++){cal+=`<div style="padding:8px;border:1px solid var(--border);min-height:64px;background:var(--bg3)"></div>`;cellIdx++;}
    for(let d=1;d<=daysInMonth;d++){
      const dateStr=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday=dateStr===today;
      const daySchedules=data.filter(s=>s.startDate===dateStr||s.endDate===dateStr||(s.startDate<=dateStr&&s.endDate>=dateStr));
      cal+=`<div style="padding:5px;border:1px solid var(--border);min-height:64px;background:${isToday?'rgba(59,130,246,.08)':'var(--bg2)'}">
        <div style="font-size:11px;font-weight:${isToday?800:400};color:${isToday?'var(--blue)':'var(--text2)'};margin-bottom:3px">${d}</div>
        ${daySchedules.slice(0,2).map(s=>`<div style="font-size:9px;background:${typeColors[s.type]||'var(--bg4)'}22;color:${typeColors[s.type]||'var(--text2)'};border-radius:3px;padding:1px 4px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</div>`).join('')}
        ${daySchedules.length>2?`<div style="font-size:9px;color:var(--text3)">+${daySchedules.length-2} 更多</div>`:''}
      </div>`;
      cellIdx++;
      if(cellIdx%7===0&&d<daysInMonth) cal+=``;
    }
    cal+=`</div></div>`;
    return cal;
  }

  return`
  <!-- 統計列 -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px">
    ${[
      {label:'進行中',val:inProgress,color:'var(--blue)',icon:'▶'},
      {label:'本週開始',val:thisWeek,color:'var(--cyan2)',icon:'📅'},
      {label:'🔴 緊急',val:urgent,color:'var(--red)',icon:'🚨'},
      {label:'逾期未完',val:overdue,color:'var(--amber)',icon:'⚠'},
    ].map(c=>`<div style="background:var(--bg2);border:1px solid ${overdue>0&&c.label==='逾期未完'?'rgba(245,158,11,.3)':'var(--border)'};border-radius:10px;padding:12px;text-align:center;cursor:pointer" onclick="document.getElementById('schStatus').value='進行中';renderTab('schedule')">
      <div style="font-size:20px;margin-bottom:2px">${c.icon}</div>
      <div style="font-size:24px;font-weight:800;color:${c.color};font-family:monospace">${c.val}</div>
      <div style="font-size:10px;color:var(--text3)">${c.label}</div>
    </div>`).join('')}
  </div>

  <!-- 篩選列 -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
    <select class="inp" id="schView" style="width:100px;padding:5px 8px;font-size:12px" onchange="renderTab('schedule')">
      <option value="list" ${viewVal==='list'?'selected':''}>📋 列表</option>
      <option value="calendar" ${viewVal==='calendar'?'selected':''}>📅 月曆</option>
    </select>
    <select class="inp" id="schType" style="width:100px;padding:5px 8px;font-size:12px" onchange="renderTab('schedule')">
      <option value="all">全部類型</option>
      ${['生產','交貨','採購入料','品管','維護','其他'].map(t=>`<option value="${t}" ${typeVal===t?'selected':''}>${t}</option>`).join('')}
    </select>
    <select class="inp" id="schStatus" style="width:100px;padding:5px 8px;font-size:12px" onchange="renderTab('schedule')">
      <option value="all">全部狀態</option>
      ${['待開始','進行中','已完成','延期'].map(s=>`<option value="${s}" ${statusVal===s?'selected':''}>${s}</option>`).join('')}
    </select>
    <span style="font-size:11px;color:var(--text3);margin-left:auto">共 <b style="color:var(--text)">${data.length}</b> 筆</span>
    ${canEdit?`<button class="btn btn-blue btn-sm" onclick="openModal('newSchedule')">＋ 新增排程</button>`:''}
  </div>

  ${viewVal==='calendar'?renderCalendar():`
  <!-- 列表視圖 -->
  <div class="panel">
    <div class="panel-hdr"><span class="panel-title">生產排程 <span class="badge">${data.length}</span></span></div>
    ${!data.length?'<div style="padding:28px;text-align:center;color:var(--text3)">尚無排程資料</div>':
    `<div class="table-wrap"><table>
      <tr><th>排程名稱</th><th>類型</th><th>開始</th><th>結束</th><th class="hide-m">負責人</th><th>狀態</th><th class="hide-m">優先</th>${canEdit?'<th>操作</th>':''}</tr>
      ${data.map(s=>{
        const isOverdue=s.endDate&&s.endDate<today&&s.status!=='已完成';
        return`<tr style="${isOverdue?'background:rgba(245,101,101,.05)':''}">
          <td style="font-weight:600">${s.name}${s.orderRef?`<div style="font-size:10px;color:var(--cyan2);font-family:monospace">${s.orderRef}</div>`:''}</td>
          <td><span class="pill" style="background:${typeColors[s.type]||'var(--bg4)'}22;color:${typeColors[s.type]||'var(--text2)'}">${s.type||'—'}</span></td>
          <td style="font-family:monospace;font-size:11px">${s.startDate||'—'}</td>
          <td style="font-family:monospace;font-size:11px;color:${isOverdue?'var(--red)':'var(--text2)'}">${s.endDate||'—'}${isOverdue?' ⚠':''}</td>
          <td class="hide-m" style="font-size:12px">${s.person||'—'}</td>
          <td><span class="pill" style="background:${statusColors[s.status]||'var(--bg4)'}22;color:${statusColors[s.status]||'var(--text2)'}">${s.status||'—'}</span></td>
          <td class="hide-m" style="font-size:12px">${priorityIcon[s.priority]||'—'}</td>
          ${canEdit?`<td style="white-space:nowrap">
            <button class="btn btn-ghost btn-sm" onclick="openEditSchedule('${s.id}')">✏</button>
            <button class="btn btn-green btn-sm" onclick="doScheduleStatus('${s.id}','已完成')" title="標記完成">✓</button>
          </td>`:''}
        </tr>`;
      }).join('')}
    </table></div>`}
  </div>`}`;
}

async function submitSchedule(existId){
  const name=document.getElementById('sch_name').value.trim();
  const type=document.getElementById('sch_type').value;
  const pri=document.getElementById('sch_pri').value;
  const start=document.getElementById('sch_start').value;
  const end=document.getElementById('sch_end').value;
  const person=document.getElementById('sch_person').value.trim();
  const order=document.getElementById('sch_order').value.trim();
  const note=document.getElementById('sch_note').value.trim();
  const status=document.getElementById('sch_status')?.value||'待開始';
  if(!name){showToast('請填入排程名稱','warn');return;}
  closeModal();showToast('儲存中...','warn');
  try{
    const props={
      '排程名稱':{title:[{text:{content:name}}]},
      '類型':{select:{name:type}},
      '優先級':{select:{name:pri}},
      '負責人':{rich_text:[{text:{content:person}}]},
      '關聯訂單號':{rich_text:[{text:{content:order}}]},
      '備註':{rich_text:[{text:{content:note}}]},
      '狀態':{select:{name:status}},
    };
    if(start)props['開始日期']={date:{start}};
    if(end)props['結束日期']={date:{start:end}};
    if(existId){
      await notionAPI('PATCH','pages/'+existId,{properties:props});
      showToast('✅ 排程已更新','ok');
    }else{
      await notionAPI('POST','pages',{parent:{database_id:DB.schedule},properties:props});
      showToast('✅ 排程已建立','ok');
    }
    await loadSchedule();renderTab('schedule');
  }catch(e){showToast('❌ '+e.message,'err');}
}

async function doScheduleStatus(id, status){
  const s=schedules.find(x=>x.id===id);
  if(s){s.status=status;renderTab('schedule');}
  try{
    await updatePage(id,{'狀態':{select:{name:status}}});
    showToast('✅ 已更新排程狀態','ok');
    setTimeout(()=>loadSchedule().then(()=>renderTab('schedule')),1500);
  }catch(e){showToast('❌ '+e.message,'err');}
}

function openEditSchedule(id){
  const s=schedules.find(x=>x.id===id);if(!s)return;
  openModal('editSchedule',s);
}

  const date     = document.getElementById('ins_date').value;
  const result   = document.getElementById('ins_result').value;
  const inspector= document.getElementById('ins_inspector').value.trim();
  const badReason= document.getElementById('ins_bad_reason')?.value||'';
  const handling = document.getElementById('ins_handling')?.value||'';
  const badDesc  = document.getElementById('ins_bad_desc')?.value.trim()||'';
  const toStock  = document.getElementById('ins_to_stock')?.checked||false;
  const matSel   = document.getElementById('ins_mat_sel')?.value||''; // 選擇的料件 ID（入庫用）
  const note     = document.getElementById('ins_note').value.trim();

  if(!matName){ showToast('請填入品項名稱','warn'); return; }
  if(!date){ showToast('請填入檢驗日期','warn'); return; }

  // 手動新增且勾選料號入庫：需選料件
  const isManual = !orderId;
  if(isManual && toStock && !matSel){
    showToast('勾選料號入庫時，請從料件主檔選擇對應料件','warn'); return;
  }

  const no = document.getElementById('ins_no').value;
  closeModal(); showToast('建立檢驗單中...','warn');

  try{
    const props = {
      '檢驗單號':   {title:[{text:{content:no}}]},
      '關聯訂單號': {rich_text:[{text:{content: orderId ? orderId+'|'+(orderNo||orderId) : (orderNo||'')}}]},
      '檢驗類型':   {select:{name:type}},
      '品項名稱':   {rich_text:[{text:{content:matName}}]},
      '料件編號':   {rich_text:[{text:{content:matCode}}]},
      '應檢數量':   {number:qtyReq},
      '實檢數量':   {number:qtyAct},
      '不良數量':   {number:qtyBad},
      '檢驗結果':   {select:{name:result}},
      '檢驗人員':   {rich_text:[{text:{content:inspector||ROLE}}]},
      '料號入庫':   {checkbox:toStock},
      '備註':       {rich_text:[{text:{content:note}}]},
    };
    if(date) props['檢驗日期']={date:{start:date}};
    if(badReason) props['不良原因']={select:{name:badReason}};
    if(handling)  props['處理方式']={select:{name:handling}};
    if(badDesc)   props['不良描述']={rich_text:[{text:{content:badDesc}}]};

    await notionAPI('POST','pages',{parent:{database_id:DB.qcInspection}, properties:props});

    // ── 情況 A：訂單品管（有 orderId）──
    if(orderId){
      if(result==='通過'){
        // 訂單推進到待出貨，不動庫存
        await updatePage(orderId, {'狀態':{select:{name:'待出貨'}}});
        const o = orders.find(x=>x.id===orderId);
        if(o){ o.status='待出貨'; renderTab(CURRENT_TAB); }
        showToast('✅ 檢驗通過，訂單已更新為「待出貨」','ok');
      } else if(result==='不通過'){
        showToast('❌ 檢驗不通過，請處理不良品','err');
      } else {
        showToast('✅ 檢驗單 '+no+' 已建立','ok');
      }

    // ── 情況 B：手動新增（無 orderId）──
    } else {
      // 若勾選「料號入庫」且結果通過 → 更新庫存
      if(toStock && matSel && (result==='通過'||result==='條件通過')){
        const mat = mats.find(m=>m.id===matSel);
        if(mat){
          const inQty = qtyAct - qtyBad; // 實檢數量 - 不良數量 = 入庫數量
          const latest = await notionAPI('GET','pages/'+matSel);
          const curStock = latest.properties?.['目前庫存']?.number??mat.stock;
          const newStock = curStock + inQty;
          await updatePage(matSel, {'目前庫存':{number:newStock}});
          await logStockChange(matSel, mat.name, mat.code, '品管入庫', inQty, curStock, newStock, no, inspector||ROLE);
          showToast('✅ 檢驗單 '+no+' 已建立，庫存 +'+inQty,'ok');
        }
      } else {
        showToast('✅ 檢驗單 '+no+' 已建立','ok');
      }
    }

    await refreshAll();
  }catch(e){ showToast('❌ '+e.message,'err'); }
}

function renderInventory(){
  const low=mats.filter(m=>m.stock<=m.safe);
  const canEdit=ROLE==='warehouse'||ROLE==='manager';

  // ── 讀取篩選狀態（用物件保存，不依賴 DOM）
  const INV = window._invState = window._invState||{
    q:'', type:'all', stockMin:'', stockMax:'', page:1, pageSize:100
  };

  // ── 套用篩選
  let data = applySort('inventory', mats);
  if(INV.q){
    const q=INV.q.toLowerCase();
    data=data.filter(m=>m.name.toLowerCase().includes(q)||m.code.toLowerCase().includes(q));
  }
  if(INV.type!=='all') data=data.filter(m=>m.type===INV.type);
  if(INV.stockMin!=='') data=data.filter(m=>m.stock>=Number(INV.stockMin));
  if(INV.stockMax!=='') data=data.filter(m=>m.stock<=Number(INV.stockMax));

  const total=data.length;
  const ps=INV.pageSize;
  const maxPage=Math.max(1,Math.ceil(total/ps));
  if(INV.page>maxPage) INV.page=maxPage;
  const pageData=data.slice((INV.page-1)*ps, INV.page*ps);

  // ── 分頁按鈕
  function pageBtns(){
    if(maxPage<=1) return '';
    const btns=[];
    const p=INV.page;
    btns.push(`<button class="btn btn-ghost btn-xs" ${p<=1?'disabled':''} onclick="_invGo(${p-1})">‹</button>`);
    // 顯示頁碼：最多7個

// 入料單：手動輸入料件名稱時，即時檢查是否已建檔
// ═══════════════════════════════════════════════
function checkDupMat(val){
  const warn = document.getElementById('dup_mat_warn');
  if(!warn) return;
  const q = val.trim().toLowerCase();
  if(!q){ warn.style.display='none'; return; }

  // 比對料件主檔（大小寫不敏感 + 去空白後比對）
  const qNorm = q.replace(/\s+/g,''); // 去除所有空白後比對
  const exact = mats.find(m=> {
    const nNorm = m.name.toLowerCase().replace(/\s+/g,'');
    const cNorm = (m.code||'').toLowerCase().replace(/\s+/g,'');
    return nNorm===qNorm || (cNorm && cNorm===qNorm);
  });
  const similar = mats.filter(m=>{
    const nNorm = m.name.toLowerCase().replace(/\s+/g,'');
    const cNorm = (m.code||'').toLowerCase().replace(/\s+/g,'');
    return !exact && (nNorm.includes(qNorm) || qNorm.includes(nNorm.slice(0,6)) ||
           (cNorm && (cNorm.includes(qNorm) || qNorm.includes(cNorm))));
  }).slice(0,3);

  if(exact){
    // 完全相同 → 強烈提示切換到選擇模式
    warn.style.display='';
    warn.innerHTML=`
      <div style="font-weight:700;margin-bottom:4px">⚠ 此料件已建檔</div>
      <div style="margin-bottom:6px">
        <span style="font-family:monospace;color:var(--text)">${exact.name}</span>
        ${exact.code?`<span style="color:var(--text3);margin-left:6px">(${exact.code})</span>`:''}
        <span class="pill" style="background:rgba(16,185,129,.12);color:var(--green2);margin-left:6px">${exact.type}</span>
        <span style="color:var(--text2);margin-left:6px">庫存：<b>${exact.stock}</b></span>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:6px">請改用「從料件主檔選擇」避免重複建立，造成統計錯誤。</div>
      <button class="btn btn-amber btn-xs" onclick="ibSwitchToExistAndSelect('${exact.id}')"
        style="background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)">
        → 切換並選擇此料件
      </button>`;
    warn.style.borderColor='rgba(239,68,68,.4)';
    warn.style.background='rgba(239,68,68,.07)';
    warn.style.color='var(--red2)';
    warn.querySelector('div').style.color='var(--red2)';
  } else if(similar.length){
    // 相似 → 提示可能重複
    warn.style.display='';
    warn.style.borderColor='rgba(245,158,11,.3)';
    warn.style.background='rgba(245,158,11,.07)';
    warn.style.color='var(--amber)';
    warn.innerHTML=`
      <div style="font-weight:700;margin-bottom:5px">💡 找到相似料件，請確認是否已建檔</div>
      ${similar.map(m=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(245,158,11,.15)">
          <span>
            <span style="font-family:monospace;font-size:12px;color:var(--text)">${m.name}</span>
            ${m.code?`<span style="color:var(--text3);font-size:10px;margin-left:5px">${m.code}</span>`:''}
            <span style="font-size:10px;color:var(--text3);margin-left:5px">庫存 ${m.stock}</span>
          </span>
          <button class="btn btn-ghost btn-xs" onclick="ibSwitchToExistAndSelect('${m.id}')" style="flex-shrink:0;margin-left:8px">使用此料件</button>
        </div>`).join('')}
      <div style="font-size:10px;color:var(--text3);margin-top:5px">確認是全新料件才繼續手動輸入</div>`;
  } else {
    warn.style.display='none';
  }
}

// ── 庫存篩選輔助函數（不重渲染整個 tab）
function _invFilter(key, val){
  if(!window._invState) return;
  window._invState[key] = val;
  if(key!=='page') window._invState.page = 1; // 篩選改變時回第一頁
  // 更新表格內容而不重建整個頁面（保持搜尋框焦點）
  _invRender();
}
function _invGo(page){
  if(!window._invState) return;
  window._invState.page = page;
  _invRender();
  document.getElementById('mainContent')?.scrollTo?.(0,0);
}
function _invReset(){
  window._invState = {q:'',type:'all',stockMin:'',stockMax:'',page:1,pageSize:window._invState?.pageSize||100};
  _invRender();
}
function _invRender(){
  // 保存搜尋框焦點和游標位置
  const qEl=document.getElementById('inv_q');
  const qFocus=document.activeElement===qEl;
  const qCursor=qEl?qEl.selectionStart:-1;

  const c=document.getElementById('mainContent');
  if(c) c.innerHTML=renderInventory();

  // 恢復焦點
  if(qFocus){
    const newQ=document.getElementById('inv_q');
    if(newQ){newQ.focus();try{newQ.setSelectionRange(qCursor,qCursor);}catch(e){}}
  }
}

async function loadQCInspections(){

      get orderId(){ const r=this.orderRefRaw; return r.includes('|')?r.split('|')[0]:''; },
      matName:  p.properties?.['品項名稱']?.rich_text?.[0]?.plain_text||
                p.properties?.['料件名稱']?.rich_text?.[0]?.plain_text||'',
      matCode:  p.properties?.['料件編號']?.rich_text?.[0]?.plain_text||'',

      qtyBad:   p.properties?.['不良數量']?.number??0,
      result:   p.properties?.['檢驗結果']?.select?.name||'待檢驗',
      date:     p.properties?.['檢驗日期']?.date?.start||'',
      inspector:p.properties?.['檢驗人員']?.rich_text?.[0]?.plain_text||'',
      badReason:p.properties?.['不良原因']?.select?.name||'',
      handling: p.properties?.['處理方式']?.select?.name||'',
      toStock:  p.properties?.['料號入庫']?.checkbox||false,
      note:     p.properties?.['備註']?.rich_text?.[0]?.plain_text||'',

}


// ── 檢驗結果：通過 / 不通過 ──
async function doInspResult(insId, orderRef, result){
  // orderRef 格式：「orderId|orderNo」或純訂單號
  // 解析
  let orderId = '', orderNo = '';
  if(orderRef && orderRef.includes('|')){
    [orderId, orderNo] = orderRef.split('|');
  } else {
    orderNo = orderRef||'';
    // 嘗試從本地 orders 找
    const found = orders.find(o=>o.no===(orderNo||'').trim());
    if(found) orderId = found.id;
  }

  // 確認不通過原因
  let badDesc = '';
  if(result === '不通過'){
    badDesc = prompt('請填入不通過原因（必填）：')||'';
    if(!badDesc){ showToast('請填入不通過原因','warn'); return; }
  }

  showToast('更新中...','warn');

  try{
    // 1. 更新檢驗單結果
    const props = { '檢驗結果':{select:{name:result}} };
    if(badDesc) props['不良描述']={rich_text:[{text:{content:badDesc}}]};
    await updatePage(insId, props);

    // 2. 若有關聯訂單 → 更新訂單狀態（不動庫存）
    if(orderId){
      const newStatus = result==='通過' ? '待出貨' : '待檢驗';
      await updatePage(orderId, {'狀態':{select:{name:newStatus}}});
      const o = orders.find(x=>x.id===orderId);
      if(o){ o.status = newStatus; }
    } else if(orderNo){
      // 找不到 ID 時用訂單號比對
      const o = orders.find(x=>(x.no||'').trim()===(orderNo||'').trim());
      if(o){
        const newStatus = result==='通過' ? '待出貨' : '待檢驗';
        await updatePage(o.id, {'狀態':{select:{name:newStatus}}});
        o.status = newStatus;
      }
    }

    // 3. 重新載入並刷新
    await loadQCInspections();
    await refreshAll();

    showToast(result==='通過'
      ? '✅ 檢驗通過'+(orderId||orderNo?' — 訂單已更新為「待出貨」':'')
      : '❌ 檢驗不通過，訂單維持待檢驗狀態'
    , result==='通過'?'ok':'warn');

  }catch(e){ showToast('❌ '+e.message,'err'); }
}

}

function renderQCTab(){

    const pendingTable = pendingInspOrders.length?`

        <span style="font-size:11px;color:var(--text3)">開立檢驗單後自動消失</span>
      </div>
      <div class="table-wrap"><table>
        <tr><th>訂單號</th><th>客戶</th><th>品項</th><th>數量</th><th>交期</th><th>操作</th></tr>
        ${pendingInspOrders.map(o=>{
          const prod=mats.find(m=>m.id===o.productId);
          const pname=(prod?.name||'').replace(/'/g,"\'");
          const pcode=prod?.code?'<div style="font-size:10px;color:var(--text3)">'+prod.code+'</div>':'';
          return '<tr>'
            +'<td style="font-family:monospace;font-weight:700;color:var(--cyan2)">'+o.no+'</td>'
            +'<td style="font-size:12px">'+(o.customer||'—')+'</td>'
            +'<td style="font-size:12px;font-weight:600">'+(prod?.name||'—')+pcode+'</td>'
            +'<td style="font-family:monospace">'+o.qty+'</td>'
            +'<td style="font-family:monospace;font-size:11px;color:var(--text2)">'+(o.deadline||'—')+'</td>'

        }).join('')}

    const addBtn = canQC?`<div style="display:flex;justify-content:flex-end;margin-bottom:10px">

    return tabs + pendingTable + addBtn
      +`<div class="panel"><div class="panel-hdr"><span class="panel-title">品管檢驗單 <span class="badge">${inspections.length}</span></span></div>

        ${insRows}
      </table></div>`}
      </div>`;
  }

  if(QC_SUB==='pending'){
    if(!pending.length)return tabs+`<div class="panel"><div style="padding:28px;text-align:center;color:var(--text3)">目前沒有待品檢項目 ✅</div></div>`;
    return tabs+`<div class="panel"><div class="panel-hdr"><span class="panel-title">待品檢</span></div><div class="table-wrap"><table>
    <tr>${TH('qcp','no','入料單號')}<th>料件</th>${TH('qcp','qty','數量','num')}${TH('qcp','date','日期','str','hide-m')}<th>操作</th></tr>
    ${applySort('qcp',pending).map(i=>{const mat=mats.find(m=>m.id===i.matId);return`<tr>
      <td style="font-family:monospace;color:var(--text);font-size:11px">${i.no}</td>
      <td style="font-size:11px">${mat?.name||'—'}</td>

      <td class="hide-m" style="font-family:monospace;font-size:11px">${i.date||'—'}</td>
      <td>${canQC?`<div style="display:flex;gap:4px;flex-wrap:wrap"><button class="btn btn-green btn-sm" onclick="approveQC('${i.id}','${i.matId}',${i.qty})">✓ 通過</button><button class="btn btn-red btn-sm" onclick="rejectQC('${i.id}')">✗ 退回</button><button class="btn btn-cyan btn-sm" onclick="syncInboundStock('${i.id}','${i.matId}',${i.qty})" title="若已在Notion改過品管狀態，點此同步庫存">🔄 同步庫存</button><a href="https://www.notion.so/${i.id.replace(/-/g,'')}" target="_blank" class="btn btn-ghost btn-sm">📷</a></div>`:'—'}</td>
    </tr>`;}).join('')}
    </table></div></div>`;
  }
  const filterBar=`<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center"><span style="font-size:11px;color:var(--text2)">篩選：</span>${['all','pass','fail'].map(f=>{const lb={all:'全部',pass:'✅通過',fail:'❌不合格'};const a=QC_FILTER===f;return`<button onclick="QC_FILTER='${f}';renderTab('qc')" style="padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid ${a?'var(--blue)':'var(--border)'};background:${a?'rgba(77,142,245,.12)':'var(--bg3)'};color:${a?'var(--blue)':'var(--text2)'}">${lb[f]}</button>`;}).join('')}</div>`;

  const byM={};filtered.forEach(i=>{const m=i.date?i.date.slice(0,7):'無日期';if(!byM[m])byM[m]=[];byM[m].push(i);});
  return tabs+filterBar+Object.keys(byM).sort().reverse().map(month=>{
    const rows=applySort('qch',byM[month]);const pc=rows.filter(i=>i.qcStatus==='品檢通過').length,fc=rows.filter(i=>i.qcStatus==='品檢不合格').length;

    <div><div class="table-wrap"><table><tr>${TH('qch','no','入料單號')}<th>料件</th>${TH('qch','qty','數量','num')}${TH('qch','date','日期','str','hide-m')}<th>結果</th><th>📷</th></tr>
    ${rows.map(i=>{const mat=mats.find(m=>m.id===i.matId);const ip=i.qcStatus==='品檢通過';return`<tr><td style="font-family:monospace;color:var(--text);font-size:11px">${i.no}</td><td style="font-size:11px">${mat?.name||'—'}</td><td style="font-family:monospace">${i.qty}</td><td class="hide-m" style="font-family:monospace;font-size:11px">${i.date||'—'}</td><td><span class="pill" style="background:${ip?'rgba(46,196,138,.12)':'rgba(245,101,101,.12)'};color:${ip?'var(--green)':'var(--red)'}">${i.qcStatus}</span></td><td><a href="https://www.notion.so/${i.id.replace(/-/g,'')}" target="_blank" style="color:var(--blue);font-size:11px">📷</a></td></tr>`;}).join('')}
    </table></div></div></div>`;
  }).join('');
}

// ── 刪除訂單（跳確認框，Notion archive 同步刪除）
async function deleteOrder(oid, no){
  if(!confirm('⚠️ 確認刪除訂單「'+no+'」？\n\n此操作將從 Notion 永久刪除，無法復原。')) return;
  showToast('刪除中...','warn');
  try{
    // ★ 先從本地移除（立即生效，不等 Notion）
    orders = orders.filter(o=>o.id!==oid);
    renderTab(CURRENT_TAB);

    // ★ 同步到 Notion：先 archive，確認後不再出現在 query 結果
    const r = await notionAPI('PATCH','pages/'+oid,{archived:true});
    if(r.object==='error') throw new Error(r.message);

    showToast('✅ 訂單「'+no+'」已刪除','ok');

    // ★ 延遲 2 秒再 refreshAll，讓 Notion 有時間處理
    // 且 refresh 時跳過已知刪除的 ID，避免 race condition
    setTimeout(async ()=>{
      try{
        const [mR,bR,oR,masterR,annR,leaveR]=await Promise.all([
          dbQueryAll(DB.materials), dbQueryAll(DB.bom),
          dbQueryAll(DB.orders), dbQueryAll(DB.custMaster),
          dbQueryAll(DB.announce), dbQueryAll(DB.leave),
        ]);
        // 解析訂單時排除剛刪除的 ID
        orders=oR.filter(p=>p.id!==oid).map(p=>({
          id:p.id, no:getTitle(p.properties,'訂單號'),
          customer:p.properties?.['客戶名稱']?.select?.name||'',
          productId:p.properties?.['成品']?.relation?.[0]?.id||'',
          qty:p.properties?.['訂購數量']?.number??0,
          deadline:p.properties?.['交期']?.date?.start||'',
          status:p.properties?.['狀態']?.select?.name||'',
          note:p.properties?.['業務備註']?.rich_text?.[0]?.plain_text||'',
          created:p.created_time?.slice(0,10)||'',
        }));
        renderTab(CURRENT_TAB);
      }catch(e){ console.warn('bg refresh after delete:',e); }
    }, 2000);

  }catch(e){ showToast('❌ 刪除失敗：'+e.message,'err'); }
}

async function doPick(orderId){
  const o=orders.find(x=>x.id===orderId);
  const prod=mats.find(m=>m.id===o.productId);
  const items=explodeBOM(o.productId,o.qty);
  const hasBOM = items.length > 0;
  const ds=new Date().toISOString().slice(0,10);
  const no=`PK-${ds.slice(2).replace(/-/g,'')}-${Math.floor(Math.random()*900+100)}`;
  closeModal();
  showToast('建立領料單中...','warn');
  try{
    // 1. 建立領料主單
    const master=await createPage(DB.pickMaster,{
      '領料主單號':{title:[{text:{content:no}}]},
      '對應訂單':{relation:[{id:orderId}]},
      '成品品號':{rich_text:[{text:{content:prod?.name||''}}]},
      '生產數量':{number:o.qty},
      '狀態':{select:{name:'已確認扣料'}},
      '領料日期':{date:{start:ds}}
    });
    if(master.object==='error') throw new Error('領料主單建立失敗：'+master.message);

    let stockErrors=[];

    if(hasBOM){
      // ══ 有 BOM：展開子件逐項扣庫存 ══
      for(const item of items){
        try{
          await createPage(DB.pickDetail,{
            '料件名稱':{title:[{text:{content:item.name}}]},
            '領料主單':{relation:[{id:master.id}]},
            '料件':{relation:[{id:item.id}]},
            '類型':{select:{name:item.type}},
            '需求數量':{number:item.needed},
            '實領數量':{number:item.type==='半成品'?item.needed:Math.min(item.needed,item.stock)},
            '狀態':{select:{name:item.type==='半成品'?'半成品':item.stock>=item.needed?'足夠':'缺料'}}
          });
          // 只有零件才扣，半成品不扣（半成品本身的零件已在 BOM 展開時計算）
          if(item.type!=='半成品'){
            const latestMat=await notionAPI('GET','pages/'+item.id);
            const latestStock=latestMat?.properties?.['目前庫存']?.number??item.stock;
            const newStock=Math.max(0,latestStock-item.needed);
            await updatePage(item.id,{'目前庫存':{number:newStock}});
            await logStockChange(item.id,item.name,item.code||'','領料',-item.needed,latestStock,newStock,no,ROLE);
          }
        }catch(itemErr){
          stockErrors.push(item.name+': '+itemErr.message);
          console.error('領料明細錯誤',item.name,itemErr);
        }
      }
    } else {
      // ══ 無 BOM：直接扣成品本身庫存 ══
      if(!prod){
        stockErrors.push('訂單未關聯成品料件，無法扣庫存');
      } else {
        try{
          // 建立一筆領料明細（成品本身）
          await createPage(DB.pickDetail,{
            '料件名稱':{title:[{text:{content:prod.name}}]},
            '領料主單':{relation:[{id:master.id}]},
            '料件':{relation:[{id:prod.id}]},
            '類型':{select:{name:prod.type||'成品'}},
            '需求數量':{number:o.qty},
            '實領數量':{number:o.qty},
            '狀態':{select:{name:'足夠'}}
          });
          // 從 Notion 讀最新庫存再扣
          const latestProd=await notionAPI('GET','pages/'+prod.id);
          const latestStock=latestProd?.properties?.['目前庫存']?.number??prod.stock;
          const newStock=Math.max(0,latestStock-o.qty);
          await updatePage(prod.id,{'目前庫存':{number:newStock}});
          await logStockChange(prod.id,prod.name,prod.code||'','領料',-o.qty,latestStock,newStock,no,ROLE);
        }catch(prodErr){
          stockErrors.push(prod.name+': '+prodErr.message);
          console.error('成品直接扣料錯誤',prodErr);
        }
      }
    }

    // 3. 更新訂單狀態為「生產中」
    await updatePage(orderId,{'狀態':{select:{name:'生產中'}}});

    // 4. 重新整理資料
    await refreshAll();
    await loadPicks();

    const modeNote = hasBOM ? `（BOM展開 ${items.length} 項子件）` : '（直接扣成品庫存）';
    if(stockErrors.length){
      showToast(`⚠ 領料單 ${no} 建立，部分失敗：${stockErrors.join('、')}`,'warn');
    }else{
      showToast(`✅ 領料單 ${no} 建立完成 ${modeNote}`,'ok');
    }
  }catch(e){
    showToast('❌ 領料失敗：'+e.message,'err');
    console.error('doPick error:',e);
  }
}

async function syncInboundStock(id, matId, qty){
  if(!matId){ showToast('此入料單未關聯料件，無法同步庫存','warn'); return; }
  // 先確認入料單目前狀態
  const inbound = inbounds.find(i=>i.id===id);
  if(!inbound){ showToast('找不到此入料單','warn'); return; }

  if(inbound.qcStatus!=='品檢通過'){
    showToast('⚠ 品管狀態尚未通過，無法同步庫存','warn'); return;
  }

  const mat = mats.find(m=>m.id===matId);
  if(!mat){ showToast('找不到對應料件','warn'); return; }

  const newStock = (mat.stock||0) + parseInt(qty);
  if(!confirm(`確認同步庫存？
料件：${mat.name}
目前庫存：${mat.stock}
入料數量：${qty}
同步後：${newStock}`)) return;

  showToast('同步中...','warn');
  try{
    await updatePage(matId, {'目前庫存':{number: newStock}});
    // 確保入庫狀態也是已入庫
    await updatePage(id, {'入庫狀態':{select:{name:'已入庫'}}});
    await refreshAll();
    showToast(`✅ ${mat.name} 庫存已同步：${mat.stock} → ${newStock}`,'ok');
  }catch(e){ showToast('❌ 同步失敗：'+e.message,'err'); }
}

// ══ 庫存異動記錄（每次入料/領料/手動調整都呼叫）══
async function logStockChange(matId, matName, matCode, changeType, qty, beforeStock, afterStock, refNo, operator){
  // ★ 非同步加入佇列，不阻塞主流程
  _logQueue.push({matId,matName,matCode,changeType,qty,beforeStock,afterStock,refNo,operator,
    operator2:operator||ROLE||''});
  if(!_logFlushing) _flushLogQueue();
}

// 佇列逐一寫入（避免同時大量 API 請求）
const _logQueue = [];
let _logFlushing = false;
async function _flushLogQueue(){
  if(_logFlushing||!_logQueue.length) return;
  _logFlushing=true;
  while(_logQueue.length){
    const item=_logQueue.shift();
    try{
      const today=new Date().toISOString().slice(0,10);
      await notionAPI('POST','pages',{parent:{database_id:DB.stockLog},properties:{
        '異動項目':{title:[{text:{content:today+' '+item.changeType+' '+item.matName}}]},
        '料件名稱':{rich_text:[{text:{content:item.matName||''}}]},
        '料件編號':{rich_text:[{text:{content:item.matCode||''}}]},
        '異動類型':{select:{name:item.changeType}},
        '異動數量':{number:Math.abs(item.qty)},
        '異動前庫存':{number:item.beforeStock},
        '異動後庫存':{number:item.afterStock},
        '異動日期':{date:{start:today}},
        '關聯單號':{rich_text:[{text:{content:item.refNo||''}}]},
        '操作人員':{rich_text:[{text:{content:item.operator2||''}}]},
      }});
    }catch(e){ console.warn('庫存異動記錄失敗：',e.message); }
  }
  _logFlushing=false;
}

async function approveQC(id,matId,qty){
  if(!confirm('確認品檢通過？將增加 '+qty+' 個庫存'))return;
  // ★ 驗證 matId
  if(!matId){
    showToast('❌ 入料單未關聯料件，無法自動加庫存。品管狀態仍會更新。','err');
    try{await updatePage(id,{'品管狀態':{select:{name:'品檢通過'}},'入庫狀態':{select:{name:'已入庫'}}});}catch(e2){}
    await refreshAll();await loadInbounds();renderTab(CURRENT_TAB);
    return;
  }
  try{
    // 1. 更新品管狀態
    await updatePage(id,{'品管狀態':{select:{name:'品檢通過'}},'入庫狀態':{select:{name:'已入庫'}}});
    // 2. 重新從 Notion 讀最新庫存（不用快取，避免算錯）
    const matData=await notionAPI('GET','pages/'+matId);
    const curStock=matData?.properties?.['目前庫存']?.number??0;
    const newStock=curStock+parseInt(qty);
    // 3. 更新庫存
    await updatePage(matId,{'目前庫存':{number:newStock}});
    // ★ 寫入庫存異動記錄
    const mat2=mats.find(m=>m.id===matId);
    await logStockChange(matId,mat2?.name||matId,mat2?.code||'','入料',parseInt(qty),curStock,newStock,id,ROLE);
    // 4. 重整
    await refreshAll();await loadInbounds();renderTab(CURRENT_TAB);
    const mat=mats.find(m=>m.id===matId);
    showToast('✅ 品檢通過！'+(mat?.name||'料件')+' 庫存 '+curStock+' → '+newStock,'ok');
  }catch(e){
    showToast('❌ 品管通過失敗：'+e.message,'err');
    console.error('approveQC error:',e);
  }
}

}

         customers.find(c=>c.code&&c.code.toLowerCase().startsWith(q))||
         (q.length>=4?customers.find(c=>c.code&&c.code.toLowerCase().includes(q)):null)||null;

async function selectAndLoadPI(pageId,title,idx){
  document.querySelectorAll('.pi-item').forEach(e=>e.classList.remove('selected'));
  const el=document.getElementById('pii_'+idx);if(el)el.classList.add('selected');
  const setStatus=msg=>{const d=el?.querySelector('.pi-status');if(d)d.textContent=msg;};
  setStatus('⏳ 讀取中...');
  try{
    const blocks=await getBlockChildren(pageId);const all=blocks.results||[];
    let fileUrl='',pdfUrl='';
    for(const b of all){
      if(b.type!=='file')continue;
      const fd=b.file||{};const name=(fd.name||'').toLowerCase();const url=fd.file?.url||fd.external?.url||'';if(!url)continue;
      if((name.endsWith('.xlsx')||name.endsWith('.xls'))&&!fileUrl)fileUrl=url;
      if(name.endsWith('.pdf')&&!pdfUrl)pdfUrl=url;
    }
    if(!fileUrl){
      for(const b of all){if(b.type!=='child_page')continue;const t=(b.child_page?.title||'').toLowerCase();if(t.endsWith('.xlsx')||t.endsWith('.xls')){try{const bd=await getBlock(b.id);const bfd=bd[bd.type]||{};const u=bfd.file?.url||bfd.external?.url||'';if(u){fileUrl=u;break;}}catch{}}}
    }
    if(!fileUrl&&pdfUrl){
      setStatus('📄 只有 PDF');const el2=document.getElementById('piInfo');
      if(el2)el2.innerHTML=`<span style="color:var(--yellow)">⚠ 只有 PDF 附件，無法自動解析。<a href="${pdfUrl}" target="_blank" style="color:var(--blue)">開啟 PDF</a>，請手動填入。</span>`;
      showToast('只有 PDF，請手動填入','warn');return;
    }
    if(!fileUrl){setStatus('❌ 找不到 Excel');showToast('找不到 Excel，請直接上傳','warn');return;}
    setStatus('⏳ 下載中...');
    const buf=await downloadViaProxy(fileUrl);
    const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:null});
    const orderNo=title.replace(/\s*\(.*?\)\s*/g,'').trim();
    const items=parsePIRows(rows,orderNo);
    setStatus(`✅ 讀取 ${items.length} 個品項`);
    showToast(`✅ PI「${title}」讀取成功`,'ok');
  }catch(e){setStatus(`❌ ${e.message.slice(0,40)}`);showToast('讀取失敗，請直接上傳','err');}

// 批次建立 — 完全修正版，不用 inline JSON
// ═══════════════════════════════════════════════
async function submitMultiOrders(){
  const cust=document.getElementById('m_cust')?.value;
  const date=document.getElementById('m_date')?.value;
  if(!cust){alert('請選擇客戶');return;}
  if(!date){alert('請填入交期');return;}

  // 從 data attribute 還原品項資料（避免 onclick 引號問題）
  const div=document.getElementById('piMultiList');
  if(!div||!div.dataset.items){alert('品項資料遺失，請重新讀取 PI');return;}
  let items;
  try{items=JSON.parse(decodeURIComponent(atob(div.dataset.items)));}
  catch(e){alert('品項資料解析失敗：'+e.message);return;}
  const piNo=div.dataset.pino||'';

  const selected=[];
  for(let i=0;i<items.length;i++){
    const chk=document.getElementById('chk_'+i);const qtyEl=document.getElementById('qty_'+i);
    if(chk?.checked&&qtyEl)selected.push({model:items[i].model,qty:parseInt(qtyEl.value)||items[i].qty});
  }
  if(!selected.length){alert('請至少勾選一個品項');return;}

  // 顯示進度（不 closeModal）
  const batchBtn=document.getElementById('batchBtn');
  if(batchBtn){batchBtn.disabled=true;batchBtn.textContent='建立中，請勿關閉...';}
  div.insertAdjacentHTML('afterend',`<div id="batchProgress" style="background:var(--bg3);border-radius:8px;padding:10px;margin-top:8px;font-size:12px;color:var(--cyan)"><div class="spin" style="margin-right:6px"></div>正在建立 ${selected.length} 筆訂單...</div>`);

  const prefix=`ORD-${new Date().toISOString().slice(2,7).replace('-','')}`;
  let ok=0,fail=0,failList=[];

  for(let i=0;i<selected.length;i++){
    const item=selected[i];
    const prog=document.getElementById('batchProgress');
    if(prog)prog.innerHTML=`<div class="spin" style="margin-right:6px"></div>建立第 ${i+1}/${selected.length} 筆：${item.model}...`;
    try{
      let prodId='';
      const ex=mats.find(m=>m.name===item.model||m.code===item.model);
      if(ex){prodId=ex.id;}
      else{
        const nm=await createPage(DB.materials,{'料件名稱':{title:[{text:{content:item.model}}]},'類型':{select:{name:'成品'}},'目前庫存':{number:1000},'安全庫存':{number:0}});
        prodId=nm.id;
      }
      const no=`${prefix}-${String(i+1).padStart(3,'0')}`;
      await createPage(DB.orders,{
        '訂單號':{title:[{text:{content:no}}]},
        '客戶名稱':{select:{name:cust}},
        '成品':{relation:[{id:prodId}]},
        '訂購數量':{number:item.qty},
        '交期':{date:{start:date}},
        '狀態':{select:{name:'待排程'}},
        '訂單類型':{select:{name:orderType}},
        '業務備註':{rich_text:[{text:{content:note||(piNo?'PI: '+piNo:'')}}]},
        ...(piNo?{'PI單號':{rich_text:[{text:{content:piNo}}]}}:{}),
        ...(shipMethod?{'出貨方式':{select:{name:shipMethod}}}:{}),
        ...(packageType?{'包裝方式':{select:{name:packageType}}}:{}),
        ...(deliverAddr?{'送貨地':{rich_text:[{text:{content:deliverAddr}}]}}:{}),
      });
      ok++;
    }catch(e){fail++;failList.push(item.model);console.error(item.model,e);}
  }

  await refreshAll();

  const prog=document.getElementById('batchProgress');
  if(prog)prog.innerHTML=`<span style="color:${ok===selected.length?'var(--green)':'var(--yellow)'}">
    ✅ 成功 ${ok} 筆${fail?`，失敗 ${fail} 筆（${failList.join('、')}）`:''}
  </span>
  <br><button class="btn btn-ghost btn-sm" onclick="closeModal()" style="margin-top:8px">關閉</button>`;

  showToast(`${ok===selected.length?'✅':'⚠'} 建立 ${ok}/${selected.length} 筆訂單`,ok===selected.length?'ok':'warn');
}

function parsePIFile(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});parsePIRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:null}),file.name.replace(/\.xlsx?$/i,''));}catch(err){const el=document.getElementById('piInfo');if(el)el.textContent='❌ 解析失敗：'+err.message;}};
  r.readAsArrayBuffer(file);
}

function openStatusModal(id, cur){
  const statuses=['待排程','生產中','待檢驗','待品檢','待出貨','已完成','取消'];
  document.getElementById('modalInner').innerHTML=`<h3>📋 更新訂單狀態</h3>
  <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
    ${statuses.map(s=>`<button class="btn ${s===cur?'btn-blue':'btn-ghost'}"
      onclick="doUpdateStatus('${id}','${s}')"
      style="justify-content:flex-start;font-size:13px">${pill(s)}&nbsp;&nbsp;${s}</button>`).join('')}
  </div>
  <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button></div>`;
  openModal();
}
async function doUpdateStatus(id, s){
  closeModal();
  const o=orders.find(x=>x.id===id);
  if(o){o.status=s;renderTab(CURRENT_TAB);}
  showToast('更新狀態中...','warn');
  try{
    await updatePage(id,{'狀態':{select:{name:s}}});
    showToast('✅ 狀態→「'+s+'」','ok');
    setTimeout(()=>refreshAll().catch(()=>{}),1000);
  }catch(e){
    if(o) renderTab(CURRENT_TAB);
    showToast('❌ 更新失敗：'+e.message,'err');
  }
}

function openEditStock(id, name, cur){
  document.getElementById('modalInner').innerHTML=`<h3>✏️ 修改庫存 — ${name}</h3>
  <div style="font-size:13px;color:var(--text2);margin-bottom:10px">目前：<b style="color:var(--text);font-size:20px">${cur}</b> 個</div>

  </div>`;

async function doEditStock(id, name, oldStock){
  const newVal=parseInt(document.getElementById('newStock').value);
  if(isNaN(newVal)||newVal<0){showToast('請輸入有效數字','warn');return;}
  closeModal();showToast('更新庫存中...','warn');
  try{
    await updatePage(id,{'目前庫存':{number:newVal}});
    await logStockChange(id,name,'','手動調整',newVal-oldStock,oldStock,newVal,'手動',ROLE);
    await refreshAll();
    showToast(`✅ ${name} 庫存 ${oldStock} → ${newVal}`,'ok');
  }catch(e){showToast('❌ 失敗：'+e.message,'err');}
}

}

function parsePIRows(rows, piNo){
  const items=[];
  for(const row of rows){
    if(!row)continue;
    const cells=row.filter(c=>c!=null).map(c=>String(c).trim());
    const modelCell=cells.find(c=>/^[A-Z]{2,}[-_]/.test(c)||/^LE-|^Z-|^SKC|^DAR|^ZN/.test(c));
    if(!modelCell)continue;
    const qtyCell=cells.find(c=>/^\d+$/.test(c)&&parseInt(c)>0&&c!==modelCell);
    const qty=qtyCell?parseInt(qtyCell):1;
    const desc=cells.filter(c=>c!==modelCell&&c!==qtyCell).join(' ').substring(0,50);
    items.push({model:modelCell,qty,desc,piNo});
  }
  if(items.length){
    _items=[...items];
    renderItems();
    const piInfo=document.getElementById('piMsg');
    if(piInfo)piInfo.innerHTML=`<span style="color:var(--green)">✅ 讀取 ${items.length} 個品項</span>`;
    showMultiItems(items, piNo);
  }
  return items;
}

// ══ Toast 提示（右下角）══
function showToast(msg, type='ok'){
  let el = document.getElementById('_toast');
  if(!el){
    el = document.createElement('div');
    el.id='_toast';
    el.style.cssText='position:fixed;bottom:20px;right:20px;z-index:9999;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;max-width:300px;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4)';
    document.body.appendChild(el);
  }
  const colors = {
    ok:   {bg:'rgba(16,185,129,.15)',border:'rgba(16,185,129,.4)',text:'var(--green)'},
    warn: {bg:'rgba(245,158,11,.12)',border:'rgba(245,158,11,.35)',text:'var(--yellow)'},
    err:  {bg:'rgba(239,68,68,.12)', border:'rgba(239,68,68,.35)', text:'var(--red)'},
  };
  const c = colors[type]||colors.ok;
  el.style.background=c.bg;
  el.style.border='1px solid '+c.border;
  el.style.color=c.text;
  el.textContent=msg;
  el.style.opacity='1';
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.style.opacity='0';},3000);
}

// ══ 線上人數（同一瀏覽器多分頁偵測）══
const ONLINE_KEY='lm_online';
const ONLINE_TTL=15000;
let _onlineChannel=null;
let _onlineTimer=null;
const _myTabId='tab_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);

function initOnlineTracking(){
  try{
    // BroadcastChannel 偵測同一瀏覽器的其他 tab
    _onlineChannel=new BroadcastChannel('lematec_online');
    _onlineChannel.onmessage=e=>{
      if(e.data?.type==='ping'||e.data?.type==='pong'){
        _updateOnlineUI();
      }
    };
    // 每12秒發心跳
    function heartbeat(){
      try{
        // 存入 localStorage
        const now=Date.now();
        const tabs=JSON.parse(localStorage.getItem(ONLINE_KEY)||'{}');
        tabs[_myTabId]=now;
        // 清除過期
        Object.keys(tabs).forEach(k=>{ if(now-tabs[k]>ONLINE_TTL) delete tabs[k]; });
        localStorage.setItem(ONLINE_KEY,JSON.stringify(tabs));
        _onlineChannel.postMessage({type:'ping',id:_myTabId});
        _updateOnlineUI();
      }catch(e){}
    }
    heartbeat();
    _onlineTimer=setInterval(heartbeat,12000);
    window.addEventListener('beforeunload',()=>{
      try{
        const tabs=JSON.parse(localStorage.getItem(ONLINE_KEY)||'{}');
        delete tabs[_myTabId];
        localStorage.setItem(ONLINE_KEY,JSON.stringify(tabs));
      }catch(e){}
    });
  }catch(e){
    console.log('Online tracking not supported');
  }
}

function _updateOnlineUI(){
  try{
    const now=Date.now();
    const tabs=JSON.parse(localStorage.getItem(ONLINE_KEY)||'{}');
    const count=Object.values(tabs).filter(t=>now-t<ONLINE_TTL).length;
    const el=document.getElementById('onlineCount');
    const numEl=document.getElementById('onlineNum');
    if(el){
      if(count>1){el.style.display='inline-flex';if(numEl)numEl.textContent=count;}
      else{el.style.display='none';}
    }
  }catch(e){}
}
