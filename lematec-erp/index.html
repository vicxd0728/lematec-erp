<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

:root{
  --bg:#05080f;--bg2:#0a0f1e;--bg3:#0f1628;--bg4:#151d35;--bg5:#1c2640;
  --border:#1a2438;--border2:#243352;--border3:#2d4068;
  --brand:#9c1b2c;--brand2:#c5243e;
  --blue:#3b82f6;--blue2:#60a5fa;--cyan:#06b6d4;--cyan2:#22d3ee;
  --green:#10b981;--green2:#34d399;--yellow:#f59e0b;--amber:#fbbf24;
  --red:#ef4444;--red2:#f87171;--purple:#8b5cf6;
  --text:#f0f4ff;--text2:#94a3b8;--text3:#475569;--text4:#1e293b;
  --f-ui:'Outfit','Noto Sans TC',system-ui,sans-serif;
  --f-mono:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:15px;}
body{
  background:var(--bg);color:var(--text);font-family:var(--f-ui);
  font-size:1rem;line-height:1.55;min-height:100vh;
  background-image:
    radial-gradient(ellipse 100% 50% at 50% 0%,rgba(59,130,246,.08) 0%,transparent 60%),
    radial-gradient(ellipse 50% 30% at 0% 100%,rgba(6,182,212,.04) 0%,transparent 50%),
    radial-gradient(ellipse 40% 30% at 100% 50%,rgba(156,27,44,.04) 0%,transparent 50%);
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px;}

.inp{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text)!important;-webkit-text-fill-color:var(--text)!important;font-family:var(--f-ui);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.18);}
.inp::placeholder{color:var(--text3)!important;-webkit-text-fill-color:var(--text3)!important;}
select.inp>option{background:var(--bg3);color:var(--text);}
textarea.inp{resize:vertical;min-height:80px;line-height:1.6;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:8px;border:none;font-family:var(--f-ui);font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;touch-action:manipulation;-webkit-user-select:none;user-select:none;white-space:nowrap;letter-spacing:.2px;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;box-shadow:0 4px 16px rgba(156,27,44,.35);}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(59,130,246,.3);}
.btn-blue:hover{background:#2563eb;box-shadow:0 6px 22px rgba(59,130,246,.45);}
.btn-blue:disabled{background:var(--text3);box-shadow:none;}
.btn-green{background:rgba(16,185,129,.15);color:var(--green2);border:1px solid rgba(16,185,129,.3);}
.btn-red{background:rgba(239,68,68,.12);color:var(--red2);border:1px solid rgba(239,68,68,.25);}
.btn-yellow{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.25);}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:rgba(255,255,255,.09);color:var(--text);}
.btn-cyan{background:rgba(6,182,212,.12);color:var(--cyan2);border:1px solid rgba(6,182,212,.25);}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:7px;}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:6px;}
.btn-full{width:100%;justify-content:center;}

/* LOGIN */
.login-page{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:20px;z-index:999;}
.login-logo{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 0 40px rgba(59,130,246,.15);}
.login-logo img{width:56px;height:56px;object-fit:contain;}
.login-brand{font-family:var(--f-mono);font-size:26px;font-weight:500;letter-spacing:8px;color:var(--text);text-shadow:0 0 30px rgba(59,130,246,.4);}
.login-sub{font-size:11px;color:var(--text3);letter-spacing:4px;margin-top:-18px;}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.7);}
.login-card .label{display:block;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600;}
.pw-wrap{position:relative;}.pw-wrap .inp{padding-right:60px;}
.pw-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--bg5);border:1px solid var(--border2);border-radius:5px;color:var(--text3);font-size:10px;padding:3px 8px;cursor:pointer;}
.login-hint{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5;}
.login-hint a{color:var(--blue);text-decoration:none;}
.login-err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red2);border-radius:8px;padding:10px 14px;font-size:12px;margin-top:12px;display:none;}
.login-err.show{display:block;}

/* APP */
.app{display:none;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{height:54px;flex-shrink:0;background:rgba(5,8,15,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:12px;position:sticky;top:0;z-index:50;}
.topbar::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,var(--blue) 35%,var(--cyan) 65%,transparent 95%);opacity:.5;}
.topbar-logo{width:30px;height:30px;border-radius:50%;overflow:hidden;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.topbar-logo img{width:24px;height:24px;object-fit:contain;}
.topbar-brand{font-family:var(--f-mono);font-size:13px;font-weight:500;letter-spacing:4px;color:var(--text);}
.topbar-divider{color:var(--border3);font-size:12px;margin:0 2px;}
.topbar-sub{font-size:11px;color:var(--text3);letter-spacing:1px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 10px rgba(16,185,129,.5);flex-shrink:0;animation:pulse-dot 2.5s infinite;}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 8px rgba(16,185,129,.4);}50%{box-shadow:0 0 18px rgba(16,185,129,.7),0 0 28px rgba(16,185,129,.2);}}
.role-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px;}
.sync-time{font-size:10px;color:var(--text3);font-family:var(--f-mono);}

.nav-bar{flex-shrink:0;height:44px;background:rgba(5,8,15,.95);border-bottom:1px solid var(--border);display:flex;overflow-x:scroll;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none;padding:0 12px;}
.nav-bar::-webkit-scrollbar{display:none;}
.nav-btn{flex-shrink:0;padding:0 18px;height:44px;font-size:13px;font-weight:600;color:var(--text3);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .2s,border-color .2s;position:relative;letter-spacing:.2px;font-family:var(--f-ui);}
.nav-btn:hover{color:var(--text2);}
.nav-btn.active{color:var(--cyan2);border-bottom-color:var(--cyan2);}

.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px;}

/* DASHBOARD KPI */
.dash-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 22px;cursor:pointer;position:relative;overflow:hidden;transition:transform .2s,border-color .2s,box-shadow .2s;}
.kpi-card:hover{transform:translateY(-3px);}
.kpi-glow{position:absolute;width:140px;height:140px;border-radius:50%;top:-30px;right:-20px;opacity:.1;filter:blur(50px);pointer-events:none;}
.kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:14px;}
.kpi-num{font-family:var(--f-mono);font-size:44px;font-weight:500;line-height:1;margin-bottom:4px;letter-spacing:-2px;}
.kpi-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.kpi-bar{height:3px;border-radius:2px;background:var(--border);margin-top:14px;overflow:hidden;}
.kpi-bar-fill{height:100%;border-radius:2px;}
.kpi-blue{border-color:rgba(59,130,246,.2);}
.kpi-blue:hover{border-color:rgba(59,130,246,.4);box-shadow:0 8px 32px rgba(59,130,246,.12);}
.kpi-blue .kpi-glow{background:var(--blue);}
.kpi-blue .kpi-num{color:var(--blue2);}
.kpi-blue .kpi-bar-fill{background:linear-gradient(90deg,var(--blue),var(--cyan2));}
.kpi-green{border-color:rgba(16,185,129,.2);}
.kpi-green:hover{border-color:rgba(16,185,129,.4);box-shadow:0 8px 32px rgba(16,185,129,.12);}
.kpi-green .kpi-glow{background:var(--green);}
.kpi-green .kpi-num{color:var(--green2);}
.kpi-green .kpi-bar-fill{background:linear-gradient(90deg,var(--green),var(--cyan2));}
.kpi-amber{border-color:rgba(245,158,11,.2);}
.kpi-amber:hover{border-color:rgba(245,158,11,.4);box-shadow:0 8px 32px rgba(245,158,11,.08);}
.kpi-amber .kpi-glow{background:var(--yellow);}
.kpi-amber .kpi-num{color:var(--amber);}
.kpi-amber .kpi-bar-fill{background:linear-gradient(90deg,var(--yellow),var(--amber));}
.kpi-red{border-color:rgba(239,68,68,.2);}
.kpi-red:hover{border-color:rgba(239,68,68,.4);box-shadow:0 8px 32px rgba(239,68,68,.1);}
.kpi-red .kpi-glow{background:var(--red);}
.kpi-red .kpi-num{color:var(--red2);}
.kpi-red .kpi-bar-fill{background:linear-gradient(90deg,var(--red),#ff7171);}
.kpi-cyan{border-color:rgba(6,182,212,.2);}
.kpi-cyan:hover{border-color:rgba(6,182,212,.4);box-shadow:0 8px 32px rgba(6,182,212,.1);}
.kpi-cyan .kpi-glow{background:var(--cyan);}
.kpi-cyan .kpi-num{color:var(--cyan2);}
.kpi-cyan .kpi-bar-fill{background:linear-gradient(90deg,var(--cyan),var(--blue2));}

/* PANEL */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;position:relative;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.2),rgba(6,182,212,.15),transparent);}
.panel-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:rgba(10,15,30,.5);}
.panel-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;letter-spacing:.2px;}
.badge{background:rgba(59,130,246,.15);color:var(--blue2);border-radius:12px;padding:2px 9px;font-size:10px;font-weight:700;border:1px solid rgba(59,130,246,.2);}

/* TABLE */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tbl-wrap::-webkit-scrollbar{height:3px;}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--border2);}
table{width:100%;border-collapse:collapse;min-width:480px;}
th{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);font-weight:700;padding:11px 16px;text-align:left;background:rgba(5,8,15,.7);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;transition:color .15s;}
th:hover{color:var(--text2);}
th.th-asc,th.th-desc{color:var(--cyan2);}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;line-height:1.4;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(59,130,246,.04);}

.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;letter-spacing:.3px;}

/* ANN */
.ann-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 18px 16px 22px;margin-bottom:10px;position:relative;overflow:hidden;transition:border-color .2s;}
.ann-card:hover{border-color:var(--border2);}
.ann-accent{position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(to bottom,var(--blue),var(--cyan));border-radius:4px 0 0 4px;}
.ann-accent.pinned{background:linear-gradient(to bottom,var(--yellow),var(--amber));}
.ann-pin-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;color:var(--amber);font-weight:700;letter-spacing:.5px;background:rgba(245,158,11,.12);border-radius:4px;padding:2px 7px;margin-bottom:6px;text-transform:uppercase;}
.ann-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.4;}
.ann-body{font-size:13px;color:var(--text2);line-height:1.7;}
.ann-meta{font-size:10px;color:var(--text3);margin-top:8px;font-family:var(--f-mono);}

.info-ok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);color:var(--green2);padding:10px 14px;border-radius:9px;font-size:13px;line-height:1.6;margin-bottom:12px;}
.info-warn{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);color:var(--amber);padding:10px 14px;border-radius:9px;font-size:13px;line-height:1.6;margin-bottom:12px;}
.info-tip{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.2);color:var(--cyan2);padding:10px 14px;border-radius:9px;font-size:12px;line-height:1.7;margin-bottom:12px;}

.sbar{width:50px;height:5px;background:var(--bg5);border-radius:3px;display:inline-block;vertical-align:middle;margin-right:7px;overflow:hidden;}
.sbar-fill{height:100%;border-radius:3px;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);}
.modal-overlay.open{display:flex;animation:fadeIn .15s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@media(min-width:600px){.modal-overlay{align-items:center;}.modal-box{border-radius:16px!important;width:580px!important;max-height:88vh!important;}}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;width:100%;max-height:93vh;overflow-y:auto;padding:24px;box-shadow:0 -24px 80px rgba(0,0,0,.8);animation:slideUp .2s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:none;opacity:1;}}
.modal-title{font-family:var(--f-ui);font-size:17px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px;color:var(--text);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;flex-wrap:wrap;}
.field-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px;font-weight:600;}

.item-row{background:var(--bg4);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:9px;}
.item-row:last-child{margin-bottom:0;}
.item-check{width:17px;height:17px;accent-color:var(--blue);flex-shrink:0;margin-top:4px;cursor:pointer;}
.item-body{flex:1;min-width:0;}
.item-model-wrap{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.item-model{flex:1;background:var(--bg5)!important;border:1px solid var(--border2);border-radius:7px;padding:7px 10px;color:var(--text)!important;-webkit-text-fill-color:var(--text)!important;font-size:13px;font-family:var(--f-mono);outline:none;min-width:0;}
.item-model:focus{border-color:var(--blue);}
.item-model::placeholder{color:var(--text3)!important;-webkit-text-fill-color:var(--text3)!important;}
.item-qty{width:72px;flex-shrink:0;background:var(--bg5)!important;border:1px solid var(--border2);border-radius:7px;padding:7px 8px;color:var(--text)!important;-webkit-text-fill-color:var(--text)!important;font-size:13px;font-family:var(--f-mono);text-align:center;outline:none;}
.item-qty:focus{border-color:var(--blue);}
.item-del{flex-shrink:0;width:30px;height:30px;border-radius:7px;cursor:pointer;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;padding:0;}
.item-hint{font-size:10px;color:var(--text3);min-height:14px;margin-top:2px;}

.prog-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:14px;margin-top:12px;}
.prog-text{font-size:12px;color:var(--text2);margin-bottom:8px;}
.prog-track{background:var(--bg5);border-radius:4px;height:6px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:4px;transition:width .3s;}

.sn{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;font-size:9px;font-weight:700;flex-shrink:0;vertical-align:middle;margin-right:5px;box-shadow:0 0 10px rgba(59,130,246,.35);}

#toastZone{position:fixed;top:66px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none;}
.toast{min-width:240px;max-width:380px;padding:12px 16px;border-radius:11px;font-size:13px;font-weight:500;line-height:1.4;box-shadow:0 6px 28px rgba(0,0,0,.5);opacity:0;transform:translateX(20px);transition:opacity .25s,transform .25s;pointer-events:none;backdrop-filter:blur(12px);}
.toast.in{opacity:1;transform:translateX(0);}

@keyframes spin{to{transform:rotate(360deg);}}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.15);border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
.loading-row{display:flex;align-items:center;justify-content:center;padding:32px;color:var(--text3);gap:10px;font-size:13px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.kpi-card{animation:fadeUp .35s ease both;}
.help-box{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.18);border-radius:9px;padding:10px 14px;font-size:12px;color:var(--cyan2);margin-bottom:12px;line-height:1.7;}
.qc-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;}
.qc-tab{padding:10px 18px;font-size:13px;font-weight:600;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--text3);transition:color .15s;}
.qc-tab.active{color:var(--cyan2);border-bottom-color:var(--cyan2);}

/* ANN item class (for renderAnnounce) */
.ann-item{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 18px 16px 22px;margin-bottom:10px;position:relative;overflow:hidden;transition:border-color .2s;}
.ann-item:hover{border-color:var(--border2);}
.ann-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(to bottom,var(--blue),var(--cyan));border-radius:4px 0 0 4px;}
.ann-pinned::before{background:linear-gradient(to bottom,var(--yellow),var(--amber));}

@media(max-width:600px){
  html{font-size:14px;}
  .main{padding:10px;}
  .dash-kpi-grid{grid-template-columns:1fr 1fr!important;gap:10px!important;}
  .kpi-num{font-size:34px!important;}
  td,th{padding:10px 10px!important;font-size:12px!important;}
  .form-row{grid-template-columns:1fr!important;}
  .hide-m{display:none!important;}
  .modal-box{padding:18px;}
  .topbar{padding:0 12px;}
  .nav-btn{padding:0 14px;font-size:12px;}
  .kpi-card{padding:16px 18px;}
}
@media(max-width:380px){
  .kpi-num{font-size:28px!important;}
  .kpi-card{padding:14px 16px;}
}
</style>

function explodeBOM(pid,qty){
  const res={};const q=[{pid,mult:qty}];const seen=new Set();
  while(q.length){const{pid:p,mult:m}=q.shift();boms.filter(b=>b.parentId===p).forEach(b=>{const mat=mats.find(x=>x.id===b.childId);if(!mat)return;const n=b.qty*m;if(!res[b.childId])res[b.childId]={...mat,needed:0};res[b.childId].needed+=n;if(mat.type==='ŚćäśąźŚďĀ'&&!seen.has(b.childId)){seen.add(b.childId);q.push({pid:b.childId,mult:n});}});}
  return Object.values(res);
}

function toggleSort(tid,col,type='str'){const s=SORT[tid]||{};SORT[tid]={col,dir:s.col===col&&s.dir==='asc'?'desc':'asc',type};renderTab(CURRENT_TAB);}
function applySort(tid,data){const s=SORT[tid];if(!s)return data;return[...data].sort((a,b)=>{let va=a[s.col],vb=b[s.col];if(s.type==='num'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}else{va=String(va||'').toLowerCase();vb=String(vb||'').toLowerCase();}if(va<vb)return s.dir==='asc'?-1:1;if(va>vb)return s.dir==='asc'?1:-1;return 0;});}
function TH(tid,col,label,type='str',cls=''){const s=SORT[tid]||{};const a=s.col===col;return`<th class="${a?'th-'+s.dir:''} ${cls}" onclick="toggleSort('${tid}','${col}','${type}')">${label}<span style="font-size:8px;opacity:${a?1:.3};margin-left:2px">${a?(s.dir==='asc'?'‚ÜĎ':'‚Üď'):'‚Üē'}</span></th>`;}
function applyDateFilter(filterId,data,dateKey='deadline'){
  const sel=document.getElementById(filterId+'DateFilter');const m=sel?parseInt(sel.value):6;if(!m)return data;
  const cutoff=new Date();cutoff.setMonth(cutoff.getMonth()-m);const cs=cutoff.toISOString().slice(0,10);
  return data.filter(item=>{const d=item[dateKey]||item.date||item.created||'';return!d||d>=cs;});
}

  const o=orders.find(x=>x.id===orderId);const prod=mats.find(m=>m.id===o.productId);const items=explodeBOM(o.productId,o.qty);
  const ds=new Date().toISOString().slice(0,10);const no=`PK-${ds.slice(2).replace(/-/g,'')}-${Math.floor(Math.random()*900+100)}`;

    const master=await createPage(DB.pickMaster,{'ť†ėśĖôšłĽŚĖģŤôü':{title:[{text:{content:no}}]},'ŚįćśáČŤ®āŚĖģ':{relation:[{id:orderId}]},'śąźŚďĀŚďĀŤôü':{rich_text:[{text:{content:prod?.name||''}}]},'ÁĒüÁĒĘśēłťáŹ':{number:o.qty},'ÁčÄśÖč':{select:{name:'Ś∑≤ÁĘļŤ™ćśČ£śĖô'}},'ť†ėśĖôśó•śúü':{date:{start:ds}}});

async function selectAndLoadPI(pageId,title,idx){
  document.querySelectorAll('.pi-item').forEach(e=>e.classList.remove('selected'));
  const el=document.getElementById('pii_'+idx);if(el)el.classList.add('selected');
  const setStatus=msg=>{const d=el?.querySelector('.pi-status');if(d)d.textContent=msg;};
  setStatus('‚Ź≥ ŤģÄŚŹĖšł≠...');
  try{
    const blocks=await getBlockChildren(pageId);const all=blocks.results||[];
    let fileUrl='',pdfUrl='';
    for(const b of all){
      if(b.type!=='file')continue;
      const fd=b.file||{};const name=(fd.name||'').toLowerCase();const url=fd.file?.url||fd.external?.url||'';if(!url)continue;
      if((name.endsWith('.xlsx')||name.endsWith('.xls'))&&!fileUrl)fileUrl=url;
      if(name.endsWith('.pdf')&&!pdfUrl)pdfUrl=url;
    }
    if(!fileUrl){
      for(const b of all){if(b.type!=='child_page')continue;const t=(b.child_page?.title||'').toLowerCase();if(t.endsWith('.xlsx')||t.endsWith('.xls')){try{const bd=await getBlock(b.id);const bfd=bd[bd.type]||{};const u=bfd.file?.url||bfd.external?.url||'';if(u){fileUrl=u;break;}}catch{}}}
    }
    if(!fileUrl&&pdfUrl){
      setStatus('ūüďĄ ŚŹ™śúČ PDF');const el2=document.getElementById('piInfo');
      if(el2)el2.innerHTML=`<span style="color:var(--yellow)">‚ö† ŚŹ™śúČ PDF ťôĄšĽ∂ÔľĆÁĄ°ś≥ēŤá™ŚčēŤß£śěź„Äā<a href="${pdfUrl}" target="_blank" style="color:var(--blue)">ťĖčŚēü PDF</a>ÔľĆŤęčśČčŚčēŚ°ęŚÖ•„Äā</span>`;
      showToast('ŚŹ™śúČ PDFÔľĆŤęčśČčŚčēŚ°ęŚÖ•','warn');return;
    }
    if(!fileUrl){setStatus('‚ĚĆ śČĺšłćŚąį Excel');showToast('śČĺšłćŚąį ExcelÔľĆŤęčÁõīśé•šłäŚā≥','warn');return;}
    setStatus('‚Ź≥ šłčŤľČšł≠...');
    const buf=await downloadViaProxy(fileUrl);
    const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:null});
    const orderNo=title.replace(/\s*\(.*?\)\s*/g,'').trim();
    const items=parsePIRows(rows,orderNo);
    setStatus(`‚úÖ ŤģÄŚŹĖ ${items.length} ŚÄčŚďĀť†Ö`);
    showToast(`‚úÖ PI„ÄĆ${title}„ÄćŤģÄŚŹĖśąźŚäü`,'ok');
  }catch(e){setStatus(`‚ĚĆ ${e.message.slice(0,40)}`);showToast('ŤģÄŚŹĖŚ§ĪśēóÔľĆŤęčÁõīśé•šłäŚā≥','err');}
}

async function submitMultiOrders(){
  const cust=document.getElementById('m_cust')?.value;
  const date=document.getElementById('m_date')?.value;
  if(!cust){alert('ŤęčťĀłśďáŚģĘśą∂');return;}
  if(!date){alert('ŤęčŚ°ęŚÖ•šļ§śúü');return;}

  // Śĺě data attribute ťāĄŚéüŚďĀť†ÖŤ≥áśĖôÔľąťĀŅŚÖć onclick ŚľēŤôüŚēŹť°ĆÔľČ

  if(!div||!div.dataset.items){alert('ŚďĀť†ÖŤ≥áśĖôťĀļŚ§ĪÔľĆŤęčťáćśĖįŤģÄŚŹĖ PI');return;}
  let items;
  try{items=JSON.parse(decodeURIComponent(atob(div.dataset.items)));}
  catch(e){alert('ŚďĀť†ÖŤ≥áśĖôŤß£śěźŚ§ĪśēóÔľö'+e.message);return;}
  const piNo=div.dataset.pino||'';

  const selected=[];
  for(let i=0;i<items.length;i++){
    const chk=document.getElementById('chk_'+i);const qtyEl=document.getElementById('qty_'+i);
    if(chk?.checked&&qtyEl)selected.push({model:items[i].model,qty:parseInt(qtyEl.value)||items[i].qty});
  }
  if(!selected.length){alert('ŤęčŤá≥ŚįĎŚčĺťĀłšłÄŚÄčŚďĀť†Ö');return;}

  // ť°ĮÁ§ļťÄ≤Śļ¶Ôľąšłć closeModalÔľČ
  const batchBtn=document.getElementById('batchBtn');
  if(batchBtn){batchBtn.disabled=true;batchBtn.textContent='ŚĽļÁęčšł≠ÔľĆŤęčŚčŅťóúťĖČ...';}
  div.insertAdjacentHTML('afterend',`<div id="batchProgress" style="background:var(--bg3);border-radius:8px;padding:10px;margin-top:8px;font-size:12px;color:var(--cyan)"><div class="spin" style="margin-right:6px"></div>ś≠£Śú®ŚĽļÁęč ${selected.length} Á≠ÜŤ®āŚĖģ...</div>`);

  const prefix=`ORD-${new Date().toISOString().slice(2,7).replace('-','')}`;
  let ok=0,fail=0,failList=[];

  for(let i=0;i<selected.length;i++){
    const item=selected[i];
    const prog=document.getElementById('batchProgress');
    if(prog)prog.innerHTML=`<div class="spin" style="margin-right:6px"></div>ŚĽļÁęčÁ¨¨ ${i+1}/${selected.length} Á≠ÜÔľö${item.model}...`;
    try{
      let prodId='';
      const ex=mats.find(m=>m.name===item.model||m.code===item.model);
      if(ex){prodId=ex.id;}
      else{
        const nm=await createPage(DB.materials,{'śĖôšĽ∂ŚźćÁ®Ī':{title:[{text:{content:item.model}}]},'ť°ěŚěč':{select:{name:'śąźŚďĀ'}},'ÁõģŚČćŚļęŚ≠ė':{number:1000},'ŚģČŚÖ®ŚļęŚ≠ė':{number:0}});
        prodId=nm.id;
      }
      const no=`${prefix}-${String(i+1).padStart(3,'0')}`;
      await createPage(DB.orders,{
        'Ť®āŚĖģŤôü':{title:[{text:{content:no}}]},
        'ŚģĘśą∂ŚźćÁ®Ī':{select:{name:cust}},
        'śąźŚďĀ':{relation:[{id:prodId}]},
        'Ť®āŤ≥ľśēłťáŹ':{number:item.qty},
        'šļ§śúü':{date:{start:date}},
        'ÁčÄśÖč':{select:{name:'ŚĺÖśéíÁ®č'}},
        'ś•≠ŚčôŚāôŤ®Ľ':{rich_text:[{text:{content:'PI No: '+piNo}}]},
      });
      ok++;
    }catch(e){fail++;failList.push(item.model);console.error(item.model,e);}
  }

  await refreshAll();

  const prog=document.getElementById('batchProgress');
  if(prog)prog.innerHTML=`<span style="color:${ok===selected.length?'var(--green)':'var(--yellow)'}">
    ‚úÖ śąźŚäü ${ok} Á≠Ü${fail?`ÔľĆŚ§Īśēó ${fail} Á≠ÜÔľą${failList.join('„ÄĀ')}ÔľČ`:''}
  </span>
  <br><button class="btn btn-ghost btn-sm" onclick="closeModal()" style="margin-top:8px">ťóúťĖČ</button>`;

  showToast(`${ok===selected.length?'‚úÖ':'‚ö†'} ŚĽļÁęč ${ok}/${selected.length} Á≠ÜŤ®āŚĖģ`,ok===selected.length?'ok':'warn');
}

function parsePIFile(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});parsePIRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:null}),file.name.replace(/\.xlsx?$/i,''));}catch(err){const el=document.getElementById('piInfo');if(el)el.textContent='‚ĚĆ Ťß£śěźŚ§ĪśēóÔľö'+err.message;}};

function piParse(rows,titleHint){
  const piNo=titleHint||(rows[6]&&rows[6][9]?String(rows[6][9]).trim():'');
  let piDate='';if(rows[7]&&rows[7][8])piDate=String(rows[7][8]).replace(/Date:/i,'').trim().replace(/\./g,'-');
  const parsed=[];
  for(let i=12;i<(rows.length||0)-1;i++){
    const row=rows[i];if(!row)continue;
    const col1=row[1]!=null?String(row[1]).trim():'';
    if(col1&&/^\d+\.?$/.test(col1)){const qty=row[6]!=null?parseInt(row[6])||0:0;const model=(rows[i+1]||[])[2]!=null?String((rows[i+1]||[])[2]).trim():'';if(model&&qty>0)parsed.push({model,qty,checked:true});i++;}
  }
  const msg=document.getElementById('piMsg');
  if(!parsed.length){msg.innerHTML='<span style="color:var(--yellow)">‚ö† śú™ŤÉĹŤß£śěźŚďĀť†ÖÔľĆŤęčśČčŚčēśĖįŚĘě</span>';return;}
  _items=parsed;renderItems();
  if(piNo){const ne=document.getElementById('m_note');if(ne)ne.value='PI No: '+piNo;}
  if(piDate.match(/^\d{4}-\d{2}-\d{2}$/)){const d=new Date(piDate);d.setDate(d.getDate()+30);const de=document.getElementById('m_date');if(de)de.value=d.toISOString().slice(0,10);}
  msg.innerHTML=`<span style="color:var(--green)">‚úÖ Ťß£śěź ${parsed.length} ŚÄčŚďĀť†ÖÔľĆŚ∑≤ŚąóŚÖ•šłčśĖĻśłÖŚĖģ</span>`;
}

async function loadPI(pageId,title,idx){
  const stat=document.getElementById('pistat_'+idx);if(stat)stat.textContent='‚Ź≥ ŤģÄŚŹĖšł≠...';
  try{
    const blocks=await getBlockChildren(pageId);const all=blocks.results||[];
    let fileUrl='',pdfUrl='';
    for(const b of all){if(b.type!=='file')continue;const fd=b.file||{};const name=(fd.name||'').toLowerCase();const url=fd.file?.url||fd.external?.url||'';if(!url)continue;if((name.endsWith('.xlsx')||name.endsWith('.xls'))&&!fileUrl)fileUrl=url;if(name.endsWith('.pdf')&&!pdfUrl)pdfUrl=url;}
    if(!fileUrl){for(const b of all){if(b.type!=='child_page')continue;const t=(b.child_page?.title||'').toLowerCase();if(t.endsWith('.xlsx')||t.endsWith('.xls')){try{const bd=await getBlock(b.id);const bfd=bd[bd.type]||{};const u=bfd.file?.url||bfd.external?.url||'';if(u){fileUrl=u;break;}}catch{}}}}
    if(!fileUrl&&pdfUrl){if(stat)stat.innerHTML='<span style="color:var(--yellow)">ūüďĄ ŚŹ™śúČ PDF</span>';return;}
    if(!fileUrl){if(stat)stat.textContent='‚ĚĆ śČĺšłćŚąį Excel';showToast('śČĺšłćŚąį Excel','warn');return;}
    if(stat)stat.textContent='‚Ź≥ šłčŤľČšł≠...';
    const buf=await downloadViaProxy(fileUrl);
    const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
    piParse(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:null}),title.replace(/\s*\(.*?\)\s*/g,'').trim());
    if(stat)stat.innerHTML='<span style="color:var(--green)">‚úÖ ŤģÄŚŹĖŚģĆśąź</span>';
    showToast('‚úÖ PI ŤģÄŚŹĖśąźŚäü','ok');
  }catch(e){if(stat)stat.textContent='‚ĚĆ '+e.message.slice(0,40);showToast('ŤģÄŚŹĖŚ§Īśēó','err');}
}

  if(!selected.length){showToast('ŤęčŤá≥ŚįĎśĖįŚĘěšłÄŚÄčŚďĀť†ÖÔľąťĽě ÔľčÔľČ','warn');return;}

  // ‚ėÖ ťéĖŚģöśĆČťąēťė≤ťáćŤ§áťĽěśďä
  if(btn){btn.disabled=true;btn.textContent='ŚĽļÁęčšł≠...';}
  const pw=document.getElementById('orderProg');if(pw)pw.style.display='';
  const pt=document.getElementById('orderProgTxt');const pb=document.getElementById('orderProgBar');

  // ‚ėÖ śĖįŚģĘśą∂ÔľöŚÖąÁĘļŤ™ć Notion ŚĽļÁęčśąźŚäüÔľąŚźĆś≠•Á≠ČŚĺÖÔľČ
  let custName=selVal;
  if(!selVal&&newVal){
    if(pt)pt.textContent='ś≠£Śú®ŚĽļÁęčśĖįŚģĘśą∂Ťá≥ Notion ŚģĘśą∂ÁłĹś™Ē...';
    try{
      const res=await createPage(DB.custMaster,{'Name':{title:[{text:{content:newVal}}]}});
      if(res.object==='error')throw new Error(res.message||'ŚĽļÁęčŚģĘśą∂Ś§Īśēó');
      custName=newVal;
      showToast('‚úÖ śĖįŚģĘśą∂„ÄĆ'+newVal+'„ÄćŚ∑≤ŚĽļÁęčŤá≥ Notion ŚģĘśą∂ÁłĹś™Ē','ok');
    }catch(e){
      showToast('‚ĚĆ ŚĽļÁęčśĖįŚģĘśą∂Ś§ĪśēóÔľö'+e.message+'„ÄāŤ≥áśĖôŚįöśú™Ś≠ėŚÖ• NotionÔľĆŤęčÁ®ćŚĺĆŚÜćŤ©¶','err');
      if(btn){btn.disabled=false;btn.textContent='ūüďč ŚĽļÁęčŤ®āŚĖģ';}
      return;
    }
  }

  const prefix='ORD-'+new Date().toISOString().slice(2,7).replace('-','');
  let ok=0,fail=0,failList=[];

  for(let i=0;i<selected.length;i++){
    const item=selected[i];
    if(pt)pt.textContent=`ŚĽļÁęčÁ¨¨ ${i+1}/${selected.length} Á≠ÜÔľö${item.model}`;
    if(pb)pb.style.width=Math.round((i+1)/selected.length*100)+'%';
    try{
      // ‚ėÖ ťáćŤ§áśÄßś™Ęśü•
      const dup=orders.find(o=>{
        const mat=mats.find(m=>m.id===o.productId);
        return o.customer===custName&&o.deadline===date&&(mat?.name===item.model||mat?.code===item.model);
      });
      if(dup){
        const conf=confirm(`‚ö† ťáćŤ§áŤ®āŚĖģŤ≠¶ŚĎä
„ÄĆ${dup.no}„ÄćŚ∑≤Ś≠ėŚú®Ôľą${custName} / ${item.model} / ${date}ÔľČ
ÁĘļŚģöŤ¶ĀŚÜćŚĽļÁęčšłÄÁ≠ÜÔľü`);
        if(!conf){fail++;failList.push(item.model+' (Ť∑≥ťĀéťáćŤ§á)');continue;}
      }
      let prodId='';
      const ex=mats.find(m=>m.name===item.model||m.code===item.model);
      if(ex){prodId=ex.id;}
      else{
        const nm=await createPage(DB.materials,{'śĖôšĽ∂ŚźćÁ®Ī':{title:[{text:{content:item.model}}]},'ť°ěŚěč':{select:{name:'śąźŚďĀ'}},'ÁõģŚČćŚļęŚ≠ė':{number:1000},'ŚģČŚÖ®ŚļęŚ≠ė':{number:0}});
        if(nm.object==='error')throw new Error(nm.message);
        prodId=nm.id;
      }
      const no=prefix+'-'+String(i+1).padStart(3,'0');
      const res=await createPage(DB.orders,{'Ť®āŚĖģŤôü':{title:[{text:{content:no}}]},'ŚģĘśą∂ŚźćÁ®Ī':{select:{name:custName}},'śąźŚďĀ':{relation:[{id:prodId}]},'Ť®āŤ≥ľśēłťáŹ':{number:item.qty},'šļ§śúü':{date:{start:date}},'ÁčÄśÖč':{select:{name:'ŚĺÖśéíÁ®č'}},'ś•≠ŚčôŚāôŤ®Ľ':{rich_text:[{text:{content:note}}]}});
      if(res.object==='error')throw new Error(res.message);
      ok++;
    }catch(e){
      fail++;failList.push(item.model);
      console.error('[Order]',item.model,e.message);
    }
  }

  // ‚ėÖ ŚģĆśąźÔľöcloseModal ‚Üí Ť∑≥Ť®āŚĖģť†Ā ‚Üí ŤÉĆśôĮŚźĆś≠•
  closeModal();
  switchTab('orders');
  const msg2=(ok===selected.length?'‚úÖ':'‚ö†')+` ŚĽļÁęč ${ok}/${selected.length} Á≠ÜŤ®āŚĖģ`+(fail?` ¬∑ Ś§ĪśēóÔľö${failList.join(', ')}`:'');
  showToast(msg2,ok===selected.length?'ok':'warn');
  refreshAll().catch(e=>console.error('bg refresh:',e));
}
